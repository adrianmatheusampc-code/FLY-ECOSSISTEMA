<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FLY — 7 ANOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

  :root {
    --gold:        #f5b842;
    --gold-bright: #ffd070;
    --gold-pale:   #fff3c8;
    --gold-deep:   #b88318;
    --gold-glow:   rgba(245, 184, 66, 0.75);
  }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    background: radial-gradient(ellipse at 50% 50%, #0c0c0c 0%, #050505 55%, #000 100%);
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 12% 22%,  rgba(255,255,255,0.45) 50%, transparent 51%),
      radial-gradient(1px 1px at 78% 88%,  rgba(255,255,255,0.30) 50%, transparent 51%),
      radial-gradient(1px 1px at 88% 14%,  rgba(255,255,255,0.35) 50%, transparent 51%),
      radial-gradient(1px 1px at 28% 78%,  rgba(255,255,255,0.25) 50%, transparent 51%),
      radial-gradient(1px 1px at 56% 52%,  rgba(255,255,255,0.20) 50%, transparent 51%),
      radial-gradient(1px 1px at 8%  62%,  rgba(255,255,255,0.30) 50%, transparent 51%),
      radial-gradient(1px 1px at 92% 48%,  rgba(255,255,255,0.25) 50%, transparent 51%),
      radial-gradient(1px 1px at 42% 12%,  rgba(255,255,255,0.30) 50%, transparent 51%),
      radial-gradient(1px 1px at 68% 30%,  rgba(255,255,255,0.20) 50%, transparent 51%),
      radial-gradient(1px 1px at 18% 92%,  rgba(255,255,255,0.25) 50%, transparent 51%);
    pointer-events: none;
    opacity: 0.6;
    z-index: 0;
  }

  .view {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s ease;
    z-index: 1;
  }
  .view.hidden { opacity: 0; pointer-events: none; }

  /* ============================================================
     VIEW 1 · LINEAR ROW (7 circles)
     ============================================================ */
  .grid-view {
    flex-direction: column;
    gap: clamp(40px, 6vh, 80px);
    padding: 0 24px;
  }
  .grid-title { text-align: center; }
  .grid-title .brand {
    font-size: clamp(11px, 1.3vmin, 14px);
    letter-spacing: 8px;
    color: rgba(255,255,255,0.55);
    font-weight: 600;
  }
  .grid-title .title {
    font-size: clamp(48px, 9vmin, 110px);
    font-weight: 900;
    letter-spacing: 12px;
    background: linear-gradient(180deg, var(--gold-pale) 0%, var(--gold-bright) 35%, var(--gold) 65%, var(--gold-deep) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
    margin-top: 10px;
  }
  .grid-title .sub {
    font-size: clamp(12px, 1.4vmin, 16px);
    letter-spacing: 6px;
    color: rgba(255,255,255,0.6);
    margin-top: 14px;
  }

  .grid-row {
    display: flex;
    gap: clamp(18px, 2.5vw, 40px);
    align-items: center;
    justify-content: center;
    flex-wrap: nowrap;
    position: relative;
  }
  .grid-row::before {
    content: '';
    position: absolute;
    left: 6%;
    right: 6%;
    top: 50%;
    height: 1px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(245,184,66,0.45) 10%,
      rgba(245,184,66,0.45) 90%,
      transparent 100%);
    z-index: 0;
  }

  .grid-circle {
    position: relative;
    width: clamp(80px, 10.5vw, 140px);
    height: clamp(80px, 10.5vw, 140px);
    border-radius: 50%;
    background: #000;
    border: 2px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-weight: 800;
    font-size: clamp(14px, 1.7vw, 22px);
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    box-shadow:
      0 0 18px rgba(245, 184, 66, 0.35),
      inset 0 0 18px rgba(245, 184, 66, 0.08);
    z-index: 1;
  }
  .grid-circle:hover {
    transform: translateY(-8px);
    box-shadow:
      0 0 35px rgba(245, 184, 66, 0.7),
      inset 0 0 22px rgba(245, 184, 66, 0.18);
  }
  .grid-circle.gold {
    background:
      radial-gradient(circle at 32% 28%,
        var(--gold-pale) 0%,
        var(--gold-bright) 28%,
        var(--gold) 55%,
        var(--gold-deep) 100%);
    color: #1a1000;
    border-color: var(--gold-bright);
    letter-spacing: 4px;
    box-shadow:
      0 0 30px var(--gold),
      0 0 65px rgba(245, 184, 66, 0.55),
      inset 0 2px 15px rgba(255,255,255,0.4);
  }
  .grid-circle.gold::before {
    content: '';
    position: absolute;
    inset: 8%;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.35);
    pointer-events: none;
  }

  .grid-hint {
    text-align: center;
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.35);
    margin-top: 8px;
  }

  /* ============================================================
     VIEW 2 · DETAIL (single circle + 7 topics on ring)
     ============================================================ */
  .stage {
    position: relative;
    width: min(78vmin, 780px);
    aspect-ratio: 1 / 1;
    overflow: visible;
  }
  .halo {
    position: absolute;
    top: 50%; left: 50%;
    width: 78%; height: 78%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(245,184,66,0.22) 0%, rgba(245,184,66,0.06) 55%, transparent 72%);
    filter: blur(10px);
    pointer-events: none;
  }
  .ring {
    position: absolute;
    top: 50%; left: 50%;
    width: 70%; height: 70%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: radial-gradient(circle, transparent 60%, rgba(245,184,66,0.06) 100%);
    box-shadow:
      0 0 28px var(--gold-glow),
      0 0 60px rgba(245, 184, 66, 0.35),
      inset 0 0 35px rgba(245, 184, 66, 0.10);
  }
  .ring::before {
    content: '';
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1px solid rgba(245, 184, 66, 0.45);
    filter: blur(3px);
  }
  .ring::after {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    border: 1px solid rgba(245, 184, 66, 0.18);
  }
  .center-circle {
    position: absolute;
    top: 50%; left: 50%;
    width: 38%; height: 38%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle at 50% 35%, #1c1c1c 0%, #060606 80%);
    border: 1px solid rgba(245, 184, 66, 0.25);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
  }
  .center-circle .glyph {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(16px, 2.4vmin, 26px);
    font-weight: 800;
    letter-spacing: 6px;
    color: rgba(245,184,66,0.55);
  }
  .center-text {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translate(-50%, 0);
    text-align: center;
    pointer-events: none;
    z-index: 4;
  }
  .center-text .ano {
    font-size: clamp(40px, 7vmin, 86px);
    font-weight: 900;
    letter-spacing: 8px;
    color: #fff;
    line-height: 1;
  }
  .center-text .ano.long {
    font-size: clamp(20px, 3.4vmin, 38px);
    letter-spacing: 4px;
  }
  .center-text .period {
    font-size: clamp(13px, 1.7vmin, 22px);
    letter-spacing: 4px;
    color: #fff;
    margin-top: 12px;
    font-weight: 700;
  }
  .top-mark {
    position: absolute;
    top: 8.5%;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-weight: 700;
    letter-spacing: 6px;
    font-size: clamp(11px, 1.5vmin, 16px);
    z-index: 5;
    white-space: nowrap;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .top-mark .gold-text { color: var(--gold); font-weight: 600; }

  .dot {
    position: absolute;
    top: 50%; left: 50%;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--gold-bright);
    box-shadow:
      0 0 10px var(--gold),
      0 0 22px var(--gold-bright),
      0 0 40px rgba(245, 184, 66, 0.55);
    transform: translate(-50%, -50%);
    z-index: 2;
  }

  .topic-link {
    position: absolute;
    top: 50%; left: 50%;
    height: 1px;
    background: linear-gradient(90deg, rgba(245,184,66,0.0), rgba(245,184,66,0.85));
    transform-origin: 0 50%;
    z-index: 1;
  }

  .topic {
    position: absolute;
    color: #fff;
    font-weight: 800;
    font-size: clamp(11px, 1.55vmin, 17px);
    letter-spacing: 3px;
    line-height: 1.25;
    z-index: 4;
    white-space: nowrap;
    cursor: pointer;
    transition: color 0.2s, text-shadow 0.2s;
  }
  .topic:hover {
    color: var(--gold-bright);
    text-shadow: 0 0 20px var(--gold-bright);
  }

  /* ============================================================
     VIEW 3 · TOPIC CONTENT (banner + grid of cards)
     ============================================================ */
  .topic-view {
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 80px 40px 60px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .topic-view.hidden { display: none; }

  .topic-banner {
    position: relative;
    width: 100%;
    max-width: 1600px;
    margin: 0 auto 40px;
    border: 2px solid var(--gold);
    border-radius: 18px;
    padding: 36px 44px;
    background:
      linear-gradient(135deg, rgba(245,184,66,0.06) 0%, rgba(0,0,0,0.85) 60%),
      radial-gradient(circle at 8% 50%, rgba(245,184,66,0.25), transparent 35%),
      #000;
    background-size: cover;
    background-position: center;
    box-shadow:
      0 0 40px rgba(245, 184, 66, 0.35),
      inset 0 0 60px rgba(0,0,0,0.6);
    overflow: hidden;
    min-height: 180px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .topic-banner.has-image::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--banner-image) center/cover no-repeat;
    opacity: 0.35;
    z-index: 0;
  }
  .topic-banner.has-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.3) 100%);
    z-index: 0;
  }
  .topic-banner > * { position: relative; z-index: 1; }

  .topic-banner h1 {
    font-size: clamp(36px, 5.5vw, 80px);
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    text-shadow: 0 4px 25px rgba(245,184,66,0.5);
  }
  .topic-banner .banner-icons {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .banner-icon {
    width: 110px;
    height: 70px;
    border: 2px solid var(--gold);
    border-radius: 10px;
    background-size: cover;
    background-position: center;
    background-color: #111;
    position: relative;
    box-shadow: 0 0 14px rgba(245,184,66,0.35);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }
  .banner-icon span {
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.85));
    width: 100%;
    text-align: center;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 2px;
    padding: 12px 4px 4px;
    color: #fff;
  }

  .pacotes-section {
    width: 100%;
    max-width: 1600px;
    margin: 0 auto 40px;
    border: 2px solid var(--gold);
    border-radius: 18px;
    padding: 28px;
    background: rgba(0,0,0,0.4);
    box-shadow: 0 0 30px rgba(245,184,66,0.25);
  }
  .pacotes-title {
    text-align: center;
    font-size: clamp(22px, 3vw, 38px);
    font-weight: 900;
    letter-spacing: 6px;
    color: #fff;
    margin-bottom: 22px;
  }
  .pacotes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
  }
  .pacote-card {
    aspect-ratio: 1 / 1.2;
    border: 2px solid var(--gold);
    border-radius: 14px;
    background: #111 var(--card-image) center/cover no-repeat;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 14px rgba(245,184,66,0.3);
    transition: transform 0.25s, box-shadow 0.25s;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .pacote-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 0 30px rgba(245,184,66,0.6);
  }
  .pacote-card .name {
    width: 100%;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.9));
    text-align: center;
    color: #fff;
    font-weight: 900;
    letter-spacing: 3px;
    font-size: clamp(13px, 1.4vw, 18px);
    padding: 30px 8px 14px;
  }
  .pacote-card .delete-btn,
  .item-card .delete-btn {
    position: absolute;
    top: 6px; right: 6px;
    background: rgba(255, 60, 60, 0.85);
    border: none;
    color: #fff;
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
    display: none;
    z-index: 5;
  }
  body.admin-mode .pacote-card .delete-btn,
  body.admin-mode .item-card .delete-btn { display: flex; align-items: center; justify-content: center; }

  .items-grid {
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
  }
  .item-card {
    aspect-ratio: 4 / 3;
    border: 2px solid var(--gold);
    border-radius: 14px;
    background: #111 var(--card-image) center/cover no-repeat;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(245,184,66,0.3);
    transition: transform 0.25s, box-shadow 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .item-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 0 24px rgba(245,184,66,0.55);
  }
  .item-card .name {
    width: 100%;
    text-align: center;
    color: #fff;
    font-weight: 900;
    letter-spacing: 2px;
    font-size: clamp(12px, 1.2vw, 16px);
    padding: 10px 6px;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.9));
    position: absolute;
    bottom: 0; left: 0;
  }

  .add-card {
    aspect-ratio: 4 / 3;
    border: 2px dashed var(--gold);
    border-radius: 14px;
    background: rgba(245,184,66,0.05);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-size: 36px;
    font-weight: 200;
    transition: background 0.2s;
  }
  body.admin-mode .add-card { display: flex; }
  .add-card:hover { background: rgba(245,184,66,0.15); }

  .topic-section-title {
    width: 100%;
    max-width: 1600px;
    margin: 0 auto 16px;
    color: #fff;
    font-size: clamp(16px, 2vw, 22px);
    font-weight: 900;
    letter-spacing: 4px;
    padding-left: 8px;
    border-left: 4px solid var(--gold);
  }

  /* ============================================================
     VIEW 4 · ITEM HUB (tabbed)
     ============================================================ */
  .item-view {
    flex-direction: column;
    padding: 80px 24px 60px;
    overflow-y: auto;
    align-items: center;
  }
  .item-view.hidden { display: none; }

  .hub { width: 100%; max-width: 1200px; }

  .hub-banner {
    position: relative;
    width: 100%;
    border: 2px solid var(--gold);
    border-radius: 18px;
    background: #111 var(--hub-image) center/cover no-repeat;
    height: 280px;
    box-shadow: 0 0 50px rgba(245,184,66,0.4);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .hub-banner::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.85) 100%);
  }
  .hub-banner .meta {
    position: absolute;
    left: 32px; right: 32px; bottom: 24px;
    z-index: 1;
  }
  .hub-banner h2 {
    font-size: clamp(28px, 4.5vw, 56px);
    font-weight: 900;
    letter-spacing: 4px;
    color: #fff;
    text-shadow: 0 4px 25px rgba(0,0,0,0.8);
  }
  .hub-banner .cat {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 4px;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 5px 14px;
    border-radius: 30px;
    background: rgba(0,0,0,0.6);
  }

  .hub-tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid rgba(245,184,66,0.3);
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .hub-tab {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: rgba(255,255,255,0.55);
    padding: 14px 22px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .hub-tab:hover { color: #fff; }
  .hub-tab.active {
    color: var(--gold-bright);
    border-bottom-color: var(--gold);
  }

  .hub-panel { animation: fadeIn 0.3s ease; }
  .hub-panel.hidden { display: none; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hub-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .hub-field {
    border: 1px solid rgba(245,184,66,0.25);
    border-radius: 12px;
    padding: 18px 20px;
    background: rgba(0,0,0,0.5);
  }
  .hub-field .label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .hub-field .value {
    font-size: clamp(18px, 2.2vw, 26px);
    font-weight: 800;
    color: #fff;
    word-break: break-word;
  }
  .hub-field .value.muted { color: rgba(255,255,255,0.4); font-size: 14px; font-weight: 400; }
  .hub-field.kpi .value { font-size: clamp(22px, 2.8vw, 34px); }
  .hub-field.kpi.positive .value { color: #5cd97a; }
  .hub-field.kpi.negative .value { color: #ff6b6b; }

  .hub-block {
    border: 1px solid rgba(245,184,66,0.25);
    border-radius: 12px;
    padding: 22px 26px;
    background: rgba(0,0,0,0.5);
    margin-bottom: 16px;
  }
  .hub-block h4 {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    color: var(--gold);
    margin-bottom: 14px;
  }
  .hub-block p, .hub-block li {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(255,255,255,0.85);
  }
  .hub-block ul, .hub-block ol { padding-left: 22px; }
  .hub-block li { margin-bottom: 6px; }
  .hub-block .empty { color: rgba(255,255,255,0.35); font-style: italic; }

  .hub-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--gold);
    color: #000 !important;
    padding: 12px 24px;
    border-radius: 30px;
    font-weight: 800;
    letter-spacing: 2px;
    font-size: 12px;
    text-decoration: none;
    transition: all 0.2s;
  }
  .hub-link:hover { background: var(--gold-bright); transform: translateY(-2px); }
  .hub-link.outline {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold) !important;
  }
  .hub-link.outline:hover { background: rgba(245,184,66,0.12); }

  .hub-edit {
    margin-bottom: 20px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 10px 22px;
    border-radius: 30px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 3px;
    cursor: pointer;
    display: none;
  }
  body.admin-mode .hub-edit { display: inline-block; }
  .hub-edit:hover { background: rgba(245,184,66,0.15); }

  .save-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--gold);
    color: #000;
    padding: 14px 28px;

  <script>
    const years = [
      { label: 'FLY',  ano: 'ECOSSISTEMA FLY', period: 'SET 2025 — ABR 2026' },
      { label: '2026', ano: 'ANO 2',           period: 'MAI 2026 — ABR 2027' },
      { label: '2027', ano: 'ANO 3',           period: 'MAI 2027 — ABR 2028' },

      { label: '2029', ano: 'ANO 5',           period: 'MAI 2029 — ABR 2030' },
      { label: '2030', ano: 'ANO 6',           period: 'MAI 2030 — ABR 2031' },
      { label: '2031', ano: 'ANO 7',           period: 'MAI 2031 — ABR 2032' }
    ];

    const topics = [
      { name: 'ESTRUTURA<br>CORPORATIVA', key: 'ESTRUTURA CORPORATIVA', angle: -135 },
      { name: 'REDE<br>COMERCIAL',        key: 'REDE COMERCIAL',         angle: -180 },
      { name: 'PARCEIROS<br>ESTRATÉGICOS',key: 'PARCEIROS ESTRATEGICOS', angle:  135 },
      { name: 'PROJETOS',                 key: 'PROJETOS',                angle:   90 },
      { name: 'MARKETING',                key: 'MARKETING',               angle:   45 },
      { name: 'SUSTENTABILIDADE',         key: 'SUSTENTABILIDADE',        angle:    0 },
      { name: 'PRODUTOS',                 key: 'PRODUTOS',                angle:  -45 }
    ];

    /* =====================  STORAGE  ===================== */
    const STORAGE_KEY = 'fly_7anos_data_v1';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return {};
    }
    function saveData() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
      catch (e) { alert('Não foi possível salvar (armazenamento cheio?). Tente imagens menores.'); }
    }
    function getTopic(yearKey, topicKey) {
      data[yearKey] = data[yearKey] || {};
      if (!data[yearKey][topicKey]) {
        data[yearKey][topicKey] = {
          banner: { title: topicKey, image: '', icons: [] },
          pacotes: [],
          items: []
        };
      }
      const t = data[yearKey][topicKey];
      t.banner = t.banner || { title: topicKey, image: '', icons: [] };
      t.banner.icons = t.banner.icons || [];
      t.pacotes = t.pacotes || [];
      t.items = t.items || [];
      // Auto-seed ECOSSISTEMA FLY → ESTRUTURA CORPORATIVA on first access
      if (yearKey === 'ECOSSISTEMA FLY' && topicKey === 'ESTRUTURA CORPORATIVA' && t.items.length === 0) {
        t.banner.title = 'ESTRUTURA CORPORATIVA';
        t.items = ESTRUTURA_CORP_SEED.map(seed => {
          const item = defaultItemShape(seed.name);
          item.descricao = seed.descricao || '';
          item.inclui = seed.inclui || [];
          item.responsavel = seed.responsavel || '';
          item.subitens = (seed.subitens || []).map(s => ({
            id: genId(),
            name: s.name || '',
            descricao: s.descricao || '',
            responsavel: s.responsavel || '',
            responsabilidades: s.responsabilidades || []
          }));
          return item;
        });
        saveData();
      }
      // Auto-seed ECOSSISTEMA FLY → PRODUTOS on first access
      if (yearKey === 'ECOSSISTEMA FLY' && topicKey === 'PRODUTOS' && t.items.length === 0) {
        t.banner.title = 'PRODUTOS';
        t.banner.icons = [
          { label: 'ATRAÇÕES',    image: '' },
          { label: 'HOSPEDAGEM',  image: '' },
          { label: 'ALIMENTAÇÃO', image: '' },
          { label: 'TRANSPORTES', image: '' }
        ];
        t.items = PRODUTOS_SEED.map(seed => {
          const item = defaultItemShape(seed.name);
          item.categoria = seed.categoria || '';
          item.descricao = seed.descricao || '';
          return item;
        });
        saveData();
      }
      return t;
    }

    /* =====================  PRODUTOS — SEED  ===================== */
    const PRODUTOS_SEED = [

      { name: 'BILLIONAIRE',       categoria: 'Pacote',          descricao: 'Pacote Billionaire — alto luxo.' },
      { name: 'DUBAI FAMILY',      categoria: 'Pacote',          descricao: 'Pacote Dubai Family.' },
      { name: 'DUBAI IN LOVE',     categoria: 'Pacote',          descricao: 'Pacote Dubai in Love — viagem romântica.' },
      // Produtos e Serviços
      { name: 'WELCOME EVENT',     categoria: 'Produto/Serviço', descricao: 'Evento de boas-vindas FLY.' },
      { name: 'PRESSKIT',          categoria: 'Produto/Serviço', descricao: 'Presskit oficial FLY.' },

      currentYear = years[idx];

      const halo = document.createElement('div');
      halo.className = 'halo';
      stage.appendChild(halo);

      const ring = document.createElement('div');
      ring.className = 'ring';
      stage.appendChild(ring);

      const mark = document.createElement('div');
      mark.className = 'top-mark';
      mark.innerHTML = '<span>A FLY</span><span class="gold-text">COMPANY ✈</span>';
      stage.appendChild(mark);

      const cc = document.createElement('div');
      cc.className = 'center-circle';
      cc.innerHTML = '<div class="glyph">' + y.label + '</div>';
      stage.appendChild(cc);

      const ct = document.createElement('div');
      ct.className = 'center-text';
      const anoClass = y.ano.length > 8 ? 'ano long' : 'ano';
      ct.innerHTML = '<div class="' + anoClass + '">' + y.ano + '</div><div class="period">' + y.period + '</div>';
      stage.appendChild(ct);

      const ringR  = 35;
      const labelR = 42;

      topics.forEach(t => {
        const rad = t.angle * Math.PI / 180;
        const cos = Math.cos(rad);
        const sin = Math.sin(rad);

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = (50 + ringR * cos) + '%';
        dot.style.top  = (50 + ringR * sin) + '%';
        stage.appendChild(dot);

        const lineLen = labelR - ringR;
        if (lineLen > 0) {
          const line = document.createElement('div');
          line.className = 'topic-link';
          line.style.left = (50 + ringR * cos) + '%';
          line.style.top  = (50 + ringR * sin) + '%';
          line.style.width = lineLen + '%';
          line.style.transform = 'rotate(' + rad + 'rad)';
          stage.appendChild(line);
        }

        const lbl = document.createElement('div');
        lbl.className = 'topic';
        lbl.innerHTML = t.name;
        lbl.style.left = (50 + labelR * cos) + '%';
        lbl.style.top  = (50 + labelR * sin) + '%';
        lbl.addEventListener('click', () => showTopic(t));

        if (cos > 0.3) {
          lbl.style.transform = 'translate(0, -50%)';
          lbl.style.textAlign = 'left';
          lbl.style.paddingLeft = '10px';
        } else if (cos < -0.3) {
          lbl.style.transform = 'translate(-100%, -50%)';
          lbl.style.textAlign = 'right';
          lbl.style.paddingRight = '10px';
        } else {
          lbl.style.textAlign = 'center';
          if (sin > 0) lbl.style.transform = 'translate(-50%, 8px)';
          else         lbl.style.transform = 'translate(-50%, calc(-100% - 8px))';
        }
        stage.appendChild(lbl);
      });

      switchTo('detail');
    }

    function buildCard(entry, cls, onClick, onDelete) {
      const card = document.createElement('div');
      card.className = cls;
      if (entry.image) card.style.setProperty('--card-image', `url("${entry.image}")`);
      card.innerHTML = `<div class="name">${entry.name || ''}</div>`;
      card.addEventListener('click', e => {
        if (e.target.classList.contains('delete-btn')) return;
        onClick();
      });
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '×';
      del.title = 'Remover';
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Remover "' + (entry.name || 'item') + '"?')) onDelete();
      });
      card.appendChild(del);
      return card;
    }

    /* =====================  ITEM HELPERS  ===================== */
    function genId() { return 'i_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
    function defaultItemShape(name = '') {
      return {
        id: genId(),
        name,
        image: '',
        categoria: '',
        descricao: '',
        inclui: [],
        publico: '',
        data: '',
        periodo: '',
        responsavel: '',
        subitens: [],
        financeiro: { faturamento: 0, custos: 0, ticket_medio: 0, custo_implementacao: '' },
        performance: { vendas_mes: 0, crescimento: 0, clientes: 0, historico: [] },
        operacao: { fornecedores: [], estrutura: '', etapas: [], observacoes: '' },
        marketing: { estrategia: '', canais: [] },
        midia: { fotos: [], referencias: [], videos: [], video_ia: '' },
        cronograma: [],
        documentos: { link_principal: '', links_adicionais: [] }
      };
    }
    function normalizeItem(it) {
      const base = defaultItemShape();
      if (!it.descricao && it.description) it.descricao = it.description;
      it.id = it.id || base.id;
      it.categoria = it.categoria || '';
      it.descricao = it.descricao || '';
      it.inclui = Array.isArray(it.inclui) ? it.inclui : [];
      it.publico = it.publico || '';
      it.data = it.data || '';
      it.periodo = it.periodo || '';
      it.responsavel = it.responsavel || '';
      it.subitens = Array.isArray(it.subitens) ? it.subitens.map(s => ({
        id: s.id || genId(),
        name: s.name || '',
        descricao: s.descricao || '',
        responsavel: s.responsavel || '',
        responsabilidades: Array.isArray(s.responsabilidades) ? s.responsabilidades : []
      })) : [];
      it.financeiro = Object.assign({}, base.financeiro, it.financeiro || {});
      it.performance = Object.assign({}, base.performance, it.performance || {});
      it.performance.historico = Array.isArray(it.performance.historico) ? it.performance.historico : [];
      it.operacao = Object.assign({}, base.operacao, it.operacao || {});
      it.operacao.fornecedores = Array.isArray(it.operacao.fornecedores) ? it.operacao.fornecedores : [];
      it.operacao.etapas = Array.isArray(it.operacao.etapas) ? it.operacao.etapas : [];
      it.marketing = Object.assign({}, base.marketing, it.marketing || {});
      it.marketing.canais = Array.isArray(it.marketing.canais) ? it.marketing.canais : [];
      it.midia = Object.assign({}, base.midia, it.midia || {});
      it.midia.fotos = Array.isArray(it.midia.fotos) ? it.midia.fotos : [];
      it.midia.referencias = Array.isArray(it.midia.referencias) ? it.midia.referencias : [];
      it.midia.videos = Array.isArray(it.midia.videos) ? it.midia.videos : [];
      it.cronograma = Array.isArray(it.cronograma) ? it.cronograma : [];
      it.documentos = Object.assign({}, base.documentos, it.documentos || {});
      it.documentos.links_adicionais = Array.isArray(it.documentos.links_adicionais) ? it.documentos.links_adicionais : [];
      return it;
    }
    function fmtDate(s) {
      if (!s) return '';
      const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[3]}/${m[2]}/${m[1]}`;
      return s;
    }
    function fmtCurrency(n) {
      const num = Number(n) || 0;
      return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 2 });
    }
    function fmtNumber(n) { return (Number(n) || 0).toLocaleString('pt-BR'); }
    function calcLucro(f) { return (Number(f.faturamento)||0) - (Number(f.custos)||0); }
    function calcMargem(f) {
      const fat = Number(f.faturamento) || 0;
      if (!fat) return 0;
      return (calcLucro(f) / fat) * 100;
    }

      requestAnimationFrame(() => toast.classList.add('show'));

      if (view === 'grid')   gridView.classList.remove('hidden');

      if (view === 'item')   { itemView.classList.remove('hidden');   document.body.classList.add('item-mode');  window.scrollTo(0,0); }
      currentView = view;
    }

    /* =====================  FILE -> DATA URL  ===================== */
    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve('');
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    /* compress images so we don't blow localStorage */
    async function compressImage(file, maxW = 1400, quality = 0.82) {
      if (!file) return '';
      const dataUrl = await fileToDataURL(file);
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxW / img.width);
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

          <input type="number" id="m_tic" step="0.01" value="${it.financeiro.ticket_medio||0}" />
          <label>DESCRIÇÃO DE CUSTO PARA IMPLEMENTAR</label>
          <textarea id="m_custo_impl" placeholder="Detalhe os custos envolvidos para implementar este produto...">${escapeHtml(it.financeiro.custo_implementacao || '')}</textarea>
          <p style="margin-top:14px; font-size:11px; color:rgba(255,255,255,0.5); letter-spacing:1px;">
            Lucro e margem são calculados automaticamente.
          </p>
        </div>

        <div class="modal-panel hidden" data-mpanel="perf">
          <label>VENDAS NO MÊS</label>
          <input type="number" id="m_vendas" value="${it.performance.vendas_mes||0}" />
          <label>CRESCIMENTO (%)</label>
          <input type="number" id="m_cresc" step="0.1" value="${it.performance.crescimento||0}" />
          <label>Nº DE CLIENTES</label>
          <input type="number" id="m_cli" value="${it.performance.clientes||0}" />
          <label>HISTÓRICO (uma entrada por linha)</label>
          <textarea id="m_hist" placeholder="Ex: Jan/2026 — 50 vendas">${escapeHtml((it.performance.historico||[]).map(h => typeof h === 'string' ? h : (h.periodo + ' — ' + h.valor)).join('\n'))}</textarea>
        </div>

        <div class="modal-panel hidden" data-mpanel="op">
          <label>FORNECEDORES ENVOLVIDOS</label>
          ${renderListEditor('fornecedores', it.operacao.fornecedores, 'Nome do fornecedor')}
          <label>ESTRUTURA NECESSÁRIA</label>
          <textarea id="m_estr">${escapeHtml(it.operacao.estrutura || '')}</textarea>
          <label>ETAPAS DO SERVIÇO</label>
          ${renderListEditor('etapas', it.operacao.etapas, 'Etapa')}
          <label>OBSERVAÇÕES OPERACIONAIS</label>
          <textarea id="m_obs">${escapeHtml(it.operacao.observacoes || '')}</textarea>
        </div>

        <div class="modal-panel hidden" data-mpanel="mkt">
          <label>ESTRATÉGIA DE MARKETING</label>
          <textarea id="m_mkt_estrat" placeholder="Posicionamento, público, abordagem...">${escapeHtml(it.marketing.estrategia || '')}</textarea>
          <label>CANAIS / AÇÕES</label>
          ${renderListEditor('canais', it.marketing.canais, 'Ex: Instagram, Email, Influenciadores')}
        </div>

        <div class="modal-panel hidden" data-mpanel="media">
          <label>FOTOS DO PRODUTO</label>
          <p style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px;">Fotos do que tem dentro do produto.</p>
          <div class="upload-zone" id="up_fotos">📷 CLIQUE PARA CARREGAR FOTOS (várias permitidas)</div>
          <input type="file" id="m_fotos_in" accept="image/*" multiple style="display:none;" />
          <div class="media-grid" id="prev_fotos" style="margin-top:8px;">
            ${it.midia.fotos.map((src, i) => `
              <div class="media-thumb" data-rm="fotos" data-rm-i="${i}" style="background-image:url('${src}'); cursor:default;">
                <button class="rm" data-rm-btn="fotos" data-rm-bi="${i}" type="button">×</button>
              </div>`).join('')}
          </div>

          <label style="margin-top:18px;">REFERÊNCIAS VISUAIS</label>
          <div class="upload-zone" id="up_ref">🎨 CLIQUE PARA CARREGAR REFERÊNCIAS</div>
          <input type="file" id="m_ref_in" accept="image/*" multiple style="display:none;" />
          <div class="media-grid" id="prev_ref" style="margin-top:8px;">
            ${it.midia.referencias.map((src, i) => `
              <div class="media-thumb" data-rm="referencias" data-rm-i="${i}" style="background-image:url('${src}'); cursor:default;">
                <button class="rm" data-rm-btn="referencias" data-rm-bi="${i}" type="button">×</button>
              </div>`).join('')}
          </div>

          <label style="margin-top:18px;">VÍDEO DE IA (link)</label>
          <input type="text" id="m_video_ia" value="${escapeHtml(it.midia.video_ia || '')}" placeholder="https://..." />

          <label>CONTEÚDO DO PRODUTO (vídeos)</label>
          <p style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px;">Cole links de YouTube, Vimeo, Drive, etc.</p>
          <div id="le_videos">
            ${it.midia.videos.map(v => {
              const titulo = typeof v === 'string' ? '' : (v.titulo || '');
              const url = typeof v === 'string' ? v : (v.url || '');
              return `<div class="list-row">
                <input type="text" class="lv_titulo" value="${escapeHtml(titulo)}" placeholder="Título" />
                <input type="text" class="lv_url" value="${escapeHtml(url)}" placeholder="https://..." />
                <button class="modal-btn lv_del" type="button">×</button>
              </div>`;
            }).join('')}
          </div>
          <button class="modal-btn list-add" type="button" data-add="videos">+ ADICIONAR VÍDEO</button>
        </div>

        <div class="modal-panel hidden" data-mpanel="cron">
          <label>LINHA DO TEMPO · EXECUÇÃO</label>
          <p style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px;">Cada item é uma fase com data, título e descrição.</p>
          <div id="le_cron">
            ${it.cronograma.map(c => `
              <div class="input-row-vertical">
                <button class="rm-row" type="button">×</button>
                <input type="date" class="cr_data" value="${escapeHtml(c.data || '')}" />
                <input type="text" class="cr_titulo" value="${escapeHtml(c.titulo || '')}" placeholder="Título da fase" />
                <textarea class="cr_desc" placeholder="Descrição">${escapeHtml(c.descricao || '')}</textarea>
              </div>`).join('')}
          </div>
          <button class="modal-btn list-add" type="button" data-add="cron">+ ADICIONAR FASE</button>
        </div>

        <div class="modal-panel hidden" data-mpanel="docs">
          <label>LINK PRINCIPAL (Google Docs ou outro)</label>
          <input type="text" id="m_doc_main" value="${escapeHtml(it.documentos.link_principal || '')}" placeholder="https://docs.google.com/..." />
          <label>LINKS ADICIONAIS</label>
          ${renderLinksEditor(it.documentos.links_adicionais || [])}
        </div>

        <div class="modal-actions">
          <button class="modal-btn" id="m_cancel" type="button">CANCELAR</button>
          <button class="modal-btn primary" id="m_save" type="button">SALVAR</button>
        </div>
      `;
      modalOverlay.classList.add('active');

      // Tab switching
      modal.querySelectorAll('.modal-tab').forEach(b => {
        b.addEventListener('click', () => {
          modal.querySelectorAll('.modal-tab').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          modal.querySelectorAll('.modal-panel').forEach(p => p.classList.add('hidden'));
          modal.querySelector('.modal-panel[data-mpanel="' + b.dataset.mtab + '"]').classList.remove('hidden');
        });
      });

      // Image upload (banner)
      modal.querySelector('#m_image').addEventListener('change', async (e) => {
        if (e.target.files[0]) {
          pendingImage = await compressImage(e.target.files[0]);
          modal.querySelector('#m_preview').style.backgroundImage = `url('${pendingImage}')`;
        }
      });

      // Pending media buffers (so we can save them on submit)
      const pendingMedia = {
        fotos: [...it.midia.fotos],
        referencias: [...it.midia.referencias]
      };

      function refreshGallery(coll) {
        const grid = modal.querySelector(coll === 'fotos' ? '#prev_fotos' : '#prev_ref');
        grid.innerHTML = pendingMedia[coll].map((src, i) => `
          <div class="media-thumb" style="background-image:url('${src}'); cursor:default;">
            <button class="rm" data-rm-btn="${coll}" data-rm-bi="${i}" type="button">×</button>
          </div>`).join('');
      }

      // Multi-image upload zones
      function bindUploadZone(zoneId, inputId, coll) {
        const zone = modal.querySelector(zoneId);
        const input = modal.querySelector(inputId);
        zone.addEventListener('click', () => input.click());
        input.addEventListener('change', async () => {
          const files = [...(input.files || [])];
          for (const file of files) {
            const compressed = await compressImage(file, 900, 0.75);
            pendingMedia[coll].push(compressed);
          }
          input.value = '';
          refreshGallery(coll);
        });
      }
      bindUploadZone('#up_fotos', '#m_fotos_in', 'fotos');
      bindUploadZone('#up_ref',   '#m_ref_in',   'referencias');

      // Dynamic list buttons (delegation)
      modal.addEventListener('click', (e) => {
        if (e.target.classList.contains('le_del') ||
            e.target.classList.contains('ll_del') ||
            e.target.classList.contains('lv_del')) {
          e.target.closest('.list-row').remove();
          return;
        }
        if (e.target.classList.contains('rm-row')) {
          e.target.closest('.input-row-vertical').remove();
          return;
        }
        if (e.target.dataset && e.target.dataset.rmBtn) {
          const coll = e.target.dataset.rmBtn;
          const i = +e.target.dataset.rmBi;
          pendingMedia[coll].splice(i, 1);
          refreshGallery(coll);
          return;
        }
        if (e.target.dataset && e.target.dataset.add) {
          const which = e.target.dataset.add;
          if (which === 'links') {
            const div = document.createElement('div');
            div.className = 'list-row';
            div.innerHTML = `<input type="text" class="ll_label" placeholder="Rótulo" /><input type="text" class="ll_url" placeholder="https://..." /><button class="modal-btn ll_del" type="button">×</button>`;
            modal.querySelector('#le_links').appendChild(div);
          } else if (which === 'videos') {
            const div = document.createElement('div');
            div.className = 'list-row';
            div.innerHTML = `<input type="text" class="lv_titulo" placeholder="Título" /><input type="text" class="lv_url" placeholder="https://..." /><button class="modal-btn lv_del" type="button">×</button>`;
            modal.querySelector('#le_videos').appendChild(div);
          } else if (which === 'cron') {
            const div = document.createElement('div');
            div.className = 'input-row-vertical';
            div.innerHTML = `
              <button class="rm-row" type="button">×</button>
              <input type="date" class="cr_data" />
              <input type="text" class="cr_titulo" placeholder="Título da fase" />
              <textarea class="cr_desc" placeholder="Descrição"></textarea>`;
            modal.querySelector('#le_cron').appendChild(div);
          } else if (which === 'sub') {
            const div = document.createElement('div');
            div.className = 'input-row-vertical';
            div.innerHTML = `
              <button class="rm-row" type="button">×</button>
              <input type="text" class="su_name" placeholder="Nome do subsetor" />
              <input type="text" class="su_resp" placeholder="Responsável" />
              <textarea class="su_desc" placeholder="Descrição"></textarea>
              <textarea class="su_resps" placeholder="Responsabilidades (uma por linha)"></textarea>`;
            modal.querySelector('#le_sub').appendChild(div);
          } else {
            const div = document.createElement('div');
            div.className = 'list-row';
            const ph = e.target.dataset.placeholder || '';
            div.innerHTML = `<input type="text" class="le_input" placeholder="${ph}" /><button class="modal-btn le_del" type="button">×</button>`;
            modal.querySelector('#le_' + which).appendChild(div);
          }
        }
      });

      modal.querySelector('#m_cancel').addEventListener('click', closeModal);
      modal.querySelector('#m_save').addEventListener('click', () => {
        function readList(name) {
          return [...modal.querySelectorAll(`#le_${name} .le_input`)]
            .map(i => i.value.trim())
            .filter(Boolean);
        }
        function readLinks() {
          const out = [];
          modal.querySelectorAll('#le_links .list-row').forEach(r => {
            const url = r.querySelector('.ll_url').value.trim();
            if (!url) return;
            const label = r.querySelector('.ll_label').value.trim();
            out.push({ label, url });
          });
          return out;
        }
        const histLines = (modal.querySelector('#m_hist').value || '')
          .split('\n').map(s => s.trim()).filter(Boolean);

        function readVideos() {
          const out = [];
          modal.querySelectorAll('#le_videos .list-row').forEach(r => {
            const url = r.querySelector('.lv_url').value.trim();
            if (!url) return;
            const titulo = r.querySelector('.lv_titulo').value.trim();
            out.push({ titulo, url });
          });
          return out;
        }
        function readCronograma() {
          const out = [];
          modal.querySelectorAll('#le_cron .input-row-vertical').forEach(r => {
            const titulo = r.querySelector('.cr_titulo').value.trim();
            const data = r.querySelector('.cr_data').value;
            const descricao = r.querySelector('.cr_desc').value;
            if (!titulo && !data && !descricao) return;
            out.push({ data, titulo, descricao });
          });
          return out;
        }
        function readSubitens() {
          const out = [];
          modal.querySelectorAll('#le_sub .input-row-vertical').forEach(r => {
            const name = r.querySelector('.su_name').value.trim();
            const responsavel = r.querySelector('.su_resp').value.trim();
            const descricao = r.querySelector('.su_desc').value;
            const respsTxt = r.querySelector('.su_resps').value || '';
            const responsabilidades = respsTxt.split('\n').map(s => s.trim()).filter(Boolean);
            if (!name && !descricao && !responsavel && !responsabilidades.length) return;
            out.push({ id: genId(), name, responsavel, descricao, responsabilidades });
          });
          return out;
        }

        const updated = {
          id: it.id,
          name: modal.querySelector('#m_name').value.trim(),
          image: pendingImage,
          categoria: modal.querySelector('#m_cat').value.trim(),
          descricao: modal.querySelector('#m_desc').value,
          inclui: readList('inclui'),
          publico: modal.querySelector('#m_publico').value.trim(),
          data: modal.querySelector('#m_data').value,
          periodo: modal.querySelector('#m_periodo').value.trim(),
          responsavel: modal.querySelector('#m_resp').value.trim(),
          subitens: readSubitens(),
          financeiro: {
            faturamento: Number(modal.querySelector('#m_fat').value) || 0,
            custos:      Number(modal.querySelector('#m_cus').value) || 0,
            ticket_medio:Number(modal.querySelector('#m_tic').value) || 0,
            custo_implementacao: modal.querySelector('#m_custo_impl').value
          },
          performance: {
            vendas_mes:  Number(modal.querySelector('#m_vendas').value) || 0,
            crescimento: Number(modal.querySelector('#m_cresc').value)  || 0,
            clientes:    Number(modal.querySelector('#m_cli').value)    || 0,
            historico:   histLines
          },
          operacao: {
            fornecedores: readList('fornecedores'),
            estrutura:    modal.querySelector('#m_estr').value,
            etapas:       readList('etapas'),
            observacoes:  modal.querySelector('#m_obs').value
          },
          marketing: {
            estrategia: modal.querySelector('#m_mkt_estrat').value,
            canais:     readList('canais')
          },
          midia: {
            fotos:       pendingMedia.fotos,
            referencias: pendingMedia.referencias,
            videos:      readVideos(),
            video_ia:    modal.querySelector('#m_video_ia').value.trim()
          },
          cronograma: readCronograma(),
          documentos: {
            link_principal:    modal.querySelector('#m_doc_main').value.trim(),
            links_adicionais:  readLinks()
          }
        };
        updated.description = updated.descricao; // backwards-compat

        let savedIdx = idx;
        if (editing) list[idx] = updated;
        else { list.push(updated); savedIdx = list.length - 1; }
        saveData();
        closeModal();
        modal.className = 'modal'; // reset
        showToast(editing ? 'ITEM ATUALIZADO' : 'ITEM CRIADO');
        if (currentView === 'item') showItem(topicData, kind, savedIdx);
        else showTopic(currentTopic);
      });
    }

    function openBannerEditor(topicData) {
      const b = topicData.banner;
      const iconsHtml = (b.icons || []).map((ic, i) => `
        <div style="display:flex; gap:8px; align-items:center; margin-top:8px; padding:8px; border:1px solid rgba(245,184,66,0.25); border-radius:8px;">
          <div style="width:60px; height:40px; background:#111 ${ic.image ? `url('${ic.image}')` : ''} center/cover; border:1px solid var(--gold); border-radius:6px;"></div>
          <input type="text" data-icon-idx="${i}" class="ic_label" value="${escapeHtml(ic.label || '')}" placeholder="Rótulo" style="flex:1;" />
          <input type="file" data-icon-idx="${i}" class="ic_file" accept="image/*" style="max-width:120px;" />
          <button class="modal-btn" data-icon-remove="${i}">×</button>
        </div>
      `).join('');
      modal.innerHTML = `
        <h3>EDITAR BANNER</h3>
        <label>TÍTULO</label>
        <input type="text" id="b_title" value="${escapeHtml(b.title || '')}" />
        <label>IMAGEM DE FUNDO</label>
        <input type="file" id="b_image" accept="image/*" />
        <div class="preview-img" id="b_preview" style="${b.image ? `background-image:url('${b.image}')` : ''}"></div>
        <label>ÍCONES (canto superior direito)</label>
        <div id="b_icons">${iconsHtml}</div>
        <button class="modal-btn" id="b_addIcon" style="margin-top:10px;">+ ADICIONAR ÍCONE</button>
        <div class="modal-actions">
          <button class="modal-btn" id="b_cancel">CANCELAR</button>
          <button class="modal-btn primary" id="b_save">SALVAR</button>
        </div>
      `;
      modalOverlay.classList.add('active');
      let pendingBgImage = b.image || '';
      const iconImageBuffers = (b.icons || []).map(ic => ic.image || '');

      modal.querySelector('#b_image').addEventListener('change', async (e) => {
        if (e.target.files[0]) {
          pendingBgImage = await compressImage(e.target.files[0]);
          modal.querySelector('#b_preview').style.backgroundImage = `url('${pendingBgImage}')`;
        }
      });

      modal.querySelectorAll('.ic_file').forEach(inp => {
        inp.addEventListener('change', async (e) => {
          const i = +inp.dataset.iconIdx;
          if (e.target.files[0]) {
            iconImageBuffers[i] = await compressImage(e.target.files[0], 400, 0.8);
          }
        });
      });
      modal.querySelectorAll('[data-icon-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = +btn.dataset.iconRemove;
          b.icons.splice(i, 1);
          iconImageBuffers.splice(i, 1);
          openBannerEditor(topicData);
        });
      });
      modal.querySelector('#b_addIcon').addEventListener('click', () => {
        b.icons = b.icons || [];
        b.icons.push({ label: '', image: '' });
        openBannerEditor(topicData);
      });

      modal.querySelector('#b_cancel').addEventListener('click', closeModal);
      modal.querySelector('#b_save').addEventListener('click', () => {
        b.title = modal.querySelector('#b_title').value.trim();
        b.image = pendingBgImage;
        b.icons = (b.icons || []).map((ic, i) => ({
          label: modal.querySelector(`.ic_label[data-icon-idx="${i}"]`).value.trim(),
          image: iconImageBuffers[i] || ''
        }));
        saveData();
        closeModal();
        showTopic(currentTopic);
      });
    }

    /* =====================  KEYBOARD  ===================== */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (modalOverlay.classList.contains('active')) closeModal();
        else backBtn.click();
      }
    });
  </script>
</body>
</html>
