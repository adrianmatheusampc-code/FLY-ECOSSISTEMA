              <div class="lbl">Novo Passeio</div>
            </div>
          </div>
        </div>

        <div class="dbx-block">
          <div class="dbx-block-head">
            <h3>✓ O que está incluso</h3>
            <div class="dbx-block-actions">
              <button class="dbx-mini-btn" data-add="inc">+ Adicionar Item</button>
            </div>
          </div>

                  <button class="dbx-act-btn" data-edit="inc" data-idx="${idx}" title="Editar">✎</button>
                  <button class="dbx-act-btn danger" data-del="inc" data-idx="${idx}" title="Excluir">✕</button>

            <div class="dbx-add-row" data-add="inc">

              <span>Adicionar item incluído (hotel, transporte, refeições...)</span>

    function dbxBindProduto(panelEl, D, item) {
      // Editar info geral do produto
      const infoBtn = panelEl.querySelector('[data-edit="produto-info"]');
      if (infoBtn) {
        infoBtn.addEventListener('click', () => {
          dbxOpenModal({
            title: 'Editar Info do Produto',
            fields: [
              { key: 'nome', label: 'Nome', type: 'text' },
              { key: 'duracao', label: 'Duração', type: 'text', placeholder: 'Ex: 7 dias / 6 noites' },
              { key: 'tipo', label: 'Tipo / Tags', type: 'text', placeholder: 'Ex: Aventura · Premium' },
              { key: 'descricao', label: 'Descrição', type: 'textarea' }
            ],
            values: {
              nome: D.produto.nome || '',
              duracao: D.produto.duracao || '',
              tipo: D.produto.tipo || '',
              descricao: D.produto.descricao || ''
            },
            onSave: (vals) => {
              D.produto.nome = vals.nome;
              D.produto.duracao = vals.duracao;
              D.produto.tipo = vals.tipo;
              D.produto.descricao = vals.descricao;
              // Atualizar título no hero também
              const heroH1 = document.querySelector('.dbx-hero-content h1');
              const heroMeta = document.querySelector('.dbx-hero-content .dbx-meta');
              if (heroH1) heroH1.textContent = vals.nome;
              if (heroMeta) heroMeta.innerHTML = `<span>⏱ ${escapeHtml(vals.duracao)}</span><span class="dot">·</span><span>✦ ${escapeHtml(vals.tipo)}</span>`;
              dbxRefresh(D, item);
            }
          });
        });
      }

      // Adicionar / Editar / Excluir Experiência
      function openExpModal(idx) {
        const isEdit = idx !== undefined && idx !== null;
        const cur = isEdit ? D.produto.experiencias[idx] : { nome: '', icon: '★', desc: '', photo: '' };
        dbxOpenModal({
          title: isEdit ? 'Editar Passeio' : 'Novo Passeio',
          fields: [
            { key: 'photo', label: 'Foto do passeio', type: 'photo' },
            { key: 'icon', label: 'Ícone (emoji)', type: 'text', placeholder: 'Ex: 🏙️ 🏜️ ⛵' },
            { key: 'nome', label: 'Nome', type: 'text', placeholder: 'Ex: Burj Khalifa' },
            { key: 'desc', label: 'Descrição', type: 'textarea', placeholder: 'O que o cliente vai viver...' }
          ],
          values: cur,
          onSave: (vals) => {
            if (isEdit) {
              D.produto.experiencias[idx] = { ...D.produto.experiencias[idx], ...vals };
            } else {
              D.produto.experiencias.push(vals);
            }
            dbxRefresh(D, item);
          }
        });
      }
      panelEl.querySelectorAll('[data-add="exp"]').forEach(b => b.addEventListener('click', () => openExpModal()));
      panelEl.querySelectorAll('[data-edit="exp"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        openExpModal(parseInt(b.dataset.idx, 10));
      }));
      panelEl.querySelectorAll('[data-del="exp"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = parseInt(b.dataset.idx, 10);
        if (dbxConfirm(`Excluir o passeio "${D.produto.experiencias[i].nome}"?`)) {
          D.produto.experiencias.splice(i, 1);
          dbxRefresh(D, item);
        }
      }));

      // Adicionar / Editar / Excluir Incluso
      function openIncModal(idx) {
        const isEdit = idx !== undefined && idx !== null;
        const cur = isEdit ? D.produto.incluso[idx] : { lbl: '', val: '' };
        dbxOpenModal({
          title: isEdit ? 'Editar Item Incluso' : 'Novo Item Incluso',
          fields: [
            { key: 'lbl', label: 'Categoria', type: 'text', placeholder: 'Ex: Hospedagem, Transporte, Refeições' },
            { key: 'val', label: 'Detalhes', type: 'textarea', placeholder: 'Ex: Atlantis The Palm · Suíte Ocean View · 6 noites' }
          ],
          values: cur,
          onSave: (vals) => {
            if (isEdit) {
              D.produto.incluso[idx] = vals;
            } else {
              D.produto.incluso.push(vals);
            }
            dbxRefresh(D, item);
          }
        });
      }
      panelEl.querySelectorAll('[data-add="inc"]').forEach(b => b.addEventListener('click', () => openIncModal()));
      panelEl.querySelectorAll('[data-edit="inc"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        openIncModal(parseInt(b.dataset.idx, 10));
      }));
      panelEl.querySelectorAll('[data-del="inc"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = parseInt(b.dataset.idx, 10);
        if (dbxConfirm(`Excluir o item "${D.produto.incluso[i].lbl}"?`)) {
          D.produto.incluso.splice(i, 1);
          dbxRefresh(D, item);
        }
      }));
    }

    /* ===== PAINEL: CUSTOS ===== */
    function dbxRenderCustos(D, fin) {
      const fixos = D.custos.fixos || [];
      const vars  = D.custos.variaveis || [];
      const totalFixo = fixos.reduce((s,c) => s + (Number(c.valor)||0), 0);
      const totalVarPorCliente = vars.reduce((s,c) => s + (Number(c.valor)||0), 0);
      const totalVarTurma = totalVarPorCliente * fin.totalClientes;
      const breakeven = fin.ticket > 0 ? Math.ceil(totalFixo / Math.max(1, (fin.ticket - totalVarPorCliente))) : 0;

      return `
        <div class="dbx-panel-head">
          <h2><span class="ico">💰</span>Custos · A raiz do lucro</h2>
        </div>

        <div class="dbx-stats-grid">
          <div class="dbx-stat"><div class="lbl">Custo Fixo Total</div><div class="val">${dbxFmtMoney(totalFixo)}</div></div>
          <div class="dbx-stat"><div class="lbl">Custo Variável / cliente</div><div class="val">${dbxFmtMoney(totalVarPorCliente)}</div></div>
          <div class="dbx-stat"><div class="lbl">Variável Total (turma)</div><div class="val">${dbxFmtMoney(totalVarTurma)}</div></div>
          <div class="dbx-stat highlight"><div class="lbl">Break-even</div><div class="val">${breakeven} clientes</div></div>
        </div>

        <div class="dbx-2col">
          <div class="dbx-block">
            <div class="dbx-block-head">
              <h3>Custos Fixos · Independem da turma</h3>
              <div class="dbx-block-actions">
                <button class="dbx-mini-btn" data-add="custo-fixo">+ Adicionar</button>
              </div>
            </div>
            <div class="dbx-list">
              ${fixos.map((c, i) => `
                <div class="dbx-list-row dbx-editable" data-idx="${i}">
                  <div class="dbx-card-actions">
                    <button class="dbx-act-btn" data-edit="custo-fixo" data-idx="${i}" title="Editar">✎</button>
                    <button class="dbx-act-btn danger" data-del="custo-fixo" data-idx="${i}" title="Excluir">✕</button>
                  </div>
                  <span>${escapeHtml(c.nome)}</span>
                  <strong>${dbxFmtMoney(c.valor)}</strong>
                </div>
              `).join('')}
              <div class="dbx-add-row" data-add="custo-fixo">
                <span style="font-size:18px;">+</span>
                <span>Adicionar custo fixo</span>
              </div>
              <div class="dbx-list-total"><span>Total Fixo</span><strong>${dbxFmtMoney(totalFixo)}</strong></div>
            </div>
          </div>
          <div class="dbx-block">
            <div class="dbx-block-head">
              <h3>Custos Variáveis · Por cliente</h3>
              <div class="dbx-block-actions">
                <button class="dbx-mini-btn" data-add="custo-var">+ Adicionar</button>
              </div>
            </div>
            <div class="dbx-list">
              ${vars.map((c, i) => `
                <div class="dbx-list-row dbx-editable" data-idx="${i}">
                  <div class="dbx-card-actions">
                    <button class="dbx-act-btn" data-edit="custo-var" data-idx="${i}" title="Editar">✎</button>
                    <button class="dbx-act-btn danger" data-del="custo-var" data-idx="${i}" title="Excluir">✕</button>
                  </div>
                  <span>${escapeHtml(c.nome)}</span>
                  <strong>${dbxFmtMoney(c.valor)}</strong>
                </div>
              `).join('')}
              <div class="dbx-add-row" data-add="custo-var">
                <span style="font-size:18px;">+</span>
                <span>Adicionar custo variável</span>
              </div>
              <div class="dbx-list-total"><span>Total / cliente</span><strong>${dbxFmtMoney(totalVarPorCliente)}</strong></div>
            </div>
          </div>
        </div>

        <div class="dbx-callout">
          <div class="dbx-callout-icon">📈</div>
          <div>
            <h4>E se eu vender mais 10 clientes?</h4>
            <p>+${dbxFmtMoney(10 * (fin.ticket - totalVarPorCliente))} de lucro extra · custo fixo já pago.</p>
          </div>
        </div>
      `;
    }

    function dbxBindCustos(panelEl, D, item) {

        openCustoModal('fixo', parseInt(b.dataset.idx, 10));

      panelEl.querySelectorAll('[data-edit="custo-var"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        openCustoModal('var', parseInt(b.dataset.idx, 10));
      }));
      panelEl.querySelectorAll('[data-del="custo-fixo"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = parseInt(b.dataset.idx, 10);
        if (dbxConfirm(`Excluir custo fixo "${D.custos.fixos[i].nome}"?`)) {
          D.custos.fixos.splice(i, 1);
          dbxRefresh(D, item);
        }
      }));

    /* ===== PAINEL: VENDAS ===== */
    function dbxRenderVendas(D, fin) {
      const origem = D.vendas.origem || {};
      const total = Object.values(origem).reduce((s,v) => s+v, 0) || 1;
      return `
        <div class="dbx-panel-head">
          <h2><span class="ico">📊</span>Vendas · De onde veio o dinheiro</h2>
          <div class="dbx-actions">
            <button class="dbx-mini-btn" data-edit="ticket">✎ Editar Ticket Médio</button>
          </div>
        </div>
        <div class="dbx-stats-grid">
          <div class="dbx-stat"><div class="lbl">Vendidos</div><div class="val">${fin.totalClientes}</div></div>
          <div class="dbx-stat"><div class="lbl">Receita Total</div><div class="val">${dbxFmtMoney(fin.totalReceita)}</div></div>
          <div class="dbx-stat"><div class="lbl">Ticket Médio</div><div class="val">${dbxFmtMoney(fin.ticket)}</div></div>
          <div class="dbx-stat"><div class="lbl">Receita + Upsell</div><div class="val">${dbxFmtMoney(fin.totalReceita + fin.upsellReceita)}</div></div>
        </div>
        <div class="dbx-block">
          <div class="dbx-block-head">
            <h3>Origem das vendas</h3>
            <div class="dbx-block-actions">
              <button class="dbx-mini-btn" data-add="origem">+ Adicionar Origem</button>
            </div>
          </div>
          <div class="dbx-origem">
            ${Object.entries(origem).map(([nome, qty]) => {
              const pct = (qty / total * 100).toFixed(0);
              return `
                <div class="dbx-origem-row dbx-editable" data-key="${escapeHtml(nome)}">
                  <div class="dbx-card-actions">
                    <button class="dbx-act-btn" data-edit="origem" data-key="${escapeHtml(nome)}" title="Editar">✎</button>
                    <button class="dbx-act-btn danger" data-del="origem" data-key="${escapeHtml(nome)}" title="Excluir">✕</button>
                  </div>
                  <div class="dbx-origem-name">${escapeHtml(nome)}</div>
                  <div class="dbx-origem-bar">
                    <div class="dbx-origem-fill" style="width:${pct}%"></div>
                  </div>
                  <div class="dbx-origem-val">${qty} <span>(${pct}%)</span></div>
                </div>
              `;
            }).join('')}
          </div>
          <p class="dbx-empty" style="margin-top:10px; font-size:11px;">💡 Dica: a origem também é atualizada automaticamente quando você adiciona/edita clientes.</p>
        </div>
      `;
    }

    function dbxBindVendas(panelEl, D, item) {
      // Editar ticket médio
      const ticketBtn = panelEl.querySelector('[data-edit="ticket"]');
      if (ticketBtn) {
        ticketBtn.addEventListener('click', () => {
          const antes = D.vendas.ticketMedio || 0;
          dbxOpenModal({
            title: 'Editar Ticket Médio',
            fields: [
              { key: 'ticketMedio', label: 'Valor do pacote por cliente (R$)', type: 'number', step: '0.01' },
              { key: 'justificativa', label: '💬 Justificativa (motivo da alteração)', type: 'textarea' }
            ],
            values: { ticketMedio: antes, justificativa: '' },
            onSave: (vals) => {
              const depois = Number(vals.ticketMedio) || 0;
              if (depois !== antes) {
                flyLogChange({
                  tipo: 'PRECO',
                  campo: 'Ticket médio',
                  antes: 'R$ ' + antes.toLocaleString('pt-BR'),
                  depois: 'R$ ' + depois.toLocaleString('pt-BR'),
                  contexto: item.name || 'pacote',
                  justificativa: vals.justificativa || ''
                });
              }
              D.vendas.ticketMedio = depois;
              dbxRefresh(D, item);
            }
          });
        });
      }

      // Adicionar / editar / excluir origem
      function openOrigemModal(keyOrig) {
        const isEdit = keyOrig !== undefined && keyOrig !== null && keyOrig !== '';
        const cur = isEdit
          ? { nome: keyOrig, qty: D.vendas.origem[keyOrig] || 0 }
          : { nome: '', qty: 1 };
        dbxOpenModal({
          title: isEdit ? 'Editar Origem' : 'Nova Origem',
          fields: [
            { key: 'nome', label: 'Nome da origem', type: 'text', placeholder: 'Ex: Tráfego Pago, Influenciador, Indicação...' },
            { key: 'qty', label: 'Quantas vendas vieram dessa origem', type: 'number', min: 0 }
          ],
          values: cur,
          onSave: (vals) => {
            if (isEdit && keyOrig !== vals.nome) {
              delete D.vendas.origem[keyOrig];
            }
            D.vendas.origem[vals.nome] = Number(vals.qty) || 0;
            dbxRefresh(D, item);
          }
        });
      }
      panelEl.querySelectorAll('[data-add="origem"]').forEach(b => b.addEventListener('click', () => openOrigemModal()));
      panelEl.querySelectorAll('[data-edit="origem"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        openOrigemModal(b.dataset.key);
      }));
      panelEl.querySelectorAll('[data-del="origem"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        const k = b.dataset.key;
        if (dbxConfirm(`Excluir origem "${k}"?`)) {
          delete D.vendas.origem[k];
          dbxRefresh(D, item);
        }
      }));
    }

        <div class="dbx-block">

                  <button class="dbx-act-btn" data-edit="art" data-idx="${i}" title="Editar">✎</button>
                  <button class="dbx-act-btn danger" data-del="art" data-idx="${i}" title="Excluir">✕</button>
                </div>
                <div class="dbx-art-name">${escapeHtml(a.nome)}</div>
                <div class="dbx-art-impact">${escapeHtml(a.impacto)}</div>

            `).join('') : '<p class="dbx-empty">Nenhum artista cadastrado.</p>'}
            <div class="dbx-add-row" data-add="art">
              <span style="font-size:18px;">+</span>
              <span>Adicionar artista / convidado</span>

    /* ===== PAINEL: DRE — DEMONSTRAÇÃO DE RESULTADOS (CASCATA) ===== */
    function dbxComputeDRE(D, fin) {
      const dre = D.dre || {};
      // Receita = receita pacote (clientes × ticket) + upsell
      const receitaBruta = (fin.totalReceita || 0) + (fin.upsellReceita || 0);
      const numClientes = fin.totalClientes || 0;
      const custosDiretosTot = (dre.custosDiretos || []).reduce((s, x) => s + (Number(x.val) || 0), 0);
      const lucroBruto = receitaBruta - custosDiretosTot;
      const margemBruta = receitaBruta > 0 ? (lucroBruto / receitaBruta) * 100 : 0;
      const marketingTot = (dre.marketing || []).reduce((s, x) => s + (Number(x.val) || 0), 0);
      const cacImplicito = numClientes > 0 ? marketingTot / numClientes : 0;
      const aliq = Number(dre.aliquotaImpostos || 10);
      const impostos = receitaBruta * (aliq / 100);
      const adminTot = (dre.administrativo || []).reduce((s, x) => s + (Number(x.val) || 0), 0);
      const lucroLiquido = lucroBruto - marketingTot - impostos - adminTot;
      const margemLiquida = receitaBruta > 0 ? (lucroLiquido / receitaBruta) * 100 : 0;
      const dest = dre.destinacao || { reinvestimento: 50, reserva: 30, distribuicao: 20 };
      const reinv = (lucroLiquido > 0 ? lucroLiquido : 0) * (Number(dest.reinvestimento || 0) / 100);
      const reserva = (lucroLiquido > 0 ? lucroLiquido : 0) * (Number(dest.reserva || 0) / 100);
      const distrib = (lucroLiquido > 0 ? lucroLiquido : 0) * (Number(dest.distribuicao || 0) / 100);
      return {
        receitaBruta, numClientes, custosDiretosTot, lucroBruto, margemBruta,
        marketingTot, cacImplicito, aliq, impostos, adminTot, lucroLiquido, margemLiquida,
        dest, reinv, reserva, distrib
      };
    }

    /* ===== BIND: DRE ===== */
    function dbxBindDRE(panelEl, D, item) {
      // Helper: re-render DRE in place (mantém aba ativa)
      const refresh = () => {
        const fin = dbxComputeFinance(D);
        panelEl.innerHTML = dbxRenderDRE(D, fin);
        dbxBindDRE(panelEl, D, item); // re-bind
      };

      // Toggle de seções (custos / marketing / admin)
      panelEl.querySelectorAll('.dre-toggle').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const k = btn.dataset.toggle;
          const sub = panelEl.querySelector(`[data-sub="${k}"]`);
          if (sub) sub.classList.toggle('hidden');
          btn.textContent = sub.classList.contains('hidden') ? '▾' : '▴';
        });
      });

      // Editar item de uma categoria
      panelEl.querySelectorAll('[data-edit-cat]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const cat = btn.dataset.editCat;
          const idx = parseInt(btn.dataset.editIdx, 10);
          const target = D.dre[cat === 'admin' ? 'administrativo' : cat === 'custos' ? 'custosDiretos' : 'marketing'];
          const cur = target[idx] || { lbl: '', val: 0 };
          dbxOpenModal({
            title: 'Editar item · DRE',
            fields: [
              { key: 'lbl', label: 'Descrição', type: 'text' },
              { key: 'val', label: 'Valor (R$)', type: 'number', step: '0.01' }
            ],
            values: cur,
            onSave: (vals) => {
              target[idx] = { lbl: vals.lbl || '', val: Number(vals.val) || 0 };
              saveDubaiExplorer();
              refresh();
            }
          });
        });
      });

      // Excluir item
      panelEl.querySelectorAll('[data-del-cat]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const cat = btn.dataset.delCat;
          const idx = parseInt(btn.dataset.delIdx, 10);
          if (!confirm('Remover este item?')) return;
          const targetKey = cat === 'admin' ? 'administrativo' : cat === 'custos' ? 'custosDiretos' : 'marketing';
          D.dre[targetKey].splice(idx, 1);
          saveDubaiExplorer();
          refresh();
        });
      });

      // Adicionar item
      panelEl.querySelectorAll('[data-add-cat]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const cat = btn.dataset.addCat;
          dbxOpenModal({
            title: 'Adicionar item · DRE',
            fields: [
              { key: 'lbl', label: 'Descrição', type: 'text' },
              { key: 'val', label: 'Valor (R$)', type: 'number', step: '0.01' }
            ],
            values: { lbl: '', val: 0 },
            onSave: (vals) => {
              const targetKey = cat === 'admin' ? 'administrativo' : cat === 'custos' ? 'custosDiretos' : 'marketing';
              D.dre[targetKey].push({ lbl: vals.lbl || '', val: Number(vals.val) || 0 });
              saveDubaiExplorer();
              refresh();
            }
          });
        });
      });

      // Ajustar alíquota
      const aliqBtn = panelEl.querySelector('[data-act="dre-aliq"]');
      if (aliqBtn) aliqBtn.addEventListener('click', () => {
        dbxOpenModal({
          title: 'Ajustar alíquota de impostos',
          fields: [
            { key: 'aliquota', label: 'Alíquota total (%)', type: 'number', step: '0.1' }
          ],
          values: { aliquota: D.dre.aliquotaImpostos || 10 },
          onSave: (vals) => {
            D.dre.aliquotaImpostos = Number(vals.aliquota) || 0;
            saveDubaiExplorer();
            refresh();
          }
        });
      });

      // Sliders de destinação — recalcula em tempo real, salva no blur
      const sliders = panelEl.querySelectorAll('.dre-slider');
      const allocSumEl = panelEl.querySelector('#dreAllocSum');
      const updateSliderVisual = () => {
        let sum = 0;
        sliders.forEach(s => {
          const pct = Number(s.value) || 0;
          sum += pct;
          const row = s.closest('.dre-slider-row');
          if (row) row.querySelector('.dre-slider-pct').textContent = pct + '%';
        });
        if (allocSumEl) {
          allocSumEl.textContent = sum;
          allocSumEl.parentElement.classList.toggle('warn', sum !== 100);
        }
      };
      sliders.forEach(s => {
        s.addEventListener('input', updateSliderVisual);
        s.addEventListener('change', () => {
          const dest = D.dre.destinacao || (D.dre.destinacao = { reinvestimento: 50, reserva: 30, distribuicao: 20 });
          dest[s.dataset.dest] = Number(s.value) || 0;
          saveDubaiExplorer();
          // Atualiza valores em R$ próximos ao slider sem re-render completo
          const fin = dbxComputeFinance(D);
          const r = dbxComputeDRE(D, fin);
          const moneyByKey = { reinvestimento: r.reinv, reserva: r.reserva, distribuicao: r.distrib };
          panelEl.querySelectorAll('.dre-slider').forEach(sl => {
            const k = sl.dataset.dest;
            const row = sl.closest('.dre-slider-row');
            if (row) row.querySelector('.dre-slider-money').textContent = dbxFmtMoney(moneyByKey[k] || 0);
          });
        });
      });

      // Simulador
      const simulBtn = panelEl.querySelector('[data-act="dre-simular"]');
      if (simulBtn) simulBtn.addEventListener('click', () => {
        const fin0 = dbxComputeFinance(D);
        const r0 = dbxComputeDRE(D, fin0);
        dbxOpenModal({
          title: '⚗ Simular Cenário · DRE',
          fields: [
            { key: 'numClientes', label: 'Nº de clientes', type: 'number', step: '1' },
            { key: 'ticketMedio', label: 'Ticket médio (R$)', type: 'number', step: '0.01' },
            { key: 'upsellTotal', label: 'Upsell total (R$)', type: 'number', step: '0.01' },
            { key: 'custosVar', label: 'Custos variáveis/cliente (R$)', type: 'number', step: '0.01' },
            { key: 'custosFix', label: 'Custos fixos da turma (R$)', type: 'number', step: '0.01' },
            { key: 'mktTot', label: 'Marketing total (R$)', type: 'number', step: '0.01' }
          ],
          values: {
            numClientes: r0.numClientes,
            ticketMedio: D.vendas?.ticketMedio || 0,
            upsellTotal: fin0.upsellReceita || 0,
            custosVar: D.custos?.variavelPorCliente || 0,
            custosFix: (D.custos?.fixos || []).reduce((s, c) => s + (Number(c.val) || 0), 0),
            mktTot: r0.marketingTot
          },
          onSave: (vals) => {
            const numClientes = Number(vals.numClientes) || 0;
            const tk = Number(vals.ticketMedio) || 0;
            const ups = Number(vals.upsellTotal) || 0;
            const cvar = Number(vals.custosVar) || 0;
            const cfix = Number(vals.custosFix) || 0;
            const mkt = Number(vals.mktTot) || 0;
            const receita = numClientes * tk + ups;
            const custosDir = numClientes * cvar + cfix;
            const lucroBr = receita - custosDir;
            const aliq = Number(D.dre?.aliquotaImpostos || 10);
            const imp = receita * aliq / 100;
            const adm = (D.dre?.administrativo || []).reduce((s, c) => s + (Number(c.val) || 0), 0);
            const ll = lucroBr - mkt - imp - adm;
            const ml = receita > 0 ? (ll / receita * 100) : 0;
            alert(
              `═══ SIMULAÇÃO ═══\n\n` +
              `Receita Bruta:        ${dbxFmtMoney(receita)}\n` +
              `(-) Custos Diretos:   ${dbxFmtMoney(custosDir)}\n` +
              `(=) Lucro Bruto:      ${dbxFmtMoney(lucroBr)}\n` +
              `(-) Marketing:        ${dbxFmtMoney(mkt)}\n` +
              `(-) Impostos (${aliq}%):  ${dbxFmtMoney(imp)}\n` +
              `(-) Administrativo:   ${dbxFmtMoney(adm)}\n` +
              `(=) Lucro Líquido:    ${dbxFmtMoney(ll)}\n` +
              `Margem Líquida:       ${ml.toFixed(1)}%\n\n` +
              `Comparativo com cenário atual:\n` +
              `Lucro líquido atual: ${dbxFmtMoney(r0.lucroLiquido)}\n` +
              `Variação: ${dbxFmtMoney(ll - r0.lucroLiquido)} (${(((ll - r0.lucroLiquido) / Math.abs(r0.lucroLiquido || 1)) * 100).toFixed(1)}%)`
            );
          }
        });
      });

      // Export PDF (placeholder simples — print da aba)
      const pdfBtn = panelEl.querySelector('[data-act="dre-export-pdf"]');
      if (pdfBtn) pdfBtn.addEventListener('click', () => {
        window.print();
      });

      // Export CSV
      const csvBtn = panelEl.querySelector('[data-act="dre-export-csv"]');
      if (csvBtn) csvBtn.addEventListener('click', () => {
        const fin = dbxComputeFinance(D);
        const r = dbxComputeDRE(D, fin);
        const rows = [
          ['LINHA', 'VALOR (R$)', 'OBSERVAÇÃO'],
          ['Receita Bruta', r.receitaBruta, `${r.numClientes} clientes`],
          ['Custos Diretos', -r.custosDiretosTot, ''],
          ...(D.dre.custosDiretos || []).map(c => ['  ' + c.lbl, -c.val, '']),
          ['Lucro Bruto', r.lucroBruto, `Margem ${r.margemBruta.toFixed(1)}%`],
          ['Marketing', -r.marketingTot, `CAC ${dbxFmtMoney(r.cacImplicito)}`],
          ...(D.dre.marketing || []).map(c => ['  ' + c.lbl, -c.val, '']),
          ['Impostos', -r.impostos, `Alíquota ${r.aliq}%`],
          ['Administrativo', -r.adminTot, ''],
          ...(D.dre.administrativo || []).map(c => ['  ' + c.lbl, -c.val, '']),
          ['LUCRO LÍQUIDO', r.lucroLiquido, `Margem ${r.margemLiquida.toFixed(1)}%`],
          ['', '', ''],
          ['Reinvestimento', r.reinv, `${r.dest.reinvestimento}%`],
          ['Reserva de caixa', r.reserva, `${r.dest.reserva}%`],
          ['Distribuição sócios', r.distrib, `${r.dest.distribuicao}%`]
        ];
        const csv = rows.map(row => row.map(c => `"${String(c).replace(/"/g, '""')}"`).join(',')).join('\n');
        const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `DRE_${(item.name || 'pacote').replace(/\s+/g, '_')}_${new Date().toISOString().slice(0,10)}.csv`;
        document.body.appendChild(a); a.click(); a.remove();
      });
    }

    /* ===== PAINEL: FORECAST · projeção de receita futura ===== */
    function dbxComputeForecast(D, fin) {
      const fc = D.forecast || {};
      const pip = fc.pipeline || {};
      const prem = fc.premissas || {};
      const sazao = prem.sazonalidade || {};
      const horizonte = Number(fc.horizonteMeses || 7);
      const ticket = D.vendas?.ticketMedio || 38500;
      const taxa = Number(prem.taxaConversao || 18) / 100;
      const leadsMes = Number(prem.leadsMes || 60);
      const aumentoPreco = Number(prem.aumentoPreco || 0) / 100;

      // Comprometido = vendas em negociação avançada + fecharão este mês
      const comprometido =
        (Number(pip.fecharaoMes?.receitaProjetada) || 0) +
        (Number(pip.negociacao?.valorPotencial) || 0) * (Number(pip.negociacao?.probabilidade || 60) / 100);

      // Próximas 7 chaves de mês (de hoje pra frente — JS atual)
      const monthKeys = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
      const now = new Date();
      const projecoesMensais = [];
      for (let i = 0; i < horizonte; i++) {
        const d = new Date(now.getFullYear(), now.getMonth() + i + 1, 1);
        const sazKey = monthKeys[d.getMonth()];
        const mult = Number(sazao[sazKey] || 1);
        const ticketAjustado = ticket * (1 + aumentoPreco);
        const novosClientes = leadsMes * taxa * mult;
        const receita = novosClientes * ticketAjustado;
        projecoesMensais.push({
          ano: d.getFullYear(),
          mes: d.getMonth() + 1,
          mesLabel: monthKeys[d.getMonth()] + '/' + String(d.getFullYear()).slice(-2),
          clientes: novosClientes,
          receita: receita,
          mult
        });
      }

      const totalRealistaClientes = projecoesMensais.reduce((s, p) => s + p.clientes, 0);
      const totalRealistaReceita = projecoesMensais.reduce((s, p) => s + p.receita, 0);
      const otimistaMult = Number(fc.cenarios?.otimistaMult || 1.15);
      const pessimistaMult = Number(fc.cenarios?.pessimistaMult || 0.80);

      // Acumulado histórico
      const histAcum = (fc.historico || []).reduce((a, h) => ({
        clientes: a.clientes + Number(h.clientes || 0),
        receita: a.receita + Number(h.receita || 0)
      }), { clientes: 0, receita: 0 });

      const meta = fc.metaMensal || {};

      return {
        comprometido,
        projetado: totalRealistaReceita,
        projetadoClientes: totalRealistaClientes,
        otimista: totalRealistaReceita * otimistaMult,
        otimistaClientes: totalRealistaClientes * otimistaMult,
        pessimista: totalRealistaReceita * pessimistaMult,
        pessimistaClientes: totalRealistaClientes * pessimistaMult,
        projecoesMensais,
        comprometidoNoMes: pip.fecharaoMes?.receitaProjetada || 0,
        meta,
        histAcum
      };
    }

    function dbxRenderForecast(D, fin) {
      const fc = D.forecast || {};
      const pip = fc.pipeline || {};
      const prem = fc.premissas || {};
      const r = dbxComputeForecast(D, fin);
      const hist = fc.historico || [];

      // Calcula altura do gráfico baseado em receita máxima
      const allValues = [...hist.map(h => h.receita || 0), ...r.projecoesMensais.map(p => p.receita)];
      const maxVal = Math.max(...allValues, 1);
      const histPoints = hist.map((h, i) => {
        const x = (i / (hist.length - 1)) * 45 + 2;
        const y = 95 - ((h.receita || 0) / maxVal) * 85;
        return { x, y, label: h.mes, val: h.receita };
      });
      const projPoints = r.projecoesMensais.map((p, i) => {
        const x = 47 + (i / (r.projecoesMensais.length - 1 || 1)) * 51;
        const y = 95 - (p.receita / maxVal) * 85;
        return { x, y, label: p.mesLabel, val: p.receita };
      });
      const otimPoints = r.projecoesMensais.map((p, i) => {
        const x = 47 + (i / (r.projecoesMensais.length - 1 || 1)) * 51;
        const y = 95 - (p.receita * (fc.cenarios?.otimistaMult || 1.15) / maxVal) * 85;
        return { x, y };
      });
      const pessPoints = r.projecoesMensais.map((p, i) => {
        const x = 47 + (i / (r.projecoesMensais.length - 1 || 1)) * 51;
        const y = 95 - (p.receita * (fc.cenarios?.pessimistaMult || 0.80) / maxVal) * 85;
        return { x, y };
      });

      const histPath = histPoints.map((p, i) => (i === 0 ? 'M' : 'L') + p.x + ' ' + p.y).join(' ');
      const projPath = (histPoints.length > 0 ? 'M' + histPoints[histPoints.length - 1].x + ' ' + histPoints[histPoints.length - 1].y + ' L' : 'M') +
        projPoints.map(p => p.x + ' ' + p.y).join(' L');
      // Faixa de incerteza (otimista até pessimista)
      const incertPath = 'M' +
        otimPoints.map(p => p.x + ' ' + p.y).join(' L') +
        ' L' + pessPoints.slice().reverse().map(p => p.x + ' ' + p.y).join(' L') + ' Z';

      // Meta linha
      const metaY = 95 - ((r.meta.receita || 0) / maxVal) * 85;

      // Insights
      const ritmoNecessario = r.meta.clientes > 0 ? ((r.meta.clientes * 12 - r.histAcum.clientes) / 12) : 0;
      const insightAlerta = r.comprometido < r.meta.receita * 0.4
        ? `🔴 Pipeline atual (${pip.quentes?.qtd || 0} quentes) está abaixo da média histórica — pode atrasar`
        : `🟢 Pipeline saudável (${pip.quentes?.qtd || 0} quentes em negociação)`;
      const insightProjecao = r.projetado >= r.meta.receita * 12 * 0.9
        ? `✅ Cenário realista projeta ${dbxFmtMoney(r.projetado)} — alinhado com meta`
        : `⚠️ Cenário realista projeta ${dbxFmtMoney(r.projetado)} — abaixo da meta anual`;

      return `
        <div class="dbx-panel-head">
          <h2><span class="ico">🔮</span>Forecast · Projeção de Receita</h2>
          <div class="dbx-actions">
            <button class="dbx-btn ghost" data-act="fc-edit-pipeline">✎ Editar Pipeline</button>
            <button class="dbx-btn ghost" data-act="fc-edit-meta">🎯 Meta Mensal</button>
          </div>
        </div>

        <!-- BLOCO 1: PIPELINE ATUAL -->
        <div class="fc-pipeline-grid">
          <div class="fc-pipe-card cold">
            <div class="fc-pipe-ico">❄️</div>
            <div class="fc-pipe-num">${pip.frios?.qtd || 0}</div>
            <div class="fc-pipe-lbl">Leads frios</div>
            <div class="fc-pipe-sub">${Object.entries(pip.frios?.origem || {}).map(([k,v]) => `${k}: ${v}`).join(' · ') || 'sem origem'}</div>
          </div>
          <div class="fc-pipe-card warm">
            <div class="fc-pipe-ico">🔥</div>
            <div class="fc-pipe-num">${pip.quentes?.qtd || 0}</div>
            <div class="fc-pipe-lbl">Leads quentes</div>
            <div class="fc-pipe-sub">⏱ ${pip.quentes?.tempoMedioDias || 0} dias em média · ${pip.quentes?.status === 'saudavel' ? '🟢 saudável' : '🟡 demorado'}</div>
          </div>
          <div class="fc-pipe-card neg">
            <div class="fc-pipe-ico">🤝</div>
            <div class="fc-pipe-num">${pip.negociacao?.qtd || 0}</div>
            <div class="fc-pipe-lbl">Em negociação</div>
            <div class="fc-pipe-sub">${dbxFmtMoney(pip.negociacao?.valorPotencial || 0)} · ${pip.negociacao?.probabilidade || 0}% prob.</div>
          </div>
          <div class="fc-pipe-card win">
            <div class="fc-pipe-ico">⭐</div>
            <div class="fc-pipe-num">${pip.fecharaoMes?.qtd || 0}</div>
            <div class="fc-pipe-lbl">Fecharão este mês</div>
            <div class="fc-pipe-sub">${dbxFmtMoney(pip.fecharaoMes?.receitaProjetada || 0)} · ${pip.fecharaoMes?.confianca || 0}% confiança</div>
          </div>
        </div>

        <!-- BLOCO 2: GRÁFICO -->
        <div class="fc-chart-wrap">
          <div class="fc-chart-head">
            <h3>📈 Evolução · Histórico real + projeção</h3>
            <div class="fc-chart-legend">
              <span class="lg lg-real">━ Real (6 meses)</span>
              <span class="lg lg-proj">┄ Projeção (${r.projecoesMensais.length} meses)</span>
              <span class="lg lg-band">▓ Faixa de incerteza</span>
              <span class="lg lg-meta">┄ Meta mensal</span>
            </div>
          </div>
          <svg class="fc-chart" viewBox="0 0 100 100" preserveAspectRatio="none">
            <!-- Grade -->
            ${[20, 40, 60, 80].map(y => `<line x1="0" y1="${y}" x2="100" y2="${y}" stroke="rgba(255,255,255,0.05)" stroke-width="0.2"/>`).join('')}
            <!-- Linha vertical separando histórico de projeção -->
            <line x1="46" y1="2" x2="46" y2="95" stroke="rgba(245,184,66,0.3)" stroke-dasharray="1 1" stroke-width="0.3"/>
            <!-- Faixa de incerteza -->
            <path d="${incertPath}" fill="rgba(245,184,66,0.08)" stroke="none"/>
            <!-- Linha meta -->
            <line x1="0" y1="${metaY}" x2="100" y2="${metaY}" stroke="rgba(111,227,168,0.4)" stroke-dasharray="0.8 0.8" stroke-width="0.3"/>
            <!-- Histórico real (verde) -->
            <path d="${histPath}" fill="none" stroke="#6FE3A8" stroke-width="0.6" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0 0 2px rgba(111,227,168,0.5))"/>
            ${histPoints.map(p => `<circle cx="${p.x}" cy="${p.y}" r="0.8" fill="#6FE3A8" filter="drop-shadow(0 0 2px rgba(111,227,168,0.6))"/>`).join('')}
            <!-- Projeção realista (dourada pontilhada) -->
            <path d="${projPath}" fill="none" stroke="#E6C77A" stroke-width="0.6" stroke-dasharray="1.2 1.2" stroke-linecap="round" filter="drop-shadow(0 0 2px rgba(245,184,66,0.5))"/>
            ${projPoints.map(p => `<circle cx="${p.x}" cy="${p.y}" r="0.7" fill="#E6C77A"/>`).join('')}
          </svg>
          <div class="fc-chart-axis">
            ${hist.map(h => `<span>${(h.mes || '').slice(5)}</span>`).join('')}
            <span class="sep">|</span>
            ${r.projecoesMensais.map(p => `<span class="proj">${p.mesLabel}</span>`).join('')}
          </div>
        </div>

        <!-- BLOCO 3: 3 CENÁRIOS -->
        <div class="fc-scenarios">
          <div class="fc-scen pessimista">
            <div class="fc-scen-head">📉 PESSIMISTA <span class="prob">20% prob</span></div>
            <div class="fc-scen-premissa">Conversão cai 20% e leads diminuem</div>
            <div class="fc-scen-receita">${dbxFmtMoney(r.pessimista)}</div>
            <div class="fc-scen-clientes">${Math.round(r.pessimistaClientes)} clientes em ${r.projecoesMensais.length}m</div>
          </div>
          <div class="fc-scen realista hero">
            <div class="fc-scen-head">🎯 REALISTA <span class="prob">60% prob</span></div>
            <div class="fc-scen-premissa">Mantém ritmo atual</div>
            <div class="fc-scen-receita">${dbxFmtMoney(r.projetado)}</div>
            <div class="fc-scen-clientes">${Math.round(r.projetadoClientes)} clientes em ${r.projecoesMensais.length}m</div>
          </div>
          <div class="fc-scen otimista">
            <div class="fc-scen-head">📈 OTIMISTA <span class="prob">20% prob</span></div>
            <div class="fc-scen-premissa">Conversão +15% e influencers +30% leads</div>
            <div class="fc-scen-receita">${dbxFmtMoney(r.otimista)}</div>
            <div class="fc-scen-clientes">${Math.round(r.otimistaClientes)} clientes em ${r.projecoesMensais.length}m</div>
          </div>
        </div>

        <!-- BLOCO 4: PREMISSAS EDITÁVEIS -->
        <div class="fc-premissas">
          <div class="fc-prem-head"><span>⚙️</span>PREMISSAS DA PROJEÇÃO</div>
          <div class="fc-prem-row">
            <label>Taxa de conversão (lead → cliente)</label>
            <input type="range" min="0" max="100" step="1" class="fc-slider" data-prem="taxaConversao" value="${prem.taxaConversao || 18}">
            <span class="fc-prem-val"><span class="fc-prem-num">${prem.taxaConversao || 18}</span>%</span>
          </div>
          <div class="fc-prem-row">
            <label>Volume mensal de novos leads</label>
            <input type="number" class="fc-input" data-prem="leadsMes" value="${prem.leadsMes || 60}" min="0" step="1">
            <span class="fc-prem-val">leads/mês</span>
          </div>
          <div class="fc-prem-row">
            <label>Aumento de preço</label>
            <input type="range" min="-20" max="50" step="1" class="fc-slider" data-prem="aumentoPreco" value="${prem.aumentoPreco || 0}">
            <span class="fc-prem-val"><span class="fc-prem-num">${prem.aumentoPreco || 0}</span>%</span>
          </div>
          <div class="fc-prem-row">
            <label>Taxa de churn</label>
            <input type="range" min="0" max="100" step="1" class="fc-slider" data-prem="taxaChurn" value="${prem.taxaChurn || 25}">
            <span class="fc-prem-val"><span class="fc-prem-num">${prem.taxaChurn || 25}</span>%</span>
          </div>
        </div>

        <!-- BLOCO 5: ALERTAS -->
        <div class="fc-alerts">
          <div class="fc-alert">🎯 Pra bater meta de ${r.meta.clientes || 12} clientes/mês, precisa de ${ritmoNecessario.toFixed(1)} novas vendas/mês a partir de hoje</div>
          <div class="fc-alert">${insightAlerta}</div>
          <div class="fc-alert">${insightProjecao}</div>
        </div>

        <!-- BLOCO 6: COMPROMETIDO vs PROJETADO vs META -->
        <div class="fc-summary">
          <div class="fc-sum-row"><span class="lbl">Comprometido (já em negociação)</span><span class="val">${dbxFmtMoney(r.comprometido)}</span></div>
          <div class="fc-sum-row"><span class="lbl">Projetado realista</span><span class="val pos">${dbxFmtMoney(r.projetado)}</span></div>
          <div class="fc-sum-row"><span class="lbl">Meta total (${r.projecoesMensais.length}m)</span><span class="val">${dbxFmtMoney((r.meta.receita || 0) * r.projecoesMensais.length)}</span></div>
          <div class="fc-sum-row gap"><span class="lbl">GAP até meta</span><span class="val ${(r.projetado - (r.meta.receita || 0) * r.projecoesMensais.length) >= 0 ? 'pos' : 'neg'}">${dbxFmtMoney(r.projetado - (r.meta.receita || 0) * r.projecoesMensais.length)}</span></div>
        </div>
      `;
    }

    function dbxBindForecast(panelEl, D, item) {
      const refresh = () => {
        const fin = dbxComputeFinance(D);
        panelEl.innerHTML = dbxRenderForecast(D, fin);
        dbxBindForecast(panelEl, D, item);
      };

      // Sliders + inputs de premissas — recalcula em tempo real
      panelEl.querySelectorAll('.fc-slider, .fc-input').forEach(el => {
        const onChange = () => {
          const k = el.dataset.prem;
          if (!D.forecast.premissas) D.forecast.premissas = {};
          D.forecast.premissas[k] = Number(el.value);
          // Atualiza display do slider
          if (el.classList.contains('fc-slider')) {
            const numEl = el.parentElement.querySelector('.fc-prem-num');
            if (numEl) numEl.textContent = el.value;
          }
        };
        const onCommit = () => {
          saveDubaiExplorer();
          refresh();
        };
        el.addEventListener('input', onChange);
        el.addEventListener('change', onCommit);
        el.addEventListener('blur', onCommit);
      });

      // Editar pipeline
      const editPipe = panelEl.querySelector('[data-act="fc-edit-pipeline"]');
      if (editPipe) editPipe.addEventListener('click', () => {
        const pip = D.forecast.pipeline || {};
        dbxOpenModal({
          title: 'Editar Pipeline Atual',
          fields: [
            { key: 'frios', label: 'Leads frios (qtd)', type: 'number', step: '1' },
            { key: 'quentes', label: 'Leads quentes (qtd)', type: 'number', step: '1' },
            { key: 'quentesDias', label: 'Tempo médio em quentes (dias)', type: 'number', step: '1' },
            { key: 'negQtd', label: 'Em negociação (qtd)', type: 'number', step: '1' },
            { key: 'negValor', label: 'Valor potencial em negociação (R$)', type: 'number', step: '0.01' },
            { key: 'negProb', label: 'Probabilidade de fechar (%)', type: 'number', step: '1' },
            { key: 'fechaQtd', label: 'Fecharão este mês (qtd)', type: 'number', step: '1' },
            { key: 'fechaReceita', label: 'Receita projetada do mês (R$)', type: 'number', step: '0.01' },
            { key: 'fechaConfianca', label: 'Confiança da previsão (%)', type: 'number', step: '1' }
          ],
          values: {
            frios: pip.frios?.qtd || 0,
            quentes: pip.quentes?.qtd || 0,
            quentesDias: pip.quentes?.tempoMedioDias || 0,
            negQtd: pip.negociacao?.qtd || 0,
            negValor: pip.negociacao?.valorPotencial || 0,
            negProb: pip.negociacao?.probabilidade || 0,
            fechaQtd: pip.fecharaoMes?.qtd || 0,
            fechaReceita: pip.fecharaoMes?.receitaProjetada || 0,
            fechaConfianca: pip.fecharaoMes?.confianca || 0
          },
          onSave: (vals) => {
            D.forecast.pipeline = {
              frios: { qtd: Number(vals.frios) || 0, origem: pip.frios?.origem || {} },
              quentes: { qtd: Number(vals.quentes) || 0, tempoMedioDias: Number(vals.quentesDias) || 0, status: 'saudavel' },
              negociacao: { qtd: Number(vals.negQtd) || 0, valorPotencial: Number(vals.negValor) || 0, probabilidade: Number(vals.negProb) || 0 },
              fecharaoMes: { qtd: Number(vals.fechaQtd) || 0, receitaProjetada: Number(vals.fechaReceita) || 0, confianca: Number(vals.fechaConfianca) || 0 }
            };
            saveDubaiExplorer();
            refresh();
          }
        });
      });

      // Editar meta
      const editMeta = panelEl.querySelector('[data-act="fc-edit-meta"]');
      if (editMeta) editMeta.addEventListener('click', () => {
        dbxOpenModal({
          title: 'Editar Meta Mensal',
          fields: [
            { key: 'clientes', label: 'Meta de clientes/mês', type: 'number', step: '1' },
            { key: 'receita', label: 'Meta de receita/mês (R$)', type: 'number', step: '0.01' }
          ],
          values: {
            clientes: D.forecast.metaMensal?.clientes || 12,
            receita: D.forecast.metaMensal?.receita || 462000
          },
          onSave: (vals) => {
            D.forecast.metaMensal = {
              clientes: Number(vals.clientes) || 0,
              receita: Number(vals.receita) || 0
            };
            saveDubaiExplorer();
            refresh();
          }
        });
      });
    }

    /* ===== PAINEL: RETENÇÃO ===== */
    function dbxRenderRetencao(D, fin) {
      const r = D.retencao || {};
      const total = (r.voltaram||0) + (r.novosCompraram||0);
      const taxa = total > 0 ? ((r.voltaram||0) / total * 100) : 0;
      return `
        <div class="dbx-panel-head">
          <h2><span class="ico">🔁</span>Retenção · Ouro escondido</h2>
          <div class="dbx-actions">
            <button class="dbx-mini-btn" data-edit="retencao">✎ Editar Números</button>
          </div>
        </div>
        <div class="dbx-stats-grid">
          <div class="dbx-stat ok"><div class="lbl">Clientes que voltaram</div><div class="val">${r.voltaram||0}</div></div>
          <div class="dbx-stat"><div class="lbl">Novos que compraram</div><div class="val">${r.novosCompraram||0}</div></div>
          <div class="dbx-stat"><div class="lbl">Compraram outro pacote</div><div class="val">${r.recompraOutroPacote||0}</div></div>
          <div class="dbx-stat highlight"><div class="lbl">Taxa de Recompra</div><div class="val">${taxa.toFixed(1)}%</div></div>
        </div>
        <div class="dbx-callout ${taxa >= 30 ? 'positive' : 'warning'}">
          <div class="dbx-callout-icon">${taxa >= 30 ? '💎' : '⚠️'}</div>
          <div>
            <h4>${taxa >= 30 ? 'Você construiu marca' : 'Atenção: baixa retenção'}</h4>
            <p>${taxa >= 30
              ? 'Sua taxa de recompra está acima da média do mercado. Seus clientes voltam — isso é o ouro de verdade.'
              : 'Menos de 30% dos clientes voltam. Investigue: pós-venda, experiência, follow-up. O LTV está baixo.'}</p>
          </div>
        </div>
      `;
    }

    function dbxBindRetencao(panelEl, D, item) {
      const btn = panelEl.querySelector('[data-edit="retencao"]');
      if (btn) {
        btn.addEventListener('click', () => {
          dbxOpenModal({
            title: 'Editar Retenção',
            fields: [
              { key: 'voltaram', label: 'Clientes que voltaram', type: 'number', min: 0 },
              { key: 'novosCompraram', label: 'Novos que compraram', type: 'number', min: 0 },
              { key: 'recompraOutroPacote', label: 'Compraram outro pacote', type: 'number', min: 0 }
            ],
            values: D.retencao || {},
            onSave: (vals) => {
              D.retencao = {
                voltaram: Number(vals.voltaram) || 0,
                novosCompraram: Number(vals.novosCompraram) || 0,
                recompraOutroPacote: Number(vals.recompraOutroPacote) || 0
              };
              dbxRefresh(D, item);
            }
          });
        });
      }

    function dbxBindUpsell(panelEl, D, item) {
      function openUpModal(idx) {
        const isEdit = idx !== undefined && idx !== null;
        const cur = isEdit ? D.upsell.extras[idx] : { nome: '', vendidos: 0, preco: 0, receita: 0 };
        dbxOpenModal({
          title: isEdit ? 'Editar Extra' : 'Novo Extra (Upsell)',
          fields: [
            { key: 'nome', label: 'Nome do extra', type: 'text', placeholder: 'Ex: Yacht VIP +1 dia, Jantar Burj Al Arab...' },
            { key: 'vendidos', label: 'Quantidade vendida', type: 'number', min: 0 },
            { key: 'preco', label: 'Preço unitário (R$)', type: 'number', min: 0, step: '0.01' },
            { key: 'receita', label: 'Receita total (R$) — auto = vendidos × preço', type: 'number', min: 0, step: '0.01' }
          ],
          values: cur,
          onSave: (vals) => {
            // Auto-calc receita se vier 0 ou for menor que vendidos*preco
            if (!vals.receita) {
              vals.receita = (Number(vals.vendidos)||0) * (Number(vals.preco)||0);
            }
            if (isEdit) D.upsell.extras[idx] = vals;
            else D.upsell.extras.push(vals);
            dbxRefresh(D, item);
          }
        });
      }
      panelEl.querySelectorAll('[data-add="upsell"]').forEach(b => b.addEventListener('click', () => openUpModal()));
      panelEl.querySelectorAll('[data-edit="upsell"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        openUpModal(parseInt(b.dataset.idx, 10));
      }));
      panelEl.querySelectorAll('[data-del="upsell"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = parseInt(b.dataset.idx, 10);
        if (dbxConfirm(`Excluir extra "${D.upsell.extras[i].nome}"?`)) {
          D.upsell.extras.splice(i, 1);
          dbxRefresh(D, item);
        }
      }));
    }

    /* ===== PAINEL: ALERTAS INTELIGENTES ===== */
    function dbxRenderAlertas(D, fin) {
      // Ensure tickets array exists
      if (!Array.isArray(D.alertas)) D.alertas = [];

      // Auto-gerados (ephemeral, não persistem; só derivam dos dados atuais)
      const auto = [];
      if (fin.margem < 20) auto.push({ id:'auto-margem-baixa', severidade:'critico', titulo:'Margem baixa', desc:`Margem de ${fin.margem.toFixed(1)}% está abaixo de 20%. Reveja preço ou custos.`, tipo:'Financeiro', auto: true });
      if (fin.roi < 100 && fin.investMkt > 0) auto.push({ id:'auto-roi-fraco', severidade:'atencao', titulo:'ROI marketing fraco', desc:`ROI de ${fin.roi.toFixed(0)}% — algumas campanhas estão pagando pouco.`, tipo:'Marketing', auto: true });
      const checklistOpen = D.operacao.checklist.filter(c => !c.done).length;
      if (checklistOpen > 0) auto.push({ id:'auto-check', severidade:'atencao', titulo:'Checklist incompleto', desc:`${checklistOpen} item(ns) pendente(s) na operação.`, tipo:'Operação', auto: true });
      const equipePend = D.equipe.filter(e => e.status !== 'confirmado').length;
      if (equipePend > 0) auto.push({ id:'auto-equipe', severidade:'atencao', titulo:'Equipe não confirmada', desc:`${equipePend} pessoa(s) ainda sem confirmação.`, tipo:'Equipe', auto: true });
      const clientesPend = D.clientes.filter(c => c.status === 'pendente').length;
      if (clientesPend > 0) auto.push({ id:'auto-pag', severidade:'atencao', titulo:'Pagamentos pendentes', desc:`${clientesPend} cliente(s) com pagamento em aberto.`, tipo:'Financeiro', auto: true });
      if (fin.totalClientes >= 10) auto.push({ id:'auto-demanda', severidade:'info', titulo:'Alta demanda', desc:`Pacote com ${fin.totalClientes} clientes pagantes — momento de aumentar preço ou abrir nova turma.`, tipo:'Comercial', auto: true });

      // Merged: tickets manuais + auto
      const all = [...D.alertas, ...auto];

      // KPIs
      const criticos = all.filter(a => a.severidade === 'critico' && a.status !== 'resolvido' && a.status !== 'ignorado').length;
      const atencao  = all.filter(a => a.severidade === 'atencao' && a.status !== 'resolvido' && a.status !== 'ignorado').length;
      const resolvHoje = D.alertas.filter(a => a.status === 'resolvido' && a.resolvidoEm && (Date.now() - a.resolvidoEm) < 86400000).length;
      const resolved = D.alertas.filter(a => a.status === 'resolvido' && a.criadoEm && a.resolvidoEm);
      const tempoMed = resolved.length > 0
        ? (resolved.reduce((s, a) => s + (a.resolvidoEm - a.criadoEm), 0) / resolved.length / 86400000)
        : 0;

      const sevIcon = (s) => ({ critico: '🔴', atencao: '🟡', info: '🟢' })[s] || '🟢';
      const sevColor = (s) => ({ critico: '#ff6b6b', atencao: '#E6C77A', info: '#6FE3A8' })[s] || '#aaa';
      const statusLabel = (s) => ({ aberto: 'Aberto', andamento: 'Em andamento', resolvido: 'Resolvido', ignorado: 'Ignorado' })[s] || 'Aberto';

      return `
        <div class="dbx-panel-head">
          <h2><span class="ico">🚨</span>Alertas · Tickets</h2>
          <div class="dbx-actions">
            <button class="dbx-btn ghost" data-act="al-novo">+ Novo Alerta</button>
          </div>
        </div>

        <div class="al-kpis">
          <div class="al-kpi crit"><div class="num">${criticos}</div><div class="lbl">🔴 CRÍTICOS</div></div>
          <div class="al-kpi warn"><div class="num">${atencao}</div><div class="lbl">🟡 ATENÇÃO</div></div>
          <div class="al-kpi good"><div class="num">${resolvHoje}</div><div class="lbl">✅ RESOLVIDOS HOJE</div></div>
          <div class="al-kpi info"><div class="num">${tempoMed.toFixed(1)}d</div><div class="lbl">⏱ TEMPO MÉDIO</div></div>
        </div>

        <div class="al-list">
          ${all.length === 0 ? '<div class="al-empty">✅ Nenhum alerta — tudo em ordem!</div>' : all.map((a, i) => {
            const isAuto = a.auto;
            const sev = a.severidade || 'atencao';
            const status = a.status || 'aberto';
            return `
            <div class="al-card ${status === 'resolvido' ? 'resolved' : ''} ${status === 'ignorado' ? 'ignored' : ''}" style="border-left-color:${sevColor(sev)};" data-al-idx="${isAuto ? -1 : D.alertas.indexOf(a)}">
              <div class="al-head">
                <span class="al-sev">${sevIcon(sev)}</span>
                <span class="al-tit">${escapeHtml(a.titulo || '—')}</span>
                ${isAuto ? '<span class="al-tag">AUTO</span>' : `<span class="al-tag manual">MANUAL</span>`}
                <span class="al-tipo">${escapeHtml(a.tipo || '')}</span>
                <span class="al-status status-${status}">${statusLabel(status)}</span>
              </div>
              <div class="al-desc">${escapeHtml(a.desc || '')}</div>
              ${(a.responsavel || a.prazo) ? `
                <div class="al-meta">
                  ${a.responsavel ? `👤 ${escapeHtml(a.responsavel)}` : ''}
                  ${a.prazo ? `⏰ ${escapeHtml(a.prazo)}` : ''}
                </div>
              ` : ''}
              ${(a.comentarios && a.comentarios.length > 0) ? `
                <div class="al-comentarios">
                  ${a.comentarios.map(c => `
                    <div class="al-com">
                      <strong>${escapeHtml(c.autor || 'anônimo')}</strong>
                      <span class="al-com-date">${new Date(c.ts).toLocaleString('pt-BR')}</span>
                      <p>${escapeHtml(c.texto || '')}</p>
                    </div>
                  `).join('')}
                </div>
              ` : ''}
              ${!isAuto ? `
                <div class="al-actions">
                  <button class="al-mini" data-al-act="comentar" data-al-idx="${D.alertas.indexOf(a)}">💬 Comentar</button>
                  <button class="al-mini" data-al-act="atribuir" data-al-idx="${D.alertas.indexOf(a)}">👤 Atribuir</button>
                  <button class="al-mini" data-al-act="prazo" data-al-idx="${D.alertas.indexOf(a)}">⏰ Prazo</button>
                  ${status !== 'resolvido' ? `<button class="al-mini good" data-al-act="resolver" data-al-idx="${D.alertas.indexOf(a)}">✅ Resolver</button>` : ''}
                  ${status !== 'ignorado' ? `<button class="al-mini warn" data-al-act="ignorar" data-al-idx="${D.alertas.indexOf(a)}">⏸ Ignorar</button>` : ''}
                  <button class="al-mini danger" data-al-act="excluir" data-al-idx="${D.alertas.indexOf(a)}">🗑</button>
                </div>
              ` : ''}
            </div>
          `; }).join('')}
        </div>
      `;
    }

    function dbxBindAlertas(panelEl, D, item) {
      if (!Array.isArray(D.alertas)) D.alertas = [];
      const refresh = () => {
        const fin = dbxComputeFinance(D);
        panelEl.innerHTML = dbxRenderAlertas(D, fin);
        dbxBindAlertas(panelEl, D, item);
      };

      // Novo alerta
      const novoBtn = panelEl.querySelector('[data-act="al-novo"]');
      if (novoBtn) novoBtn.addEventListener('click', () => {
        dbxOpenModal({
          title: '+ Novo Alerta · Ticket',
          fields: [
            { key: 'titulo', label: 'Título', type: 'text' },
            { key: 'desc', label: 'Descrição', type: 'textarea' },
            { key: 'severidade', label: 'Severidade', type: 'select', options: [
              { value: 'critico', label: '🔴 Crítico' }, { value: 'atencao', label: '🟡 Atenção' }, { value: 'info', label: '🟢 Info' }
            ]},
            { key: 'tipo', label: 'Tipo', type: 'select', options: [
              { value: 'Operação', label: 'Operação' }, { value: 'Financeiro', label: 'Financeiro' },
              { value: 'Equipe', label: 'Equipe' }, { value: 'Marketing', label: 'Marketing' },
              { value: 'Comercial', label: 'Comercial' }, { value: 'Outro', label: 'Outro' }
            ]},
            { key: 'responsavel', label: 'Responsável', type: 'text' },
            { key: 'prazo', label: 'Prazo (data)', type: 'date' }
          ],
          values: { severidade: 'atencao', tipo: 'Operação' },
          onSave: (vals) => {
            D.alertas.unshift({
              id: 'al_' + Date.now(),
              titulo: vals.titulo || 'Sem título',
              desc: vals.desc || '',
              severidade: vals.severidade || 'atencao',
              tipo: vals.tipo || 'Outro',
              responsavel: vals.responsavel || '',
              prazo: vals.prazo || '',
              status: 'aberto',
              criadoEm: Date.now(),
              comentarios: []
            });
            saveDubaiExplorer();
            refresh();
          }
        });
      });

      // Ações dos cards
      panelEl.querySelectorAll('[data-al-act]').forEach(btn => {
        btn.addEventListener('click', () => {
          const act = btn.dataset.alAct;
          const idx = parseInt(btn.dataset.alIdx, 10);
          if (idx < 0 || idx >= D.alertas.length) return;
          const a = D.alertas[idx];

          if (act === 'comentar') {
            dbxOpenModal({
              title: 'Comentar', fields: [{ key: 'texto', label: 'Comentário', type: 'textarea' }],
              values: { texto: '' },
              onSave: (v) => {
                if (!a.comentarios) a.comentarios = [];
                a.comentarios.push({
                  autor: (window.__currentSession?.user?.email) || 'anônimo',
                  texto: v.texto || '', ts: Date.now()
                });
                saveDubaiExplorer(); refresh();
              }
            });
          } else if (act === 'atribuir') {
            dbxOpenModal({
              title: 'Atribuir responsável', fields: [{ key: 'r', label: 'Responsável', type: 'text' }],
              values: { r: a.responsavel || '' },
              onSave: (v) => { a.responsavel = v.r || ''; saveDubaiExplorer(); refresh(); }
            });
          } else if (act === 'prazo') {
            dbxOpenModal({
              title: 'Definir prazo', fields: [{ key: 'p', label: 'Prazo', type: 'date' }],
              values: { p: a.prazo || '' },
              onSave: (v) => { a.prazo = v.p || ''; saveDubaiExplorer(); refresh(); }
            });
          } else if (act === 'resolver') {
            a.status = 'resolvido'; a.resolvidoEm = Date.now();
            saveDubaiExplorer(); refresh();
          } else if (act === 'ignorar') {
            a.status = 'ignorado';
            saveDubaiExplorer(); refresh();
          } else if (act === 'excluir') {
            if (!confirm('Excluir alerta?')) return;
            D.alertas.splice(idx, 1);
            saveDubaiExplorer(); refresh();
          }
        });
      });
    }

    /* =====================  VIEW 4 (ITEM HUB)  ===================== */
    function showItem(topicData, kind, idx) {
      currentItemRef = { topicData, kind, idx };
      const list = topicData.items;
      const it = normalizeItem(list[idx]);
      list[idx] = it;
      itemView.innerHTML = '';

      // Premium item modules — detect special items inside ESTRUTURA CORPORATIVA
      if (currentTopic && currentTopic.key === 'ESTRUTURA CORPORATIVA' && kind === 'item') {
        const upper = (it.name || '').toUpperCase();
        if (upper === 'HIERARQUIA') {
          renderHierarchyItemView(it, topicData, idx);
          switchTo('item');
          return;
        }
        if (upper.includes('BASES FLY') || upper === 'ESTRUTURA DAS BASES FLY' || upper === 'BASES FLY') {
          renderBasesFlyItemView(it, topicData, idx);
          switchTo('item');
          return;
        }
      }
      // Premium item modules — formato PACOTES (Dubai Explorer-style)
      // Aplica-se a:
      //   1. Itens com format === 'pacotes' (qualquer tópico)
      //   2. Item legado "DUBAI EXPLORER" dentro de PRODUTOS (compatibilidade)
      if (kind === 'item') {
        const upper = (it.name || '').toUpperCase();
        const isLegacyDubai = (currentTopic && currentTopic.key === 'PRODUTOS' && upper === 'DUBAI EXPLORER');
        const isPressKitProduct = currentTopic && currentTopic.key === 'PRODUTOS' && (upper.includes('PRESS KIT') || upper.includes('PRESSKIT'));
        if (it.format === 'presskit' || isPressKitProduct) {
          if (it.format !== 'presskit') {
            it.format = 'presskit';
            try { saveData(); } catch (e) {}
          }
          renderPressKitItemView(it, topicData, idx);
          switchTo('item');
          return;
        }
        if (it.format === 'pacotes' || isLegacyDubai) {
          renderDubaiExplorerItemView(it, topicData, idx);
          switchTo('item');
          return;
        }
      }

      const hub = document.createElement('div');
      hub.className = 'hub';

      // Banner
      const banner = document.createElement('div');
      banner.className = 'hub-banner';
      if (it.image) banner.style.setProperty('--hub-image', `url("${it.image}")`);
      banner.innerHTML = `
        <div class="meta">
          <h2>${escapeHtml(it.name || 'SEM NOME')}</h2>
          ${it.categoria ? `<div class="cat">${escapeHtml(it.categoria)}</div>` : ''}
        </div>`;
      hub.appendChild(banner);

      // Edit button (admin mode only)
      const editBtn = document.createElement('button');
      editBtn.className = 'hub-edit';
      editBtn.textContent = '✎ EDITAR ITEM';
      editBtn.addEventListener('click', () => openItemEditor(topicData, kind, idx));
      hub.appendChild(editBtn);

      // Tabs

        { key: 'perf',  label: 'PERFORMANCE'  },
        { key: 'op',    label: 'OPERAÇÃO'     },
        { key: 'mkt',   label: 'MARKETING'    },
        { key: 'media', label: 'MÍDIA'        },
        { key: 'cron',  label: 'CRONOGRAMA'   },
        { key: 'docs',  label: 'DOCUMENTAÇÃO' }
      ];
      tabsList.forEach((t, i) => {
        const b = document.createElement('button');
        b.className = 'hub-tab' + (i === 0 ? ' active' : '');
        b.textContent = t.label;
        b.dataset.tab = t.key;
        b.addEventListener('click', () => {
          tabsWrap.querySelectorAll('.hub-tab').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          hub.querySelectorAll('.hub-panel').forEach(p => p.classList.add('hidden'));
          hub.querySelector('.hub-panel[data-panel="' + t.key + '"]').classList.remove('hidden');
        });
        tabsWrap.appendChild(b);
      });
      hub.appendChild(tabsWrap);

      // ----- Panel: GERAL -----
      const pGeral = document.createElement('div');

        <div class="hub-grid">
          <div class="hub-field">
            <div class="label">DATA</div>
            <div class="value ${!it.data ? 'muted' : ''}">${escapeHtml(fmtDate(it.data)) || 'Não definida'}</div>
          </div>
          <div class="hub-field">
            <div class="label">PERÍODO</div>
            <div class="value ${!it.periodo ? 'muted' : ''}">${escapeHtml(it.periodo) || 'Não definido'}</div>
          </div>
          <div class="hub-field">
            <div class="label">RESPONSÁVEL</div>
            <div class="value ${!it.responsavel ? 'muted' : ''}">${escapeHtml(it.responsavel) || 'Não definido'}</div>
          </div>
          <div class="hub-field">
            <div class="label">CATEGORIA</div>
            <div class="value ${!it.categoria ? 'muted' : ''}">${escapeHtml(it.categoria) || 'Não definida'}</div>
          </div>
          <div class="hub-field">
            <div class="label">PÚBLICO-ALVO</div>

          <h4>DESCRIÇÃO COMPLETA</h4>
          ${it.descricao ? `<p>${escapeHtml(it.descricao).replace(/\n/g,'<br>')}</p>` : '<p class="empty">Sem descrição preenchida.</p>'}
        </div>
        <div class="hub-block">
          <h4>O QUE INCLUI</h4>
          ${it.inclui.length
            ? `<ul>${it.inclui.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>`
            : '<p class="empty">Nenhum item adicionado.</p>'}

    function escapeHtml(s) {

    /* =====================  NAVIGATION  ===================== */

      [gridView, detailView, topicView, itemView].forEach(v => v.classList.add('hidden'));

      if (view === 'grid')   gridView.classList.remove('hidden');
      if (view === 'detail') { detailView.classList.remove('hidden'); document.body.classList.add('detail-mode'); }
      if (view === 'topic')  {
        topicView.classList.remove('hidden');
        document.body.classList.add('topic-mode');
        topicView.scrollTop = 0;
        requestAnimationFrame(() => { topicView.scrollTop = 0; });
        window.scrollTo(0,0);
      }
      if (view === 'item')   {
        itemView.classList.remove('hidden');
        document.body.classList.add('item-mode');
        itemView.scrollTop = 0;
        requestAnimationFrame(() => { itemView.scrollTop = 0; });
        window.scrollTo(0,0);
      }
      currentView = view;
      window.__flyTimelineLanding?.setActive?.(view === 'grid');
    }

    /* =====================  MODO APRESENTAÇÃO  ===================== */
    const presentToggle = document.getElementById('presentToggle');
    function togglePresentMode(force) {
      const isOn = (typeof force === 'boolean') ? force : !document.body.classList.contains('present-mode');
      document.body.classList.toggle('present-mode', isOn);
      // Tenta entrar/sair de fullscreen real do browser
      try {
        if (isOn && document.documentElement.requestFullscreen && !document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else if (!isOn && document.fullscreenElement && document.exitFullscreen) {
          document.exitFullscreen().catch(() => {});
        }
      } catch (e) {}
    }
    if (presentToggle) presentToggle.addEventListener('click', () => togglePresentMode());
    document.addEventListener('keydown', (ev) => {
      const isCmdP = (ev.metaKey || ev.ctrlKey) && (ev.key === 'p' || ev.key === 'P');
      const isEsc = ev.key === 'Escape';
      if (isCmdP) { ev.preventDefault(); togglePresentMode(); }
      if (isEsc && document.body.classList.contains('present-mode')) {
        ev.preventDefault(); togglePresentMode(false);
      }
      // Setas pra navegar (somente em modo apresentação e na tela de grid/detail)
      if (document.body.classList.contains('present-mode')) {
        if (ev.key === 'ArrowRight' || ev.key === ' ') {
          // Próximo: se estiver no grid, abre o primeiro círculo gold; se estiver no detail, próximo tópico (skip);
          // se estiver em topic, primeiro item; se estiver em item, próximo tab dbx

            const idx = all.indexOf(activeTab);

    /* =====================  SUPABASE + AUTH INIT  ===================== */
    // ============================================================
    // 🔑 LIGA/DESLIGA TELA DE LOGIN
    // Trocar pra `true` exige login (Supabase Auth).
    // Trocar pra `false` libera acesso pra qualquer um com a URL.
    // Os dados continuam sincronizando no Supabase normalmente nos dois modos.
    // ============================================================
    const FLY_AUTH_ENABLED = false;

    // Espera SDK carregar, conecta no Supabase, roda gate de Auth (login).
    // Se offline, libera direto (cache local).
    async function bootSupabase() {
      let attempts = 0;
      await new Promise((resolve) => {
        const tick = () => {
          if (typeof window.supabase !== 'undefined' && window.supabase.createClient) resolve(true);
          else if (attempts++ < 30) setTimeout(tick, 100);
          else resolve(false);
        };
        tick();
      });

      const ok = await initSupabase();

      if (ok && FLY_AUTH_ENABLED) {
        document.body.classList.add('fly-locked');
        const unlocked = await runAuthGate();
        if (unlocked) document.body.classList.remove('fly-locked');
      }

      // Auto-logout se token expirar / sessão for revogada (só se auth ligado)
      if (supaClient && FLY_AUTH_ENABLED) {
        supaClient.auth.onAuthStateChange((event, session) => {
          if (event === 'SIGNED_OUT' || (event === 'TOKEN_REFRESHED' && !session)) {
            __currentSession = null;
            document.body.classList.add('fly-locked');
            // Re-mostra gate
            if (!document.querySelector('.pin-gate-overlay')) {
              runAuthGate().then(ok => { if (ok) document.body.classList.remove('fly-locked'); });
            }
          } else if (event === 'SIGNED_IN' && session) {
            __currentSession = session;
            setSyncStatus('online', session.user.email);
          }
        });
      }
    }
    bootSupabase();

    /* =====================  FILE -> DATA URL  ===================== */
    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve('');
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    /* compress images so we don't blow localStorage */
    async function compressImage(file, maxW = 1400, quality = 0.82) {
      if (!file) return '';
      const dataUrl = await fileToDataURL(file);
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxW / img.width);
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

    // Versão para LOGOS — preserva PNG transparente e SVG vetorial.
    // Usada pelo FlyDesign editor (e em qualquer upload de logo do app).
    async function compressLogo(file, maxW = 800) {
      if (!file) return '';
      const name = (file.name || '').toLowerCase();
      const isSvg = file.type === 'image/svg+xml' || name.endsWith('.svg');
      // SVG é vetorial — devolve direto sem rasterizar
      if (isSvg) return await fileToDataURL(file);
      const isPng = file.type === 'image/png' || name.endsWith('.png');
      const dataUrl = await fileToDataURL(file);
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxW / img.width);
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, w, h); // garante fundo transparente
          ctx.drawImage(img, 0, 0, w, h);
          // PNG preserva alpha; JPEG aplana fundo branco
          if (isPng) {
            resolve(canvas.toDataURL('image/png'));
          } else {
            resolve(canvas.toDataURL('image/jpeg', 0.92));
          }
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }
