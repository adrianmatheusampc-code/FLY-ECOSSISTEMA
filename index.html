            <button class="folder-back-apple" id="fh-back">← Voltar</button>
            <h2>${escapeHtml(currentFolder)}</h2>
            <span class="fh-count">${inside.length} ${inside.length === 1 ? 'item' : 'itens'}</span>
          </div>
          <div class="fh-right">
            <button class="apple-btn ghost" id="fh-add"><span class="apple-icon">＋</span><span>Adicionar itens</span></button>
            <button class="apple-btn ghost" id="fh-rename"><span class="apple-icon">✎</span><span>Editar nome</span></button>
            <button class="apple-btn ghost danger" id="fh-delete"><span class="apple-icon">×</span><span>Excluir pasta</span></button>
          </div>
        `;
        fh.querySelector('#fh-back').addEventListener('click', () => { currentFolder = null; showTopic(currentTopic); });
        fh.querySelector('#fh-add').addEventListener('click', () => openAddToFolderModal(t, currentFolder));
        fh.querySelector('#fh-rename').addEventListener('click', () => {
          const nv = prompt('Novo nome da pasta:', currentFolder);
          if (!nv || !nv.trim() || nv.trim() === currentFolder) return;
          const old = currentFolder;
          const newN = nv.trim();
          t.items.forEach(it => { if (it.folder === old) it.folder = newN; });
          saveData();
          currentFolder = newN;
          showTopic(currentTopic);
        });
        fh.querySelector('#fh-delete').addEventListener('click', () => {
          const c = confirm(
            'Excluir a pasta "' + currentFolder + '"?\n\n' +
            'Os ' + inside.length + ' itens dentro dela voltarão para a lista principal.\n' +
            '(Os itens NÃO serão apagados.)'
          );
          if (!c) return;
          t.items.forEach(it => { if (it.folder === currentFolder) it.folder = ''; });
          saveData();
          currentFolder = null;
          showTopic(currentTopic);
        });
        topicView.appendChild(fh);
      }

      /* Grid principal */
      const grid = document.createElement('div');
      grid.className = 'items-grid';

      if (currentFolder) {
        // Dentro de uma pasta: mostra só os itens da pasta + botão "remover" no card
        t.items.forEach((it, i) => {
          if (it.folder !== currentFolder) return;
          const card = buildCard(it, 'item-card',
            () => showItem(t, 'item', i),
            () => deleteEntry(t, 'items', i),
            t
          );
          // Botão "Tirar da pasta" só dentro de pasta
          const out = document.createElement('button');
          out.className = 'remove-from-folder-btn';
          out.textContent = '⤴';
          out.title = 'Tirar item desta pasta';
          out.addEventListener('click', e => {
            e.stopPropagation();
            if (!confirm('Tirar "' + (it.name || 'item') + '" desta pasta? Ele volta para a lista principal.')) return;
            it.folder = '';
            saveData();
            showTopic(currentTopic);
          });
          card.appendChild(out);
          grid.appendChild(card);
        });
      } else {
        // Raiz: pastas (cards iPhone) + itens soltos (sem folder)
        const seenFolders = new Set();
        t.items.forEach((it, i) => {
          if (it.folder && it.folder.trim()) {
            if (seenFolders.has(it.folder)) return;
            seenFolders.add(it.folder);
            const folderItems = t.items.filter(x => x.folder === it.folder);
            grid.appendChild(buildFolderCard(it.folder, folderItems, t));
          } else {
            grid.appendChild(buildCard(it, 'item-card',
              () => showItem(t, 'item', i),
              () => deleteEntry(t, 'items', i),
              t
            ));
          }
        });
      }

      const add = document.createElement('div');
      add.className = 'add-card';
      add.textContent = '+';
      add.title = currentFolder ? 'Criar item nesta pasta' : 'Criar item solto na raiz';
      add.addEventListener('click', () => openItemEditor(t, 'item', null));
      grid.appendChild(add);
      topicView.appendChild(grid);

      currentView = 'topic';
      switchTo('topic');
    }

    /* ============================================================
       openCreateFolderModal — modal Apple para criar pasta nova
       (mostra TODOS os itens "soltos" do tópico para selecionar)
       ============================================================ */
    function openCreateFolderModal(topicData) {
      // candidatos: APENAS itens que ainda estão soltos (sem folder)
      const candidates = topicData.items.filter(it => !it.folder);
      const picked = new Set();

      modal.className = 'modal apple-modal';
      modal.innerHTML = `
        <div class="apple-modal-header">
          <h3>Nova pasta</h3>
          <p>Dê um nome e selecione os itens que vão entrar.</p>
        </div>

        <div class="apple-field">
          <label>Nome da pasta</label>
          <input type="text" id="cf_name" placeholder="Ex: Eventos, Marcas, Esportes…" autocomplete="off" />
        </div>

        <div class="apple-field">
          <div class="apple-field-row">
            <label>Itens disponíveis</label>
            <span class="apple-hint" id="cf_count">0 selecionado(s)</span>
          </div>
          ${candidates.length === 0
            ? '<p class="apple-empty">Nenhum item solto neste tópico. Tire itens de outras pastas primeiro ou crie itens novos.</p>'
            : `<div class="apple-list" id="cf_list">
                ${candidates.map(c => `
                  <label class="apple-row" data-id="${c.id}">
                    <span class="apple-check"></span>
                    <span class="apple-row-label">${escapeHtml(c.name || '(sem nome)')}</span>
                    ${c.categoria ? `<span class="apple-row-tag">${escapeHtml(c.categoria)}</span>` : ''}
                  </label>
                `).join('')}
               </div>`
          }
        </div>

        <div class="apple-actions">
          <button class="apple-btn ghost" id="cf_cancel">Cancelar</button>
          <button class="apple-btn primary" id="cf_confirm" disabled>Confirmar criação da pasta</button>
        </div>
      `;
      modalOverlay.classList.add('active');

      const nameInput = modal.querySelector('#cf_name');
      const countEl   = modal.querySelector('#cf_count');
      const confirmBtn = modal.querySelector('#cf_confirm');

      function refreshState() {
        if (countEl) countEl.textContent = picked.size + ' selecionado(s)';
        const okName = (nameInput.value || '').trim().length > 0;
        confirmBtn.disabled = !(okName && picked.size > 0);
      }

      modal.querySelectorAll('.apple-row').forEach(row => {
        row.addEventListener('click', e => {
          e.preventDefault();
          const id = row.dataset.id;
          if (picked.has(id)) { picked.delete(id); row.classList.remove('checked'); }
          else { picked.add(id); row.classList.add('checked'); }
          refreshState();
        });
      });

      nameInput.addEventListener('input', refreshState);
      modal.querySelector('#cf_cancel').addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', () => {
        const fname = nameInput.value.trim();
        if (!fname || picked.size === 0) return;
        // Verifica colisão de nome
        const existing = new Set(topicData.items.map(it => it.folder).filter(Boolean));
        if (existing.has(fname)) {
          if (!confirm('Já existe uma pasta com esse nome. Os itens selecionados serão somados a ela. Continuar?')) return;
        }
        topicData.items.forEach(it => { if (picked.has(it.id)) it.folder = fname; });
        saveData();
        closeModal();
        currentFolder = fname; // entra direto na pasta criada
        showTopic(currentTopic);
        showToast('PASTA CRIADA');
      });

      setTimeout(() => nameInput.focus(), 50);
      refreshState();
    }

    /* ============================================================
       openAddToFolderModal — adicionar mais itens a uma pasta existente
       (mostra apenas itens "soltos" — NUNCA itens de outras pastas, pra
       evitar bagunça e respeitar a regra "item só em um lugar")
       ============================================================ */
    function openAddToFolderModal(topicData, folderName) {
      const candidates = topicData.items.filter(it => !it.folder);
      const picked = new Set();

      modal.className = 'modal apple-modal';
      modal.innerHTML = `
        <div class="apple-modal-header">
          <h3>Adicionar à pasta</h3>
          <p>Pasta: <b>${escapeHtml(folderName)}</b></p>
        </div>
        <div class="apple-field">
          <div class="apple-field-row">
            <label>Itens disponíveis na lista principal</label>
            <span class="apple-hint" id="af_count">0 selecionado(s)</span>
          </div>
          ${candidates.length === 0
            ? '<p class="apple-empty">Não há itens soltos. Crie um item novo ou tire itens de outras pastas primeiro.</p>'
            : `<div class="apple-list">
                ${candidates.map(c => `
                  <label class="apple-row" data-id="${c.id}">
                    <span class="apple-check"></span>
                    <span class="apple-row-label">${escapeHtml(c.name || '(sem nome)')}</span>
                    ${c.categoria ? `<span class="apple-row-tag">${escapeHtml(c.categoria)}</span>` : ''}
                  </label>
                `).join('')}
              </div>`
          }
        </div>
        <div class="apple-actions">
          <button class="apple-btn ghost" id="af_cancel">Cancelar</button>
          <button class="apple-btn primary" id="af_confirm" disabled>Adicionar selecionados</button>
        </div>
      `;
      modalOverlay.classList.add('active');

      const countEl = modal.querySelector('#af_count');
      const confirmBtn = modal.querySelector('#af_confirm');
      function refresh() {
        if (countEl) countEl.textContent = picked.size + ' selecionado(s)';
        confirmBtn.disabled = picked.size === 0;
      }
      modal.querySelectorAll('.apple-row').forEach(row => {
        row.addEventListener('click', e => {
          e.preventDefault();
          const id = row.dataset.id;
          if (picked.has(id)) { picked.delete(id); row.classList.remove('checked'); }
          else { picked.add(id); row.classList.add('checked'); }
          refresh();
        });
      });
      modal.querySelector('#af_cancel').addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', () => {
        if (picked.size === 0) return;
        topicData.items.forEach(it => { if (picked.has(it.id)) it.folder = folderName; });

        closeModal();
        showTopic(currentTopic);

    function buildFolderCard(folderName, items, topicData) {
      const card = document.createElement('div');
      card.className = 'folder-card';

      // Mini grid of up to 9 items (3x3)
      const grid = document.createElement('div');
      grid.className = 'folder-grid';
      const max = 9;
      const visible = items.slice(0, max);
      visible.forEach(it => {
        const m = document.createElement('div');
        m.className = 'mini-icon';
        if (it.image) m.style.setProperty('--mini-image', `url("${it.image}")`);
        else m.textContent = (it.name || '').slice(0, 8);
        grid.appendChild(m);
      });
      // Filler / "+N more" indicator
      if (items.length > max) {
        const last = grid.lastChild;
        if (last) {
          last.classList.add('more');
          last.textContent = '+' + (items.length - max + 1);
          last.style.removeProperty('--mini-image');
        }
      }
      // Empty cells to fill 3x3 if fewer than 9
      const filler = Math.max(0, max - visible.length);
      for (let i = 0; i < filler; i++) {
        const e = document.createElement('div');
        e.className = 'mini-icon empty';
        grid.appendChild(e);
      }
      card.appendChild(grid);

      // Count badge
      const count = document.createElement('div');
      count.className = 'folder-count';
      count.textContent = items.length;
      card.appendChild(count);

      // Folder name
      const nm = document.createElement('div');
      nm.className = 'folder-name';
      nm.textContent = folderName;
      card.appendChild(nm);

      // Click → entra na pasta. Sem botões de admin no card (gestão fica dentro da pasta).
      card.addEventListener('click', () => {
        currentFolder = folderName;
        showTopic(currentTopic);
      });
      return card;
    }

    function buildCard(entry, cls, onClick, onDelete, topicData) {
      const card = document.createElement('div');
      card.className = cls;
      if (entry.id) card.dataset.itemId = entry.id;
      if (entry.image) card.style.setProperty('--card-image', `url("${entry.image}")`);
      card.innerHTML = `<div class="name">${entry.name || ''}</div>`;
      card.addEventListener('click', e => {
        if (e.target.classList.contains('delete-btn')) return;
        if (e.target.classList.contains('remove-from-folder-btn')) return;
        // Em admin-mode click no NOME (que é editável) abre design editor;
        // o card propriamente continua navegando.
        if (document.body.classList.contains('admin-mode') && e.target.closest('[data-design-id]')) return;
        onClick();
      });
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '×';
      del.title = 'Remover';
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Remover "' + (entry.name || 'item') + '"?')) onDelete();
      });
      card.appendChild(del);
      // Marca o título do item como editável (texto/cor/tamanho/posição)
      const nameEl = card.querySelector('.name');
      const topicKey = (topicData && topicData.banner && topicData.banner.title) || (currentTopic && currentTopic.key) || 'topic';
      const safeName = (entry.name || entry.id || 'item').replace(/\s+/g, '_').slice(0, 40);
      if (nameEl) FlyDesign.bindEditable(nameEl, `topic.${topicKey}.itemName_${safeName}`, { type: 'text', label: `Item "${entry.name || ''}"` });
      return card;
    }

    function deleteEntry(topicData, key, idx) {
      topicData[key].splice(idx, 1);
      saveData();
      showTopic(currentTopic);
    }

    /* =====================  ITEM HELPERS  ===================== */
    function genId() { return 'i_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
    function defaultItemShape(name = '') {
      return {
        id: genId(),
        name,
        image: '',
        categoria: '',
        folder: '',
        format: 'default', // 'default' | 'pacotes' — formato de painel quando aberto
        descricao: '',
        inclui: [],
        publico: '',
        data: '',
        periodo: '',
        responsavel: '',
        subitens: [],
        financeiro: { faturamento: 0, custos: 0, ticket_medio: 0, custo_implementacao: '' },
        performance: { vendas_mes: 0, crescimento: 0, clientes: 0, historico: [] },
        operacao: { fornecedores: [], estrutura: '', etapas: [], observacoes: '' },
        marketing: { estrategia: '', canais: [] },
        midia: { fotos: [], referencias: [], videos: [], video_ia: '' },
        cronograma: [],
        documentos: { link_principal: '', links_adicionais: [] }
      };
    }
    function normalizeItem(it) {
      const base = defaultItemShape();
      if (!it.descricao && it.description) it.descricao = it.description;
      it.id = it.id || base.id;
      it.categoria = it.categoria || '';
      it.folder = it.folder || '';
      it.format = (it.format === 'pacotes' || it.format === 'default') ? it.format : 'default';
      it.descricao = it.descricao || '';
      it.inclui = Array.isArray(it.inclui) ? it.inclui : [];
      it.publico = it.publico || '';
      it.data = it.data || '';
      it.periodo = it.periodo || '';
      it.responsavel = it.responsavel || '';
      it.subitens = Array.isArray(it.subitens) ? it.subitens.map(s => ({
        id: s.id || genId(),
        name: s.name || '',
        descricao: s.descricao || '',
        responsavel: s.responsavel || '',
        responsabilidades: Array.isArray(s.responsabilidades) ? s.responsabilidades : []
      })) : [];
      it.financeiro = Object.assign({}, base.financeiro, it.financeiro || {});
      it.performance = Object.assign({}, base.performance, it.performance || {});
      it.performance.historico = Array.isArray(it.performance.historico) ? it.performance.historico : [];
      it.operacao = Object.assign({}, base.operacao, it.operacao || {});
      it.operacao.fornecedores = Array.isArray(it.operacao.fornecedores) ? it.operacao.fornecedores : [];
      it.operacao.etapas = Array.isArray(it.operacao.etapas) ? it.operacao.etapas : [];
      it.marketing = Object.assign({}, base.marketing, it.marketing || {});
      it.marketing.canais = Array.isArray(it.marketing.canais) ? it.marketing.canais : [];
      it.midia = Object.assign({}, base.midia, it.midia || {});
      it.midia.fotos = Array.isArray(it.midia.fotos) ? it.midia.fotos : [];
      it.midia.referencias = Array.isArray(it.midia.referencias) ? it.midia.referencias : [];
      it.midia.videos = Array.isArray(it.midia.videos) ? it.midia.videos : [];
      it.cronograma = Array.isArray(it.cronograma) ? it.cronograma : [];
      it.documentos = Object.assign({}, base.documentos, it.documentos || {});
      it.documentos.links_adicionais = Array.isArray(it.documentos.links_adicionais) ? it.documentos.links_adicionais : [];
      return it;
    }
    function fmtDate(s) {
      if (!s) return '';
      const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[3]}/${m[2]}/${m[1]}`;
      return s;
    }
    function fmtCurrency(n) {
      const num = Number(n) || 0;
      return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 2 });
    }
    function fmtNumber(n) { return (Number(n) || 0).toLocaleString('pt-BR'); }
    function calcLucro(f) { return (Number(f.faturamento)||0) - (Number(f.custos)||0); }
    function calcMargem(f) {
      const fat = Number(f.faturamento) || 0;
      if (!fat) return 0;
      return (calcLucro(f) / fat) * 100;
    }

    function showToast(msg) {
      let toast = document.querySelector('.save-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'save-toast';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      requestAnimationFrame(() => toast.classList.add('show'));
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    /* Lightbox */
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    function openLightbox(src) {
      if (!src) return;
      lightboxImg.src = src;
      lightbox.classList.add('active');
    }
    lightbox.addEventListener('click', () => lightbox.classList.remove('active'));

    function loadDubaiExplorer(item) {
      if (!item.dubai) {
        item.dubai = JSON.parse(JSON.stringify(DUBAI_EXPLORER_DEFAULTS));
        // Para itens que NÃO são o "DUBAI EXPLORER" original, usa o nome do item
        // como nome do produto (ex: BILLIONAIRE, DUBAI GTA, DUBAI IN LOVE, DUBAI FAMILY)
        const isOriginalDubai = ((item.name || '').toUpperCase() === 'DUBAI EXPLORER');
        if (!isOriginalDubai && item.name) {
          item.dubai.produto.nome = item.name;
        }
        try { saveData(); } catch (e) {}
      }
      // Mescla defaults para campos novos que possam ter aparecido após updates
      const def = DUBAI_EXPLORER_DEFAULTS;
      for (const k of Object.keys(def)) {
        if (item.dubai[k] === undefined) item.dubai[k] = JSON.parse(JSON.stringify(def[k]));
      }
      return item.dubai;
    }
    function saveDubaiExplorer() { try { saveData(); } catch (e) {} }

    function dbxFmtMoney(v) {
      v = Number(v) || 0;
      return 'R$ ' + v.toLocaleString('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }
    function dbxComputeFinance(D) {
      const clientesPagos = D.clientes.filter(c => c.status === 'pago').length;
      const totalClientes = clientesPagos;
      const ticket = D.vendas.ticketMedio || 0;
      const totalReceita = totalClientes * ticket;
      const totalCustoFixo = D.custos.fixos.reduce((s,c) => s + (Number(c.valor)||0), 0);
      const custoVarPorCliente = D.custos.variaveis.reduce((s,c) => s + (Number(c.valor)||0), 0);
      const totalCustoVar = custoVarPorCliente * totalClientes;
      const upsellReceita = D.upsell.extras.reduce((s,e) => s + (Number(e.receita)||0), 0);
      const totalCusto = totalCustoFixo + totalCustoVar;
      const lucro = totalReceita + upsellReceita - totalCusto;
      const margem = (totalReceita + upsellReceita) > 0 ? (lucro / (totalReceita + upsellReceita) * 100) : 0;
      // CAC: gasto em marketing / clientes adquiridos
      const investMkt = D.marketing.campanhas.reduce((s,c) => s + (Number(c.investido)||0), 0);
      const cac = totalClientes > 0 ? (investMkt / totalClientes) : 0;
      // ROI: receita gerada por marketing / investido
      const receitaMkt = D.marketing.campanhas.reduce((s,c) => s + (Number(c.retorno)||0), 0);
      const roi = investMkt > 0 ? ((receitaMkt - investMkt) / investMkt * 100) : 0;
      return {
        totalClientes, ticket, totalReceita, totalCustoFixo, custoVarPorCliente,
        totalCustoVar, upsellReceita, totalCusto, lucro, margem, investMkt, cac, receitaMkt, roi
      };
    }

    /* ===== EDIT MODAL SYSTEM ===== */
    function dbxOpenModal({ title, fields, values, onSave }) {
      values = values || {};
      const overlay = document.createElement('div');
      overlay.className = 'dbx-modal-overlay';
      overlay.innerHTML = `
        <div class="dbx-modal">
          <div class="dbx-modal-head">
            <h3>${escapeHtml(title || 'Editar')}</h3>
            <button class="dbx-modal-close" type="button">✕</button>
          </div>
          <form class="dbx-form" autocomplete="off"></form>
          <div class="dbx-modal-actions">
            <button class="dbx-btn-cancel" type="button" data-act="cancel">Cancelar</button>
            <button class="dbx-btn-primary" type="button" data-act="save">Salvar</button>
          </div>
        </div>
      `;
      const form = overlay.querySelector('.dbx-form');
      const photoState = {};
      fields.forEach(f => {
        const wrap = document.createElement('div');
        wrap.className = 'dbx-form-field';
        const lbl = document.createElement('label');
        lbl.textContent = f.label || f.key;
        wrap.appendChild(lbl);
        const v = values[f.key] !== undefined ? values[f.key] : (f.default || '');
        if (f.type === 'textarea') {
          const ta = document.createElement('textarea');
          ta.name = f.key;
          ta.placeholder = f.placeholder || '';
          ta.value = v;
          wrap.appendChild(ta);
        } else if (f.type === 'select') {
          const sel = document.createElement('select');
          sel.name = f.key;
          (f.options || []).forEach(opt => {
            const o = document.createElement('option');
            o.value = typeof opt === 'string' ? opt : opt.value;
            o.textContent = typeof opt === 'string' ? opt : opt.label;
            if (String(o.value) === String(v)) o.selected = true;
            sel.appendChild(o);
          });
          wrap.appendChild(sel);
        } else if (f.type === 'photo') {
          photoState[f.key] = v || '';
          const row = document.createElement('div');
          row.className = 'dbx-form-photo';
          row.innerHTML = `
            <div class="dbx-form-photo-preview">${v ? `<img src="${v}" alt="">` : '📷'}</div>
            <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
              <input type="file" accept="image/*" hidden>
              <button type="button" class="dbx-mini-btn" data-act="pick-photo">📷 Escolher foto</button>
              ${v ? `<button type="button" class="dbx-mini-btn danger" data-act="clear-photo">Remover foto</button>` : ''}
            </div>
          `;
          const fileInput = row.querySelector('input[type=file]');
          const previewEl = row.querySelector('.dbx-form-photo-preview');
          row.querySelector('[data-act="pick-photo"]').addEventListener('click', () => fileInput.click());
          fileInput.addEventListener('change', () => {
            const file = fileInput.files && fileInput.files[0];
            if (!file) return;
            compressImage(file, 1200).then(dataUrl => {
              photoState[f.key] = dataUrl;
              previewEl.innerHTML = `<img src="${dataUrl}" alt="">`;
              // ensure remove button exists
              if (!row.querySelector('[data-act="clear-photo"]')) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'dbx-mini-btn danger';
                btn.dataset.act = 'clear-photo';
                btn.textContent = 'Remover foto';
                btn.addEventListener('click', () => {
                  photoState[f.key] = '';
                  previewEl.innerHTML = '📷';
                  btn.remove();
                });
                row.querySelector('div[style]').appendChild(btn);
              }
            });
          });
          const clearBtn = row.querySelector('[data-act="clear-photo"]');
          if (clearBtn) {
            clearBtn.addEventListener('click', () => {
              photoState[f.key] = '';
              previewEl.innerHTML = '📷';
              clearBtn.remove();
            });
          }
          wrap.appendChild(row);
        } else {
          const inp = document.createElement('input');
          inp.type = f.type === 'number' ? 'number' : 'text';
          inp.name = f.key;
          inp.placeholder = f.placeholder || '';
          inp.value = v;
          if (f.min !== undefined) inp.min = f.min;
          if (f.max !== undefined) inp.max = f.max;
          if (f.step !== undefined) inp.step = f.step;
          wrap.appendChild(inp);
        }
        form.appendChild(wrap);
      });
      function close() { overlay.remove(); }
      overlay.querySelector('.dbx-modal-close').addEventListener('click', close);
      overlay.querySelector('[data-act="cancel"]').addEventListener('click', close);
      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelector('[data-act="save"]').addEventListener('click', () => {
        const out = {};
        fields.forEach(f => {
          if (f.type === 'photo') {
            out[f.key] = photoState[f.key] || '';
          } else {
            const el = form.querySelector(`[name="${f.key}"]`);
            if (!el) return;
            let val = el.value;
            if (f.type === 'number') val = Number(val) || 0;
            out[f.key] = val;
          }
        });
        if (typeof onSave === 'function') onSave(out);
        close();
      });
      document.body.appendChild(overlay);
      // focus first input
      const firstInp = form.querySelector('input,textarea,select');
      if (firstInp) firstInp.focus();
    }

    /* ===== PAINEL: CUSTOS ===== */

          <div class="dbx-block">

              <div class="dbx-block-actions">
                <button class="dbx-mini-btn" data-add="custo-var">+ Adicionar</button>

            </div>
            <div class="dbx-list">
              ${vars.map((c, i) => `
                <div class="dbx-list-row dbx-editable" data-idx="${i}">

            { key: 'desc', label: 'Descrição', type: 'textarea', placeholder: 'O que vai acontecer nesse dia...' }
          ],
          values: cur,
          onSave: (vals) => {
            if (isEdit) D.operacao.roteiro[idx] = vals;
            else D.operacao.roteiro.push(vals);

          D.operacao.checklist.splice(i, 1);

          saveDubaiExplorer();
          // Re-render the panel to update the progress bar/percentage
          dbxRefresh(D, item);
        });
      });
    }

    function dbxBindClientes(panelEl, D, item) {
      function openClienteModal(idx) {
        const isEdit = idx !== undefined && idx !== null;
        const cur = isEdit ? D.clientes[idx] : { nome: '', origem: 'Tráfego Pago', status: 'pendente', tipoQuarto: 'Ocean View', recorrente: false };
        dbxOpenModal({
          title: isEdit ? 'Editar Cliente' : 'Novo Cliente',
          fields: [
            { key: 'nome', label: 'Nome completo', type: 'text' },
            { key: 'origem', label: 'Origem', type: 'select', options: ['Tráfego Pago', 'Influenciador', 'Orgânico', 'Indicação', 'Outro'] },
            { key: 'status', label: 'Status', type: 'select', options: [
              { value: 'pago', label: 'Pago' },
              { value: 'pendente', label: 'Pendente' },
              { value: 'cancelado', label: 'Cancelado' }
            ]},
            { key: 'tipoQuarto', label: 'Tipo de quarto', type: 'text', placeholder: 'Ex: Ocean View, Suíte Royal, Standard...' },
            { key: 'recorrente', label: 'Cliente recorrente?', type: 'select', options: [
              { value: 'true', label: 'Sim — é recorrente' },
              { value: 'false', label: 'Não — é novo' }
            ]}
          ],
          values: { ...cur, recorrente: cur.recorrente ? 'true' : 'false' },
          onSave: (vals) => {
            const out = { ...vals, recorrente: vals.recorrente === 'true' };
            if (isEdit) D.clientes[idx] = out;
            else D.clientes.push(out);
            // atualiza vendas.origem (contagem)
            recomputeOrigem();
            dbxRefresh(D, item);
          }
        });
      }
      function recomputeOrigem() {
        const counts = {};
        D.clientes.forEach(c => {
          if (c.status === 'pago') {
            counts[c.origem || 'Outro'] = (counts[c.origem || 'Outro'] || 0) + 1;
          }
        });
        D.vendas.origem = counts;
      }
      panelEl.querySelectorAll('[data-add="cliente"]').forEach(b => b.addEventListener('click', () => openClienteModal()));
      panelEl.querySelectorAll('[data-edit="cliente"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        openClienteModal(parseInt(b.dataset.idx, 10));
      }));
      panelEl.querySelectorAll('[data-del="cliente"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = parseInt(b.dataset.idx, 10);
        if (dbxConfirm(`Excluir cliente "${D.clientes[i].nome}"?`)) {
          D.clientes.splice(i, 1);
          recomputeOrigem();
          dbxRefresh(D, item);
        }
      }));
    }

    function dbxBindUpsell(panelEl, D, item) {
      function openUpModal(idx) {
        const isEdit = idx !== undefined && idx !== null;
        const cur = isEdit ? D.upsell.extras[idx] : { nome: '', vendidos: 0, preco: 0, receita: 0 };
        dbxOpenModal({
          title: isEdit ? 'Editar Extra' : 'Novo Extra (Upsell)',
          fields: [
            { key: 'nome', label: 'Nome do extra', type: 'text', placeholder: 'Ex: Yacht VIP +1 dia, Jantar Burj Al Arab...' },
            { key: 'vendidos', label: 'Quantidade vendida', type: 'number', min: 0 },
            { key: 'preco', label: 'Preço unitário (R$)', type: 'number', min: 0, step: '0.01' },
            { key: 'receita', label: 'Receita total (R$) — auto = vendidos × preço', type: 'number', min: 0, step: '0.01' }
          ],
          values: cur,
          onSave: (vals) => {
            // Auto-calc receita se vier 0 ou for menor que vendidos*preco
            if (!vals.receita) {
              vals.receita = (Number(vals.vendidos)||0) * (Number(vals.preco)||0);
            }
            if (isEdit) D.upsell.extras[idx] = vals;
            else D.upsell.extras.push(vals);
            dbxRefresh(D, item);
          }
        });
      }
      panelEl.querySelectorAll('[data-add="upsell"]').forEach(b => b.addEventListener('click', () => openUpModal()));
      panelEl.querySelectorAll('[data-edit="upsell"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        openUpModal(parseInt(b.dataset.idx, 10));
      }));
      panelEl.querySelectorAll('[data-del="upsell"]').forEach(b => b.addEventListener('click', (e) => {
        e.stopPropagation();
        const i = parseInt(b.dataset.idx, 10);
        if (dbxConfirm(`Excluir extra "${D.upsell.extras[i].nome}"?`)) {
          D.upsell.extras.splice(i, 1);
          dbxRefresh(D, item);
        }
      }));

    /* ===== PAINEL: ALERTAS INTELIGENTES ===== */
    function dbxRenderAlertas(D, fin) {
      const alerts = [];
      // Auto-gerados a partir dos dados
      if (fin.margem < 20) alerts.push({ tipo:'danger', titulo:'Margem baixa', desc:`Margem de ${fin.margem.toFixed(1)}% está abaixo de 20%. Reveja preço ou custos.` });
      else if (fin.margem >= 40) alerts.push({ tipo:'positive', titulo:'Margem excelente', desc:`Margem de ${fin.margem.toFixed(1)}% — você está escalando com lucro.` });
      if (fin.roi < 100 && fin.investMkt > 0) alerts.push({ tipo:'warning', titulo:'ROI marketing fraco', desc:`ROI de ${fin.roi.toFixed(0)}% — algumas campanhas estão pagando pouco.` });
      const checklistOpen = D.operacao.checklist.filter(c => !c.done).length;
      if (checklistOpen > 0) alerts.push({ tipo:'warning', titulo:'Checklist incompleto', desc:`${checklistOpen} item(ns) pendente(s) na operação.` });
      const equipePend = D.equipe.filter(e => e.status !== 'confirmado').length;
      if (equipePend > 0) alerts.push({ tipo:'warning', titulo:'Equipe não confirmada', desc:`${equipePend} pessoa(s) ainda sem confirmação.` });
      const clientesPend = D.clientes.filter(c => c.status === 'pendente').length;
      if (clientesPend > 0) alerts.push({ tipo:'warning', titulo:'Pagamentos pendentes', desc:`${clientesPend} cliente(s) com pagamento em aberto.` });
      if (fin.totalClientes >= 10) alerts.push({ tipo:'positive', titulo:'Alta demanda', desc:`Pacote com ${fin.totalClientes} clientes pagantes — momento de aumentar preço ou abrir nova turma.` });

      if (!alerts.length) alerts.push({ tipo:'positive', titulo:'Tudo em ordem', desc:'Nenhum alerta crítico no momento.' });

      return `
        <div class="dbx-panel-head">
          <h2><span class="ico">🚨</span>Alertas Inteligentes</h2>
        </div>
        <div class="dbx-alerts">
          ${alerts.map(a => `
            <div class="dbx-alert ${a.tipo}">
              <div class="dbx-alert-icon">${a.tipo==='danger'?'🔴':a.tipo==='warning'?'⚠️':'✅'}</div>
              <div class="dbx-alert-body">
                <h4>${escapeHtml(a.titulo)}</h4>
                <p>${escapeHtml(a.desc)}</p>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    /* =====================  VIEW 4 (ITEM HUB)  ===================== */
    function showItem(topicData, kind, idx) {
      currentItemRef = { topicData, kind, idx };
      const list = topicData.items;
      const it = normalizeItem(list[idx]);
      list[idx] = it;
      itemView.innerHTML = '';

      // Premium item modules — detect special items inside ESTRUTURA CORPORATIVA
      if (currentTopic && currentTopic.key === 'ESTRUTURA CORPORATIVA' && kind === 'item') {
        const upper = (it.name || '').toUpperCase();
        if (upper === 'HIERARQUIA') {
          renderHierarchyItemView(it, topicData, idx);
          switchTo('item');
          return;
        }
        if (upper.includes('BASES FLY') || upper === 'ESTRUTURA DAS BASES FLY' || upper === 'BASES FLY') {
          renderBasesFlyItemView(it, topicData, idx);
          switchTo('item');
          return;
        }
      }
      // Premium item modules — formato PACOTES (Dubai Explorer-style)
      // Aplica-se a:
      //   1. Itens com format === 'pacotes' (qualquer tópico)
      //   2. Item legado "DUBAI EXPLORER" dentro de PRODUTOS (compatibilidade)
      if (kind === 'item') {
        const upper = (it.name || '').toUpperCase();
        const isLegacyDubai = (currentTopic && currentTopic.key === 'PRODUTOS' && upper === 'DUBAI EXPLORER');
        if (it.format === 'pacotes' || isLegacyDubai) {

    /* =====================  SUPABASE + AUTH INIT  ===================== */
    // Espera SDK carregar, conecta no Supabase, roda gate de Auth (login).
    // Se offline, libera direto (cache local).
    async function bootSupabase() {
      let attempts = 0;
      await new Promise((resolve) => {
        const tick = () => {
          if (typeof window.supabase !== 'undefined' && window.supabase.createClient) resolve(true);
          else if (attempts++ < 30) setTimeout(tick, 100);
          else resolve(false);
        };
        tick();
      });

      const ok = await initSupabase();

      if (ok) {
        document.body.classList.add('fly-locked');
        const unlocked = await runAuthGate();
        if (unlocked) document.body.classList.remove('fly-locked');
      }

      // Auto-logout se token expirar / sessão for revogada
      if (supaClient) {
        supaClient.auth.onAuthStateChange((event, session) => {
          if (event === 'SIGNED_OUT' || (event === 'TOKEN_REFRESHED' && !session)) {
            __currentSession = null;
            document.body.classList.add('fly-locked');
            // Re-mostra gate
            if (!document.querySelector('.pin-gate-overlay')) {
              runAuthGate().then(ok => { if (ok) document.body.classList.remove('fly-locked'); });
            }
          } else if (event === 'SIGNED_IN' && session) {
            __currentSession = session;
            setSyncStatus('online', session.user.email);
          }
        });
      }
    }
    bootSupabase();

    /* =====================  FILE -> DATA URL  ===================== */
    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve('');
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    /* compress images so we don't blow localStorage */
    async function compressImage(file, maxW = 1400, quality = 0.82) {
      if (!file) return '';
      const dataUrl = await fileToDataURL(file);
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxW / img.width);
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

    // Versão para LOGOS — preserva PNG transparente e SVG vetorial.
    // Usada pelo FlyDesign editor (e em qualquer upload de logo do app).
    async function compressLogo(file, maxW = 800) {
      if (!file) return '';
      const name = (file.name || '').toLowerCase();
      const isSvg = file.type === 'image/svg+xml' || name.endsWith('.svg');
      // SVG é vetorial — devolve direto sem rasterizar
      if (isSvg) return await fileToDataURL(file);
      const isPng = file.type === 'image/png' || name.endsWith('.png');
      const dataUrl = await fileToDataURL(file);
      return new Promise(resolve => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxW / img.width);
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, w, h); // garante fundo transparente
          ctx.drawImage(img, 0, 0, w, h);
          // PNG preserva alpha; JPEG aplana fundo branco
          if (isPng) {
            resolve(canvas.toDataURL('image/png'));
          } else {
            resolve(canvas.toDataURL('image/jpeg', 0.92));
          }
        };
        img.onerror = () => resolve(dataUrl);
        img.src = dataUrl;
      });
    }

          <label>FOTOS DO PRODUTO</label>
          <p style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px;">Fotos do que tem dentro do produto.</p>
          <div class="upload-zone" id="up_fotos">📷 CLIQUE PARA CARREGAR FOTOS (várias permitidas)</div>
          <input type="file" id="m_fotos_in" accept="image/*" multiple style="display:none;" />
          <div class="media-grid" id="prev_fotos" style="margin-top:8px;">
            ${it.midia.fotos.map((src, i) => `
              <div class="media-thumb" data-rm="fotos" data-rm-i="${i}" style="background-image:url('${src}'); cursor:default;">
                <button class="rm" data-rm-btn="fotos" data-rm-bi="${i}" type="button">×</button>
              </div>`).join('')}
          </div>

          <label style="margin-top:18px;">REFERÊNCIAS VISUAIS</label>
          <div class="upload-zone" id="up_ref">🎨 CLIQUE PARA CARREGAR REFERÊNCIAS</div>
          <input type="file" id="m_ref_in" accept="image/*" multiple style="display:none;" />
          <div class="media-grid" id="prev_ref" style="margin-top:8px;">
            ${it.midia.referencias.map((src, i) => `
              <div class="media-thumb" data-rm="referencias" data-rm-i="${i}" style="background-image:url('${src}'); cursor:default;">
                <button class="rm" data-rm-btn="referencias" data-rm-bi="${i}" type="button">×</button>
              </div>`).join('')}
          </div>

          <label style="margin-top:18px;">VÍDEO DE IA (link)</label>
          <input type="text" id="m_video_ia" value="${escapeHtml(it.midia.video_ia || '')}" placeholder="https://..." />

          <label>CONTEÚDO DO PRODUTO (vídeos)</label>
          <p style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px;">Cole links de YouTube, Vimeo, Drive, etc.</p>
          <div id="le_videos">
            ${it.midia.videos.map(v => {
              const titulo = typeof v === 'string' ? '' : (v.titulo || '');
              const url = typeof v === 'string' ? v : (v.url || '');
              return `<div class="list-row">
                <input type="text" class="lv_titulo" value="${escapeHtml(titulo)}" placeholder="Título" />
                <input type="text" class="lv_url" value="${escapeHtml(url)}" placeholder="https://..." />
                <button class="modal-btn lv_del" type="button">×</button>
              </div>`;
            }).join('')}
          </div>
          <button class="modal-btn list-add" type="button" data-add="videos">+ ADICIONAR VÍDEO</button>
        </div>

        <div class="modal-panel hidden" data-mpanel="cron">
          <label>LINHA DO TEMPO · EXECUÇÃO</label>
          <p style="font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px;">Cada item é uma fase com data, título e descrição.</p>
          <div id="le_cron">
            ${it.cronograma.map(c => `
              <div class="input-row-vertical">
                <button class="rm-row" type="button">×</button>
                <input type="date" class="cr_data" value="${escapeHtml(c.data || '')}" />
                <input type="text" class="cr_titulo" value="${escapeHtml(c.titulo || '')}" placeholder="Título da fase" />
                <textarea class="cr_desc" placeholder="Descrição">${escapeHtml(c.descricao || '')}</textarea>
              </div>`).join('')}
          </div>
          <button class="modal-btn list-add" type="button" data-add="cron">+ ADICIONAR FASE</button>
        </div>

        <div class="modal-panel hidden" data-mpanel="docs">
          <label>LINK PRINCIPAL (Google Docs ou outro)</label>
          <input type="text" id="m_doc_main" value="${escapeHtml(it.documentos.link_principal || '')}" placeholder="https://docs.google.com/..." />
          <label>LINKS ADICIONAIS</label>
          ${renderLinksEditor(it.documentos.links_adicionais || [])}
        </div>

        <div class="modal-actions">
          <button class="modal-btn" id="m_cancel" type="button">CANCELAR</button>
          <button class="modal-btn primary" id="m_save" type="button">SALVAR</button>
        </div>
      `;
      modalOverlay.classList.add('active');

      // Tab switching
      modal.querySelectorAll('.modal-tab').forEach(b => {
        b.addEventListener('click', () => {
          modal.querySelectorAll('.modal-tab').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          modal.querySelectorAll('.modal-panel').forEach(p => p.classList.add('hidden'));
          modal.querySelector('.modal-panel[data-mpanel="' + b.dataset.mtab + '"]').classList.remove('hidden');
        });
      });

      // Image upload (banner)
      modal.querySelector('#m_image').addEventListener('change', async (e) => {
        if (e.target.files[0]) {
          pendingImage = await compressImage(e.target.files[0]);
          modal.querySelector('#m_preview').style.backgroundImage = `url('${pendingImage}')`;
        }
      });

      // Format picker — toggle .active visual state quando muda radio
      modal.querySelectorAll('input[name="m_format"]').forEach(r => {
        r.addEventListener('change', () => {
          modal.querySelectorAll('.format-opt').forEach(o => o.classList.remove('active'));
          r.closest('.format-opt')?.classList.add('active');
        });
      });

      // Pending media buffers (so we can save them on submit)
      const pendingMedia = {
        fotos: [...it.midia.fotos],
        referencias: [...it.midia.referencias]
      };

      function refreshGallery(coll) {
        const grid = modal.querySelector(coll === 'fotos' ? '#prev_fotos' : '#prev_ref');
        grid.innerHTML = pendingMedia[coll].map((src, i) => `
          <div class="media-thumb" style="background-image:url('${src}'); cursor:default;">
            <button class="rm" data-rm-btn="${coll}" data-rm-bi="${i}" type="button">×</button>
          </div>`).join('');
      }

      // Multi-image upload zones
      function bindUploadZone(zoneId, inputId, coll) {
        const zone = modal.querySelector(zoneId);
        const input = modal.querySelector(inputId);
        zone.addEventListener('click', () => input.click());
        input.addEventListener('change', async () => {
          const files = [...(input.files || [])];
          for (const file of files) {
            const compressed = await compressImage(file, 900, 0.75);
            pendingMedia[coll].push(compressed);
          }
          input.value = '';
          refreshGallery(coll);
        });
      }
      bindUploadZone('#up_fotos', '#m_fotos_in', 'fotos');
      bindUploadZone('#up_ref',   '#m_ref_in',   'referencias');

      // Dynamic list buttons (delegation)
      modal.addEventListener('click', (e) => {
        if (e.target.classList.contains('le_del') ||
            e.target.classList.contains('ll_del') ||
            e.target.classList.contains('lv_del')) {
          e.target.closest('.list-row').remove();
          return;
        }
        if (e.target.classList.contains('rm-row')) {
          e.target.closest('.input-row-vertical').remove();
          return;
        }
        if (e.target.dataset && e.target.dataset.rmBtn) {
          const coll = e.target.dataset.rmBtn;
          const i = +e.target.dataset.rmBi;
          pendingMedia[coll].splice(i, 1);
          refreshGallery(coll);
          return;
        }
        if (e.target.dataset && e.target.dataset.add) {
          const which = e.target.dataset.add;
          if (which === 'links') {
            const div = document.createElement('div');
            div.className = 'list-row';
            div.innerHTML = `<input type="text" class="ll_label" placeholder="Rótulo" /><input type="text" class="ll_url" placeholder="https://..." /><button class="modal-btn ll_del" type="button">×</button>`;
            modal.querySelector('#le_links').appendChild(div);
          } else if (which === 'videos') {
            const div = document.createElement('div');
            div.className = 'list-row';
            div.innerHTML = `<input type="text" class="lv_titulo" placeholder="Título" /><input type="text" class="lv_url" placeholder="https://..." /><button class="modal-btn lv_del" type="button">×</button>`;
            modal.querySelector('#le_videos').appendChild(div);
          } else if (which === 'cron') {
            const div = document.createElement('div');
            div.className = 'input-row-vertical';
            div.innerHTML = `
              <button class="rm-row" type="button">×</button>
              <input type="date" class="cr_data" />
              <input type="text" class="cr_titulo" placeholder="Título da fase" />
              <textarea class="cr_desc" placeholder="Descrição"></textarea>`;
            modal.querySelector('#le_cron').appendChild(div);
          } else if (which === 'sub') {
            const div = document.createElement('div');
            div.className = 'input-row-vertical';
            div.innerHTML = `
              <button class="rm-row" type="button">×</button>
              <input type="text" class="su_name" placeholder="Nome do subsetor" />
              <input type="text" class="su_resp" placeholder="Responsável" />
              <textarea class="su_desc" placeholder="Descrição"></textarea>
              <textarea class="su_resps" placeholder="Responsabilidades (uma por linha)"></textarea>`;
            modal.querySelector('#le_sub').appendChild(div);
          } else {
            const div = document.createElement('div');
            div.className = 'list-row';
            const ph = e.target.dataset.placeholder || '';
            div.innerHTML = `<input type="text" class="le_input" placeholder="${ph}" /><button class="modal-btn le_del" type="button">×</button>`;
            modal.querySelector('#le_' + which).appendChild(div);
          }
        }
      });

      modal.querySelector('#m_cancel').addEventListener('click', closeModal);
      modal.querySelector('#m_save').addEventListener('click', () => {
        function readList(name) {
          return [...modal.querySelectorAll(`#le_${name} .le_input`)]
            .map(i => i.value.trim())
            .filter(Boolean);
        }
        function readLinks() {
          const out = [];
          modal.querySelectorAll('#le_links .list-row').forEach(r => {
            const url = r.querySelector('.ll_url').value.trim();
            if (!url) return;
            const label = r.querySelector('.ll_label').value.trim();
            out.push({ label, url });
          });
          return out;
        }
        const histLines = (modal.querySelector('#m_hist').value || '')
          .split('\n').map(s => s.trim()).filter(Boolean);

        function readVideos() {
          const out = [];
          modal.querySelectorAll('#le_videos .list-row').forEach(r => {
            const url = r.querySelector('.lv_url').value.trim();
            if (!url) return;
            const titulo = r.querySelector('.lv_titulo').value.trim();
            out.push({ titulo, url });
          });
          return out;
        }
        function readCronograma() {
          const out = [];
          modal.querySelectorAll('#le_cron .input-row-vertical').forEach(r => {
            const titulo = r.querySelector('.cr_titulo').value.trim();
            const data = r.querySelector('.cr_data').value;
            const descricao = r.querySelector('.cr_desc').value;
            if (!titulo && !data && !descricao) return;
            out.push({ data, titulo, descricao });
          });
          return out;
        }
        function readSubitens() {
          const out = [];
          modal.querySelectorAll('#le_sub .input-row-vertical').forEach(r => {
            const name = r.querySelector('.su_name').value.trim();
            const responsavel = r.querySelector('.su_resp').value.trim();
            const descricao = r.querySelector('.su_desc').value;
            const respsTxt = r.querySelector('.su_resps').value || '';
            const responsabilidades = respsTxt.split('\n').map(s => s.trim()).filter(Boolean);
            if (!name && !descricao && !responsavel && !responsabilidades.length) return;
            out.push({ id: genId(), name, responsavel, descricao, responsabilidades });
          });
          return out;
        }

        const formatRadio = modal.querySelector('input[name="m_format"]:checked');
        const chosenFormat = (formatRadio && formatRadio.value === 'pacotes') ? 'pacotes' : 'default';
        const updated = {
          id: it.id,
          name: modal.querySelector('#m_name').value.trim(),
          image: pendingImage,
          categoria: modal.querySelector('#m_cat').value.trim(),
          folder:    (modal.querySelector('#m_folder')?.value || '').trim(),
          format:    chosenFormat,
          // Preservar dubai data quando já existir (mantém edits que o user fez no painel Pacotes)
          dubai:     it.dubai,
          descricao: modal.querySelector('#m_desc').value,
          inclui: readList('inclui'),
          publico: modal.querySelector('#m_publico').value.trim(),
          data: modal.querySelector('#m_data').value,
          periodo: modal.querySelector('#m_periodo').value.trim(),
          responsavel: modal.querySelector('#m_resp').value.trim(),
          subitens: readSubitens(),
          financeiro: {
            faturamento: Number(modal.querySelector('#m_fat').value) || 0,
            custos:      Number(modal.querySelector('#m_cus').value) || 0,
            ticket_medio:Number(modal.querySelector('#m_tic').value) || 0,
            custo_implementacao: modal.querySelector('#m_custo_impl').value
          },
          performance: {
            vendas_mes:  Number(modal.querySelector('#m_vendas').value) || 0,
            crescimento: Number(modal.querySelector('#m_cresc').value)  || 0,
            clientes:    Number(modal.querySelector('#m_cli').value)    || 0,
            historico:   histLines
          },
          operacao: {
            fornecedores: readList('fornecedores'),
            estrutura:    modal.querySelector('#m_estr').value,
            etapas:       readList('etapas'),
            observacoes:  modal.querySelector('#m_obs').value
          },
          marketing: {
            estrategia: modal.querySelector('#m_mkt_estrat').value,
            canais:     readList('canais')
          },
          midia: {
            fotos:       pendingMedia.fotos,
            referencias: pendingMedia.referencias,
            videos:      readVideos(),
            video_ia:    modal.querySelector('#m_video_ia').value.trim()
          },
          cronograma: readCronograma(),
          documentos: {
            link_principal:    modal.querySelector('#m_doc_main').value.trim(),
            links_adicionais:  readLinks()
          }
        };
        updated.description = updated.descricao; // backwards-compat

        let savedIdx = idx;
        if (editing) list[idx] = updated;
        else { list.push(updated); savedIdx = list.length - 1; }
        saveData();
        closeModal();
        modal.className = 'modal'; // reset
        showToast(editing ? 'ITEM ATUALIZADO' : 'ITEM CRIADO');
        if (currentView === 'item') showItem(topicData, kind, savedIdx);
        else showTopic(currentTopic);
      });
    }

    function openBannerEditor(topicData) {
      const b = topicData.banner;
      const iconsHtml = (b.icons || []).map((ic, i) => `
        <div style="display:flex; gap:8px; align-items:center; margin-top:8px; padding:8px; border:1px solid rgba(245,184,66,0.25); border-radius:8px;">
          <div style="width:60px; height:40px; background:#111 ${ic.image ? `url('${ic.image}')` : ''} center/cover; border:1px solid var(--gold); border-radius:6px;"></div>
          <input type="text" data-icon-idx="${i}" class="ic_label" value="${escapeHtml(ic.label || '')}" placeholder="Rótulo" style="flex:1;" />
          <input type="file" data-icon-idx="${i}" class="ic_file" accept="image/*" style="max-width:120px;" />
          <button class="modal-btn" data-icon-remove="${i}">×</button>
        </div>
      `).join('');
      modal.innerHTML = `
        <h3>EDITAR BANNER</h3>
        <label>TÍTULO</label>
        <input type="text" id="b_title" value="${escapeHtml(b.title || '')}" />
        <label>IMAGEM DE FUNDO</label>
        <input type="file" id="b_image" accept="image/*" />
        <div class="preview-img" id="b_preview" style="${b.image ? `background-image:url('${b.image}')` : ''}"></div>
        <label>ÍCONES (canto superior direito)</label>
        <div id="b_icons">${iconsHtml}</div>
        <button class="modal-btn" id="b_addIcon" style="margin-top:10px;">+ ADICIONAR ÍCONE</button>
        <div class="modal-actions">
          <button class="modal-btn" id="b_cancel">CANCELAR</button>
          <button class="modal-btn primary" id="b_save">SALVAR</button>
        </div>
      `;
      modalOverlay.classList.add('active');
      let pendingBgImage = b.image || '';
      const iconImageBuffers = (b.icons || []).map(ic => ic.image || '');

      modal.querySelector('#b_image').addEventListener('change', async (e) => {
        if (e.target.files[0]) {
          pendingBgImage = await compressImage(e.target.files[0]);
          modal.querySelector('#b_preview').style.backgroundImage = `url('${pendingBgImage}')`;
        }
      });

      modal.querySelectorAll('.ic_file').forEach(inp => {
        inp.addEventListener('change', async (e) => {
          const i = +inp.dataset.iconIdx;
          if (e.target.files[0]) {
            iconImageBuffers[i] = await compressImage(e.target.files[0], 400, 0.8);
          }
        });
      });
      modal.querySelectorAll('[data-icon-remove]').forEach(btn => {
        btn.addEventListener('click', () => {
          const i = +btn.dataset.iconRemove;
          b.icons.splice(i, 1);
          iconImageBuffers.splice(i, 1);
          openBannerEditor(topicData);
        });
      });
      modal.querySelector('#b_addIcon').addEventListener('click', () => {
        b.icons = b.icons || [];
        b.icons.push({ label: '', image: '' });
        openBannerEditor(topicData);
      });

      modal.querySelector('#b_cancel').addEventListener('click', closeModal);
      modal.querySelector('#b_save').addEventListener('click', () => {
        b.title = modal.querySelector('#b_title').value.trim();
        b.image = pendingBgImage;
        b.icons = (b.icons || []).map((ic, i) => ({
          label: modal.querySelector(`.ic_label[data-icon-idx="${i}"]`).value.trim(),
          image: iconImageBuffers[i] || ''
        }));
        saveData();
        closeModal();
        showTopic(currentTopic);
      });
    }

    /* =====================  KEYBOARD  ===================== */
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        if (modalOverlay.classList.contains('active')) closeModal();
        else backBtn.click();
      }
    });
  </script>
</body>
</html>
