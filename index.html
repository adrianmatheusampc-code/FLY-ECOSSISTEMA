  }
  .team-row .info { flex: 1; }
  .team-row .info .name { font-size: 14px; color: #fff; font-weight: 500; }
  .team-row .info .desc { font-size: 11px; color: rgba(255,255,255,.55); margin-top: 2px; letter-spacing: .5px; }

  /* OPERATION */
  .bases-ops {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
  }
  .ops-card {
    padding: 26px;
    border-radius: 22px;
    background:
      linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
    border: 1px solid rgba(198,168,90,.22);
  }
  .ops-card .ops-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .ops-card .ops-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(198,168,90,.18), rgba(198,168,90,.05));
    border: 1px solid rgba(198,168,90,.35);
    color: #C6A85A;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .ops-card h3 {
    margin: 0;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    font-weight: 400;
  }
  .ops-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .ops-list li {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 12px;
    background: rgba(0,0,0,.2);
    border: 1px solid rgba(255,255,255,.04);
    margin-bottom: 8px;
    font-size: 13px;
    color: rgba(255,255,255,.85);
  }
  .ops-list li:last-child { margin-bottom: 0; }
  .ops-list li::before {
    content: '◆';
    color: #C6A85A;
    font-size: 10px;
    flex-shrink: 0;
  }

  /* SCALE */
  .bases-scale {
    padding: 30px;
    border-radius: 22px;
    background:
      radial-gradient(circle at 0% 100%, rgba(198,168,90,.1), transparent 55%),
      linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
    border: 1px solid rgba(198,168,90,.22);
    text-align: center;
  }
  .scale-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-top: 20px;
  }
  .scale-item {
    padding: 22px 16px;
    border-radius: 16px;
    background: rgba(0,0,0,.25);
    border: 1px solid rgba(198,168,90,.18);
  }
  .scale-item .ico {
    font-size: 28px;
    color: #C6A85A;
    margin-bottom: 12px;
  }
  .scale-item .name {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
    font-weight: 500;
    margin-bottom: 6px;
  }
  .scale-item .desc {
    font-size: 11px;
    color: rgba(255,255,255,.6);
    line-height: 1.5;
  }

  @media (max-width: 880px) {
    .bases-map-section { grid-template-columns: 1fr; }
    .bases-legend { max-height: 380px; }
    .dubai-map { min-height: 460px; aspect-ratio: 4/3; }
    .map-tool-btn { padding: 6px 10px; font-size: 10px; }
    .map-tool-btn .lbl { display: none; }
    .map-hint { font-size: 9px; padding: 5px 10px; }
    .map-zoom-controls { right: 10px; bottom: 50px; }
    .zoom-btn { width: 34px; height: 34px; font-size: 16px; }
    .pin-card { max-width: 92vw; }
    .pin-card-name { font-size: 18px; }
    .bases-costs, .bases-ops { grid-template-columns: 1fr; }
    .bases-team-row { grid-template-columns: 1fr; gap: 18px; }
    .scale-grid { grid-template-columns: repeat(2, 1fr); }
    .bases-hero h1 { font-size: 28px; letter-spacing: 4px; }
    .bases-hero-kpis { grid-template-columns: repeat(2, 1fr); }
    .team-total .num { font-size: 64px; }
    .bases-video-card { grid-column: span 1; }
  }

  /* ============================================================
     DUBAI EXPLORER — DASHBOARD PREMIUM (12 PAINÉIS)
     ============================================================ */
  .dbx-module {
    width: 100%;
    max-width: 1340px;
    margin: 0 auto;
    padding: 16px 16px 80px;
    color: #fff;
    --dbx-gold: #C6A85A;
    --dbx-gold-bright: #E6C77A;
    --dbx-bg: #0B0B0B;
    --dbx-card: #131210;
    --dbx-border: rgba(198,168,90,.25);
    --dbx-pos: #6FE3A8;
    --dbx-warn: #F2C26B;
    --dbx-neg: #FF6B6B;
  }
  .dbx-module h2, .dbx-module h3, .dbx-module h4 { color: #fff; font-weight: 400; }

  /* HERO */
  .dbx-hero {
    position: relative;
    height: 320px;
    border-radius: 24px;
    overflow: hidden;
    margin-bottom: 28px;
    border: 1px solid var(--dbx-border);
    background: linear-gradient(180deg, #131210, #0B0B0B);
  }
  .dbx-hero-bg {
    position: absolute; inset: 0;
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    transition: transform .6s ease;
  }
  .dbx-hero:hover .dbx-hero-bg { transform: scale(1.04); }
  .dbx-hero-overlay {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(11,11,11,.35) 0%, rgba(11,11,11,.85) 80%, rgba(11,11,11,1) 100%),
      radial-gradient(ellipse at 100% 0%, rgba(198,168,90,.18), transparent 55%);
  }
  .dbx-hero-content {
    position: absolute; bottom: 26px; left: 32px; right: 32px;
    z-index: 2;
  }
  .dbx-eyebrow {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
    color: rgba(198,168,90,.85); margin-bottom: 8px; font-weight: 700;
  }
  .dbx-hero-content h1 {
    margin: 0; font-size: 46px; letter-spacing: 6px; font-weight: 200;
    background: linear-gradient(180deg, #fff 0%, #C6A85A 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .dbx-meta {
    margin-top: 10px;
    font-size: 13px; letter-spacing: 2px; color: rgba(255,255,255,.7);
    display: flex; gap: 12px; align-items: center;
  }
  .dbx-meta .dot { color: rgba(198,168,90,.6); }
  .dbx-hero-kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    margin-top: 18px;
  }
  .dbx-kpi {
    padding: 10px 14px;
    border-radius: 12px;
    background: rgba(0,0,0,.5);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(198,168,90,.25);
  }
  .dbx-kpi .lbl { font-size: 9px; letter-spacing: 2.5px; color: rgba(255,255,255,.55); text-transform: uppercase; }
  .dbx-kpi .val { font-size: 20px; font-weight: 300; color: #C6A85A; margin-top: 4px; }
  .dbx-kpi .val.pos  { color: var(--dbx-pos); }
  .dbx-kpi .val.warn { color: var(--dbx-warn); }
  .dbx-kpi .val.neg  { color: var(--dbx-neg); }

  /* TABS */
  .dbx-tabs {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 6px;
    margin-bottom: 22px;
    background: var(--dbx-card);
    border: 1px solid var(--dbx-border);
    border-radius: 18px;
  }
  .dbx-tab {
    background: transparent; border: 0; color: rgba(255,255,255,.65);
    padding: 10px 14px; border-radius: 12px;
    font-size: 11px; letter-spacing: 2px; font-weight: 600; cursor: pointer;
    font-family: inherit;
    transition: all .2s ease;
  }
  .dbx-tab:hover { color: #fff; background: rgba(198,168,90,.08); }
  .dbx-tab.active {
    background: linear-gradient(180deg, var(--dbx-gold-bright), var(--dbx-gold));
    color: #1a1000;
    box-shadow: 0 0 18px rgba(198,168,90,.35);
  }

  /* PANEL */
  .dbx-panel {
    background: var(--dbx-card);
    border: 1px solid var(--dbx-border);
    border-radius: 22px;
    padding: 28px;
    min-height: 420px;
  }
  .dbx-panel-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(198,168,90,.15);
  }
  .dbx-panel-head h2 {
    margin: 0; font-size: 22px; letter-spacing: 3px; font-weight: 300;
    display: flex; align-items: center; gap: 12px;
  }
  .dbx-panel-head h2 .ico { font-size: 22px; }
  .dbx-actions { display: flex; gap: 8px; }

  .dbx-btn {
    background: transparent;
    border: 1px solid rgba(198,168,90,.4);
    color: var(--dbx-gold-bright);
    padding: 8px 16px; border-radius: 10px;
    font-size: 11px; letter-spacing: 2px; font-weight: 600; cursor: pointer;
    font-family: inherit;
    transition: all .2s ease;
  }
  .dbx-btn:hover {
    background: rgba(198,168,90,.12);
    border-color: var(--dbx-gold);
  }

  /* BLOCKS */
  .dbx-block {
    margin-bottom: 26px;
    padding: 20px 22px;
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(198,168,90,.12);
    border-radius: 16px;
  }
  .dbx-block h3 {
    margin: 0 0 14px;
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    color: var(--dbx-gold-bright);
    font-weight: 700;
  }
  .dbx-desc {
    margin: 0; line-height: 1.6; color: rgba(255,255,255,.85);
    font-size: 14px;
  }
  .dbx-empty { color: rgba(255,255,255,.4); font-style: italic; }

  /* 2 columns layout */
  .dbx-2col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 18px;
    margin-bottom: 26px;
  }
  .dbx-2col > .dbx-block { margin-bottom: 0; }

  /* STATS GRID */
  .dbx-stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 22px;
  }
  .dbx-stat {
    padding: 16px 18px;
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(198,168,90,.18);
    border-radius: 14px;
  }
  .dbx-stat .lbl { font-size: 9px; letter-spacing: 2.5px; color: rgba(255,255,255,.55); text-transform: uppercase; }
  .dbx-stat .val { margin-top: 6px; font-size: 22px; font-weight: 300; color: var(--dbx-gold-bright); }
  .dbx-stat.ok .val      { color: var(--dbx-pos); }
  .dbx-stat.warn .val    { color: var(--dbx-warn); }
  .dbx-stat.danger .val  { color: var(--dbx-neg); }
  .dbx-stat.highlight {
    background: linear-gradient(180deg, rgba(198,168,90,.12), rgba(198,168,90,.04));
    border-color: rgba(198,168,90,.4);
  }

  /* PRODUTO panel */
  .dbx-exp-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
  }
  .dbx-exp-card {
    padding: 18px 16px;
    background: linear-gradient(180deg, #1a1814, #0f0e0c);
    border: 1px solid rgba(198,168,90,.2);
    border-radius: 14px;
    text-align: center;
    transition: transform .25s ease, border-color .25s ease;
  }
  .dbx-exp-card:hover {
    transform: translateY(-3px);
    border-color: rgba(198,168,90,.5);
    box-shadow: 0 8px 24px rgba(0,0,0,.4), 0 0 18px rgba(198,168,90,.15);
  }
  .dbx-exp-icon { font-size: 32px; margin-bottom: 8px; }
  .dbx-exp-name { font-size: 13px; letter-spacing: 2px; color: var(--dbx-gold-bright); font-weight: 700; }
  .dbx-exp-desc { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 4px; line-height: 1.4; }

  .dbx-inc-list { display: flex; flex-direction: column; gap: 8px; }
  .dbx-inc-row {
    display: grid; grid-template-columns: 200px 1fr;
    padding: 12px 14px;
    background: rgba(0,0,0,.3);
    border-radius: 10px;
    border-left: 3px solid var(--dbx-gold);
    align-items: center;
  }
  .dbx-inc-lbl { font-size: 11px; letter-spacing: 2px; color: var(--dbx-gold-bright); text-transform: uppercase; font-weight: 700; }
  .dbx-inc-val { color: rgba(255,255,255,.85); font-size: 13px; }

  /* TABLES */
  .dbx-table {
    display: flex; flex-direction: column;
    background: rgba(0,0,0,.3);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(198,168,90,.12);
  }
  .dbx-tr {
    display: grid;
    grid-template-columns: 2fr 1.2fr 1fr 1fr 1fr;
    gap: 14px;
    padding: 12px 16px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,.04);
    font-size: 13px;
  }
  .dbx-tr.head {
    background: rgba(198,168,90,.08);
    color: var(--dbx-gold-bright);
    font-size: 10px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase;
  }
  .dbx-tr:last-child { border-bottom: 0; }
  .dbx-pill {
    display: inline-block;
    padding: 3px 10px; border-radius: 999px;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700;
  }
  .dbx-pill.pago      { background: rgba(111,227,168,.15); color: var(--dbx-pos); }
  .dbx-pill.pendente  { background: rgba(242,194,107,.15); color: var(--dbx-warn); }
  .dbx-pill.cancelado { background: rgba(255,107,107,.15); color: var(--dbx-neg); }

  /* PRESS KIT · painel operacional dentro de Produtos */
  .presskit-module {
    --pk-green: #6FE3A8;
    --pk-blue: #8EC7FF;
  }
  .presskit-module .dbx-hero {
    background:
      radial-gradient(circle at 20% 20%, rgba(111,227,168,.12), transparent 30%),
      radial-gradient(circle at 82% 18%, rgba(198,168,90,.18), transparent 32%),
      linear-gradient(180deg, #14130f, #070707);
  }
  .presskit-module .pk-edit-main {
    position: absolute;
    right: 22px;
    top: 22px;
    z-index: 3;
  }
  .pk-kit-switch,
  .pk-card-grid,
  .pk-delivery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
  }
  .pk-card {
    position: relative;
    padding: 16px;
    border: 1px solid rgba(198,168,90,.18);
    border-radius: 14px;
    background: rgba(0,0,0,.28);
    min-width: 0;
  }
  .pk-card strong {
    color: #fff;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    font-size: 12px;
  }
  .pk-card p,
  .pk-card small {
    color: rgba(255,255,255,.62);
    line-height: 1.45;
  }
  .pk-card small { display: block; margin-top: 6px; font-size: 11px; }
  .pk-item-photo {
    width: 100%;
    aspect-ratio: 4 / 3;
    border: 1px solid rgba(198,168,90,.18);
    border-radius: 12px;
    background: rgba(255,255,255,.035) center/cover no-repeat;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,.35);
    font-size: 28px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .pk-item-photo.has-img { background-size: cover; background-position: center; }
  .pk-item-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .pk-mini {
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(255,255,255,.035);
    border: 1px solid rgba(255,255,255,.055);
  }
  .pk-mini .lbl {
    display: block;
    color: rgba(255,255,255,.42);
    font-size: 8px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .pk-mini .val {
    color: rgba(255,255,255,.86);
    font-size: 12px;
  }
  .pk-item-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }
  .pk-stage {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 9px;
    border-radius: 999px;
    border: 1px solid rgba(198,168,90,.28);
    color: var(--dbx-gold-bright);
    background: rgba(198,168,90,.08);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 800;
  }
  .pk-stage.dubai { border-color: rgba(142,199,255,.32); color: var(--pk-blue); background: rgba(142,199,255,.08); }
  .pk-stage.premium { border-color: rgba(111,227,168,.34); color: var(--pk-green); background: rgba(111,227,168,.08); }
  .pk-bases {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
  }
  .pk-base {
    padding: 4px 8px;
    border-radius: 8px;
    background: rgba(255,255,255,.05);
    color: rgba(255,255,255,.7);
    font-size: 10px;
  }
  .pk-table .dbx-tr { grid-template-columns: 1.6fr .8fr .8fr .8fr 1.1fr; }
  .pk-table.inventory .dbx-tr { grid-template-columns: 1.5fr .8fr .8fr .8fr 1.5fr; }
  .pk-alert {
    border-left: 3px solid var(--dbx-warn);
  }
  .pk-alert.critico { border-left-color: var(--dbx-neg); }
  .pk-alert.oportunidade { border-left-color: var(--pk-green); }
  .pk-gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .pk-gallery-thumb {
    min-height: 150px;
    border-radius: 14px;
    border: 1px solid rgba(198,168,90,.16);
    background: rgba(255,255,255,.035) center/cover no-repeat;
    display: grid;
    place-items: center;
    color: rgba(255,255,255,.35);
  }

  /* LISTS (custos) */
  .dbx-list { display: flex; flex-direction: column; gap: 6px; }
  .dbx-list-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    background: rgba(0,0,0,.3);
    border-radius: 10px;
    font-size: 13px;
  }
  .dbx-list-row span { color: rgba(255,255,255,.8); }
  .dbx-list-row strong { color: #fff; font-weight: 600; }
  .dbx-list-total {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px;
    margin-top: 6px;
    background: linear-gradient(180deg, rgba(198,168,90,.18), rgba(198,168,90,.06));
    border-radius: 10px;
    border: 1px solid rgba(198,168,90,.4);
    font-size: 14px;
  }
  .dbx-list-total span { color: var(--dbx-gold-bright); letter-spacing: 2px; font-weight: 700; }
  .dbx-list-total strong { color: #fff; font-size: 16px; font-weight: 700; }

  /* CALLOUT */
  .dbx-callout {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 16px 20px;
    background: linear-gradient(180deg, rgba(198,168,90,.08), rgba(198,168,90,.02));
    border: 1px solid rgba(198,168,90,.3);
    border-radius: 14px;
    margin-top: 16px;
  }
  .dbx-callout.positive { border-color: rgba(111,227,168,.4); background: linear-gradient(180deg, rgba(111,227,168,.08), rgba(111,227,168,.02)); }
  .dbx-callout.warning  { border-color: rgba(242,194,107,.4); background: linear-gradient(180deg, rgba(242,194,107,.08), rgba(242,194,107,.02)); }
  .dbx-callout-icon { font-size: 28px; line-height: 1; }
  .dbx-callout h4 { margin: 0 0 4px; font-size: 13px; letter-spacing: 2px; color: var(--dbx-gold-bright); text-transform: uppercase; font-weight: 700; }
  .dbx-callout p { margin: 0; color: rgba(255,255,255,.8); font-size: 13px; line-height: 1.5; }

  /* OPERAÇÃO */
  .dbx-base-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; }
  .dbx-base-item {
    padding: 14px 16px;
    background: rgba(0,0,0,.3);
    border-radius: 12px;
    border-left: 3px solid var(--dbx-gold);
  }
  .dbx-base-item .lbl { font-size: 9px; letter-spacing: 2.5px; color: rgba(255,255,255,.55); text-transform: uppercase; }
  .dbx-base-item .val { margin-top: 4px; font-size: 14px; color: #fff; }
  .dbx-roteiro { display: flex; flex-direction: column; gap: 8px; }
  .dbx-rot-row {
    display: grid; grid-template-columns: 70px 60px 1fr;
    gap: 16px; align-items: center;
    padding: 12px 16px;
    background: rgba(0,0,0,.3);
    border-radius: 12px;
    border-left: 3px solid var(--dbx-gold);
  }
  .dbx-rot-day { font-size: 12px; font-weight: 800; letter-spacing: 2px; color: var(--dbx-gold-bright); }
  .dbx-rot-time { font-size: 13px; color: #fff; font-weight: 600; }
  .dbx-rot-titulo { font-size: 14px; color: #fff; font-weight: 600; }
  .dbx-rot-desc { font-size: 12px; color: rgba(255,255,255,.6); margin-top: 2px; }
  .dbx-progress {
    height: 8px; background: rgba(0,0,0,.4); border-radius: 99px; overflow: hidden;
    margin-bottom: 14px;
  }
  .dbx-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--dbx-gold), var(--dbx-gold-bright));
    border-radius: 99px;
    transition: width .4s ease;
  }
  .dbx-check-list { display: flex; flex-direction: column; gap: 6px; }
  .dbx-check-row {
    display: flex; gap: 12px; align-items: center;
    padding: 10px 14px;
    background: rgba(0,0,0,.3);
    border-radius: 10px;
    cursor: pointer;
    transition: background .2s ease;
  }
  .dbx-check-row:hover { background: rgba(198,168,90,.08); }
  .dbx-check-box {
    width: 22px; height: 22px;
    border: 2px solid rgba(198,168,90,.4);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;

    color: transparent;
    flex-shrink: 0;

  .dbx-check-text { color: rgba(255,255,255,.85); font-size: 13px; }

  /* EQUIPE */
  .dbx-team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
  .dbx-team-card {
    padding: 20px 16px; text-align: center;
    background: linear-gradient(180deg, #1a1814, #0f0e0c);
    border: 1px solid rgba(198,168,90,.2);
    border-radius: 14px;
  }

  .dbx-team-card.pending { border-color: rgba(242,194,107,.3); }
  .dbx-team-avatar {
    width: 60px; height: 60px;
    margin: 0 auto 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--dbx-gold), var(--dbx-gold-bright));

  .dbx-team-contact { font-size: 11px; color: rgba(255,255,255,.6); margin-top: 8px; }
  .dbx-team-status {

    padding: 4px 10px; border-radius: 99px; display: inline-block;

  .dbx-team-card.ok .dbx-team-status { background: rgba(111,227,168,.15); color: var(--dbx-pos); }
  .dbx-team-card.pending .dbx-team-status { background: rgba(242,194,107,.15); color: var(--dbx-warn); }

  /* ORIGEM (vendas) */
  .dbx-origem { display: flex; flex-direction: column; gap: 10px; }
  .dbx-origem-row {
    display: grid; grid-template-columns: 160px 1fr 100px;
    gap: 14px; align-items: center;
  }
  .dbx-origem-name { font-size: 12px; letter-spacing: 1.5px; color: rgba(255,255,255,.85); font-weight: 600; }
  .dbx-origem-bar {
    height: 14px;
    background: rgba(0,0,0,.4);
    border-radius: 99px;
    overflow: hidden;
  }
  .dbx-origem-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--dbx-gold), var(--dbx-gold-bright));
    border-radius: 99px;
  }
  .dbx-origem-val { font-size: 13px; color: #fff; font-weight: 600; text-align: right; }
  .dbx-origem-val span { color: rgba(255,255,255,.5); font-weight: 400; font-size: 11px; }

  /* MARKETING - influencers */
  .dbx-inf-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
  .dbx-inf-card {
    position: relative;
    padding: 22px 18px;
    background: linear-gradient(180deg, #1a1814, #0f0e0c);
    border: 1px solid rgba(198,168,90,.2);
    border-radius: 16px;
    transition: all .25s ease;
  }
  .dbx-inf-card:hover { transform: translateY(-3px); border-color: rgba(198,168,90,.5); }
  .dbx-inf-card.top {
    border-color: var(--dbx-gold);
    background: linear-gradient(180deg, rgba(198,168,90,.15), #0f0e0c 60%);
    box-shadow: 0 0 28px rgba(198,168,90,.25);
  }
  .dbx-inf-crown {
    position: absolute; top: -10px; right: 16px;
    background: linear-gradient(180deg, var(--dbx-gold-bright), var(--dbx-gold));

    font-size: 10px; letter-spacing: 2px; font-weight: 800;
    padding: 4px 10px; border-radius: 99px;
  }
  .dbx-inf-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--dbx-gold), var(--dbx-gold-bright));
    color: #1a1000;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 20px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .dbx-inf-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .dbx-inf-name { font-size: 15px; font-weight: 700; color: #fff; }
  .dbx-inf-handle { font-size: 12px; color: var(--dbx-gold-bright); margin-bottom: 12px; }
  .dbx-inf-stats {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    padding-top: 12px;
    border-top: 1px solid rgba(198,168,90,.15);
  }
  .dbx-inf-stats .lbl { font-size: 9px; letter-spacing: 1.5px; color: rgba(255,255,255,.55); text-transform: uppercase; }
  .dbx-inf-stats .val { font-size: 14px; color: #fff; font-weight: 600; margin-top: 2px; }

  /* Artistas */
  .dbx-art-list { display: flex; flex-direction: column; gap: 6px; }
  .dbx-art-row {
    padding: 12px 14px;
    background: rgba(0,0,0,.3);
    border-radius: 10px;
    border-left: 3px solid var(--dbx-gold);
    display: grid; grid-template-columns: 220px 1fr; gap: 16px; align-items: center;
  }
  .dbx-art-name { font-size: 13px; color: #fff; font-weight: 600; }
  .dbx-art-impact { font-size: 12px; color: rgba(255,255,255,.65); }

  /* Marketing campanhas — table override (4 cols) */
  .dbx-table .dbx-tr { grid-template-columns: 2fr 1fr 1fr 1fr; }
  /* Clientes — 5 cols */
  .dbx-block .dbx-table .dbx-tr {
    grid-template-columns: 2fr 1.2fr 1fr 1.2fr 1fr;
  }
  /* Override: upsell e marketing campanhas usam 4 cols */
  .dbx-block .dbx-table.cols4 .dbx-tr,
  .dbx-block .dbx-table .dbx-tr.cols4 { grid-template-columns: 2fr 1fr 1fr 1fr; }

  /* ANÁLISE */
  .dbx-finance-grid {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 14px;
    margin-bottom: 20px;
  }
  .dbx-fin-card {
    padding: 22px 24px;
    background: linear-gradient(180deg, #1a1814, #0f0e0c);
    border: 1px solid rgba(198,168,90,.25);
    border-radius: 16px;
  }
  .dbx-fin-card.big {
    background: linear-gradient(180deg, rgba(198,168,90,.12), rgba(198,168,90,.04) 60%, #0f0e0c);
    border-color: rgba(198,168,90,.45);
  }
  .dbx-fin-card.lucro.pos { border-color: rgba(111,227,168,.4); background: linear-gradient(180deg, rgba(111,227,168,.10), rgba(111,227,168,.02) 60%, #0f0e0c); }
  .dbx-fin-card.lucro.neg { border-color: rgba(255,107,107,.4); background: linear-gradient(180deg, rgba(255,107,107,.10), rgba(255,107,107,.02) 60%, #0f0e0c); }
  .dbx-fin-card .lbl { font-size: 10px; letter-spacing: 2.5px; color: rgba(255,255,255,.55); text-transform: uppercase; font-weight: 700; }
  .dbx-fin-card .val { margin-top: 8px; font-size: 30px; font-weight: 300; color: #fff; }
  .dbx-fin-card.big .val { color: var(--dbx-gold-bright); font-size: 36px; }
  .dbx-fin-card.pos .val { color: var(--dbx-pos); }
  .dbx-fin-card.neg .val { color: var(--dbx-neg); }
  .dbx-fin-card .sub { margin-top: 6px; font-size: 11px; color: rgba(255,255,255,.5); }

  /* ALERTAS */
  .dbx-alerts { display: flex; flex-direction: column; gap: 10px; }
  .dbx-alert {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 16px 20px;
    border-radius: 14px;
    border: 1px solid;
  }
  .dbx-alert.danger   { border-color: rgba(255,107,107,.4); background: linear-gradient(180deg, rgba(255,107,107,.10), rgba(255,107,107,.02)); }
  .dbx-alert.warning  { border-color: rgba(242,194,107,.4); background: linear-gradient(180deg, rgba(242,194,107,.10), rgba(242,194,107,.02)); }
  .dbx-alert.positive { border-color: rgba(111,227,168,.4); background: linear-gradient(180deg, rgba(111,227,168,.10), rgba(111,227,168,.02)); }
  .dbx-alert-icon { font-size: 24px; line-height: 1; }
  .dbx-alert h4 { margin: 0 0 4px; font-size: 13px; letter-spacing: 2px; color: #fff; text-transform: uppercase; font-weight: 700; }
  .dbx-alert.danger h4   { color: var(--dbx-neg); }
  .dbx-alert.warning h4  { color: var(--dbx-warn); }
  .dbx-alert.positive h4 { color: var(--dbx-pos); }
  .dbx-alert p { margin: 0; color: rgba(255,255,255,.78); font-size: 13px; line-height: 1.5; }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    .dbx-2col { grid-template-columns: 1fr; }
    .dbx-finance-grid { grid-template-columns: 1fr; }
    .dbx-hero-content h1 { font-size: 32px; letter-spacing: 4px; }
    .dbx-hero-kpis { grid-template-columns: repeat(2, 1fr); }
    .dbx-tr, .dbx-block .dbx-table .dbx-tr { grid-template-columns: 1fr 1fr; }
    .dbx-tr.head { display: none; }
    .dbx-rot-row { grid-template-columns: 60px 50px 1fr; gap: 8px; padding: 10px; }
    .dbx-inc-row { grid-template-columns: 1fr; gap: 4px; }
    .dbx-art-row { grid-template-columns: 1fr; gap: 4px; }
    .dbx-origem-row { grid-template-columns: 100px 1fr 80px; }
  }

  /* ==== BASES FLY · inline editing affordance ==== */
  .bases-inline-editable {
    cursor: text;
    border-radius: 4px;
    padding: 1px 3px;
    transition: background .15s, box-shadow .15s;
    border: 1px dashed transparent;
    outline: none !important;
  }
  .bases-inline-editable:hover {
    background: rgba(198,168,90,.06);
    border-color: rgba(198,168,90,.18);
  }
  .bases-inline-editable:focus {
    background: rgba(198,168,90,.10) !important;
    border-color: var(--dbx-gold-bright, #E6C77A) !important;
    box-shadow: 0 0 0 2px rgba(198,168,90,.18);
  }

  /* ==== HIERARQUIA · inline editing affordance ==== */
  .hier-inline-editable {
    cursor: text;
    border-radius: 4px;
    padding: 1px 3px;
    transition: background .15s, box-shadow .15s;
    border: 1px dashed transparent;
    outline: none !important;
  }
  .hier-inline-editable:hover {
    background: rgba(198,168,90,.06);
    border-color: rgba(198,168,90,.18);
  }

    background: rgba(198,168,90,.10) !important;

  /* ==== EDIT AFFORDANCES (CRUD across all panels) ==== */
  .dbx-block-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-bottom: 12px;
  }

  .dbx-block-actions { display: flex; gap: 6px; }

  .dbx-mini-btn {
    background: rgba(198,168,90,.10);
    border: 1px solid rgba(198,168,90,.35);
    color: var(--dbx-gold-bright);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 10px; letter-spacing: 1.5px; font-weight: 700;

    cursor: pointer;
    font-family: inherit;
    transition: all .15s ease;

  .dbx-mini-btn:hover {
    background: rgba(198,168,90,.20);

    background: rgba(255,107,107,.08);

  }
  .dbx-mini-btn.danger:hover {
    background: rgba(255,107,107,.18);

  }

  /* Card-level action overlays (edit/delete pencil + x) */
  .dbx-editable {
    position: relative;
  }
  .dbx-card-actions {
    position: absolute;
    top: 8px; right: 8px;
    display: flex; gap: 4px;

    z-index: 5;
  }
  .dbx-editable:hover .dbx-card-actions { opacity: 1; }
  .dbx-act-btn {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(198,168,90,.35);
    background: rgba(11,11,11,.85);

    color: var(--dbx-gold-bright);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    font-family: inherit;
    transition: all .15s ease;

  /* "+ Adicionar" placeholder card */

    border: 2px dashed rgba(198,168,90,.30);
    background: rgba(198,168,90,.03);
    border-radius: 16px;
    padding: 18px;
    cursor: pointer;
    text-align: center;
    color: rgba(198,168,90,.85);

  .dbx-add-card .lbl { font-size: 10px; letter-spacing: 2px; font-weight: 700; text-transform: uppercase; }

  .dbx-add-row {
    border: 1px dashed rgba(198,168,90,.30);
    background: rgba(198,168,90,.03);
    border-radius: 10px;
    padding: 10px 14px;
    color: rgba(198,168,90,.85);
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 1.5px; font-weight: 600;
    transition: all .15s ease;
    margin-top: 6px;
  }
  .dbx-add-row:hover {
    border-color: var(--dbx-gold-bright);
    background: rgba(198,168,90,.10);
    color: #fff;
  }

  /* Photo support inside cards */
  .dbx-exp-photo, .dbx-team-photo, .dbx-inf-photo {
    width: 100%;
    height: 110px;
    border-radius: 12px;
    object-fit: cover;
    margin-bottom: 8px;
    background: rgba(255,255,255,.04);
  }
  .dbx-team-photo { height: 90px; }
  .dbx-inf-photo  { height: 120px; }

  /* Inline editable text */
  .dbx-inline {
    cursor: text;
    border-radius: 6px;
    padding: 2px 4px;
    transition: background .15s;
    border: 1px dashed transparent;
  }
  .dbx-inline:hover {
    background: rgba(198,168,90,.06);
    border-color: rgba(198,168,90,.25);
  }
  .dbx-inline:focus {
    outline: none;
    background: rgba(198,168,90,.10);
    border-color: var(--dbx-gold-bright);
  }

  /* Modal overlay */
  .dbx-modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.78);
    backdrop-filter: blur(8px);
    z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: dbxFadeIn .18s ease;
  }
  @keyframes dbxFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .dbx-modal {
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    background: linear-gradient(180deg, #1a1812, #0d0c0a);
    border: 1px solid var(--dbx-border);
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,.7), 0 0 0 1px rgba(198,168,90,.15);
    animation: dbxScale .22s ease;
  }
  @keyframes dbxScale { from { transform: scale(.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .dbx-modal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(198,168,90,.15);
  }
  .dbx-modal-head h3 {
    margin: 0; color: var(--dbx-gold-bright);
    font-size: 16px; letter-spacing: 3px; font-weight: 700; text-transform: uppercase;
  }
  .dbx-modal-close {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid rgba(198,168,90,.30);
    color: var(--dbx-gold-bright);
    cursor: pointer;
    font-size: 16px;
    transition: all .15s;
    font-family: inherit;
  }
  .dbx-modal-close:hover {
    background: rgba(255,107,107,.18);
    border-color: var(--dbx-neg);
    color: #fff;
  }
  .dbx-form { display: flex; flex-direction: column; gap: 14px; }
  .dbx-form-field { display: flex; flex-direction: column; gap: 6px; }
  .dbx-form-field label {
    font-size: 10px; letter-spacing: 2px; color: rgba(198,168,90,.85);
    text-transform: uppercase; font-weight: 700;
  }
  .dbx-form-field input,
  .dbx-form-field textarea,
  .dbx-form-field select {

  .dbx-modal-actions {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(198,168,90,.15);

  .dbx-btn-primary {
    background: linear-gradient(180deg, #FFE099 0%, #E6C77A 50%, #C6A85A 100%) !important;

  /* DRE WATERFALL · cascata financeira premium                   */

    padding: 8px 14px;

  .fly-cmp-section td {

    gap: 12px;
  }
  .cmp-insight {
    display: flex;
    gap: 12px;
    padding: 16px;
    border-radius: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0));

  .cmp-insight.warn {

    width: 36px; height: 36px;

    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.05);
    color: rgba(255,255,255,.7);
    cursor: pointer;
    font-size: 14px;
  }
  .ficha-close:hover { background: rgba(245,184,66,.15); color: #FFE099; }

  .ficha-body {
    flex: 1; overflow-y: auto;
    display: grid;
    grid-template-columns: 1fr 1.5fr 1fr;
    gap: 18px;
    padding: 18px 24px 24px;
  }
  .ficha-col { display: flex; flex-direction: column; gap: 14px; }

  .ficha-section {
    padding: 14px;
    background: rgba(255,255,255,.025);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 12px;
  }
  .ficha-sec-ttl {
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(245,184,66,.7); font-weight: 700;
    margin-bottom: 10px; padding-bottom: 6px;
    border-bottom: 1px solid rgba(245,184,66,.1);
  }
  .ficha-row {
    display: flex; justify-content: space-between;
    padding: 6px 0;
    font-size: 11px;
    border-bottom: 1px dashed rgba(255,255,255,.04);
  }
  .ficha-row:last-child { border-bottom: 0; }
  .ficha-row span { color: rgba(255,255,255,.55); }
  .ficha-row strong { color: #fff; font-weight: 500; text-align: right; }
  .ficha-row a { color: #93B6FF; text-decoration: none; }
  .ficha-row a:hover { color: #FFE099; }
  .ficha-row em { color: rgba(255,255,255,.3); font-style: italic; }

  .ficha-avatar { text-align: center; padding: 8px; }
  .avatar-circle {
    width: 84px; height: 84px;
    margin: 0 auto 10px;
    border-radius: 50%;
    background: linear-gradient(135deg, #FFE099, #C6A85A);
    color: #1a1000;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 800;
    box-shadow: 0 0 30px rgba(245,184,66,.4);
  }
  .ficha-name { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 8px; }
  .ficha-tags {

  }
  .tag-vip, .tag-new, .tag-status {
    font-size: 9px; letter-spacing: 1.5px;
    padding: 3px 8px; border-radius: 999px; font-weight: 700;
  }
  .tag-vip { background: rgba(245,184,66,.2); color: #FFE099; border: 1px solid rgba(245,184,66,.4); }
  .tag-new { background: rgba(112,165,255,.15); color: #93B6FF; border: 1px solid rgba(112,165,255,.3); }
  .tag-status.status-pago { background: rgba(111,227,168,.15); color: #6FE3A8; border: 1px solid rgba(111,227,168,.3); }
  .tag-status.status-pendente { background: rgba(245,184,66,.15); color: #E6C77A; border: 1px solid rgba(245,184,66,.3); }
  .tag-status.status-cancelado { background: rgba(255,107,107,.15); color: #ff8a8a; border: 1px solid rgba(255,107,107,.3); }

  .ficha-score {
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-top: 14px;
  }
  .score-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: conic-gradient(#FFE099 0% var(--pct, 75%), rgba(255,255,255,.08) var(--pct, 75%) 100%);
    display: flex; align-items: center; justify-content: center;
    color: #FFE099; font-weight: 800;
    position: relative;
  }
  .score-circle::before {
    content: ''; position: absolute; inset: 4px;
    border-radius: 50%; background: #1a1612;
  }
  .score-circle span, .score-circle small { position: relative; z-index: 1; }
  .score-circle span { font-size: 22px; }
  .score-circle small { font-size: 8px; color: rgba(255,255,255,.5); }
  .score-label { font-size: 10px; letter-spacing: 1.5px; color: rgba(255,255,255,.6); }

  .ficha-tags-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
  .ficha-tag {
    background: rgba(245,184,66,.1);
    color: #E6C77A;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 10px;
    border: 1px solid rgba(245,184,66,.3);
  }
  .ficha-obs {
    font-size: 11px;
    color: rgba(255,255,255,.75);
    line-height: 1.5;
    background: rgba(0,0,0,.2);
    padding: 10px;
    border-radius: 8px;
    border-left: 2px solid rgba(245,184,66,.3);
  }

  .ficha-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .ficha-stat {
    padding: 10px;
    background: rgba(0,0,0,.3);
    border: 1px solid rgba(245,184,66,.15);
    border-radius: 10px;
    text-align: center;
  }
  .ficha-stat .num { color: #FFE099; font-size: 13px; font-weight: 700; }
  .ficha-stat .lbl { font-size: 9px; letter-spacing: 1px; color: rgba(255,255,255,.55); margin-top: 2px; }

  .ficha-timeline { max-height: 260px; overflow-y: auto; }
  .ficha-int {
    padding: 10px;
    background: rgba(0,0,0,.2);
    border-left: 2px solid rgba(112,165,255,.4);
    border-radius: 0 8px 8px 0;
    margin-bottom: 6px;
  }
  .ficha-int-head {
    display: flex; justify-content: space-between;
    margin-bottom: 4px;
  }
  .ficha-int-tipo { font-size: 11px; color: #93B6FF; font-weight: 600; }
  .ficha-int-date { font-size: 10px; color: rgba(255,255,255,.4); }
  .ficha-int-text { font-size: 11px; color: rgba(255,255,255,.8); line-height: 1.5; }
  .ficha-empty-tl { text-align: center; padding: 20px; color: rgba(255,255,255,.4); }
  .ficha-empty-tl em { display: block; margin-bottom: 10px; }

  .ficha-nps strong { font-size: 24px; }
  .ficha-nps p { font-style: italic; color: rgba(255,255,255,.7); font-size: 11px; margin-top: 8px; }

  .ficha-pref .ficha-row { padding: 6px 0; }

  .ficha-quick { display: flex; flex-direction: column; gap: 8px; }
  .ficha-quick-btn {
    display: block;
    padding: 10px 14px;
    background: rgba(245,184,66,.08);
    border: 1px solid rgba(245,184,66,.3);
    color: rgba(255,224,153,.85);
    border-radius: 10px;
    text-decoration: none;
    text-align: left;
    font-size: 11px;
    letter-spacing: .5px;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .ficha-quick-btn:hover {
    background: rgba(245,184,66,.18);
    color: #FFE099;
    transform: translateX(2px);
  }
  .ficha-quick-btn.ghost { opacity: .5; cursor: not-allowed; }
  .ficha-btn-mini {
    background: rgba(245,184,66,.12);
    border: 1px solid rgba(245,184,66,.4);
    color: #FFE099;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 10px;
    letter-spacing: 1px;
  }

  .ficha-insights { display: flex; flex-direction: column; gap: 10px; }
  .ficha-insight {
    padding: 10px;
    background: rgba(112,165,255,.05);
    border-radius: 8px;
    border-left: 2px solid rgba(112,165,255,.4);
  }
  .ficha-insight strong { color: #93B6FF; font-size: 11px; display: block; margin-bottom: 4px; }
  .ficha-insight p { margin: 0; font-size: 11px; color: rgba(255,255,255,.75); line-height: 1.5; }
  .ficha-insight ul { margin: 4px 0 0; padding-left: 18px; font-size: 11px; color: rgba(255,255,255,.75); line-height: 1.7; }

  @container fly-vp (max-width: 900px) {
    .ficha-body { grid-template-columns: 1fr; }
  }

  /* ============================================================ */
  /* EXPERIÊNCIA VISUAL · upload de foto/vídeo por card           */
  /* ============================================================ */
  .bases-visual-card .img.is-photo,
  .bases-visual-card .img.is-video {
    background: #000;
    color: transparent;
  }
  .bases-visual-card .img.is-photo img,
  .bases-visual-card .img.is-video video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .bases-visual-card .visual-edit-btns {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 6px;
    opacity: 0;
    transition: opacity .2s ease;
    z-index: 3;
  }
  .bases-visual-card:hover .visual-edit-btns { opacity: 1; }
  .bases-visual-card .visual-edit-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid rgba(198,168,90,.45);
    background: rgba(20,16,10,.85);
    color: #E6C77A;
    cursor: pointer;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    transition: all .15s;
  }
  .bases-visual-card .visual-edit-btn:hover {
    background: rgba(198,168,90,.18);
    transform: scale(1.08);
  }
  .bases-visual-card .visual-edit-btn.danger {
    border-color: rgba(255,107,107,.5);
    color: #ff8a8a;
  }
  .bases-visual-card .visual-edit-btn.danger:hover {
    background: rgba(255,107,107,.15);
  }
  .bases-visual-card .visual-empty-hint {
    position: absolute;
    bottom: 16px;
    right: 16px;
    font-size: 9px;
    letter-spacing: 1.5px;
    color: rgba(198,168,90,.55);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .2s;
    z-index: 2;
  }
  .bases-visual-card:hover .visual-empty-hint { opacity: 1; }

  /* Big video card */

  .bases-video-card.is-video .play,

  .bases-video-card:hover .visual-edit-btns { opacity: 1; }
  .bases-video-card .visual-edit-btn {
    width: 36px;

    border-radius: 50%;

    color: #E6C77A;
    cursor: pointer;

    display: flex;
    align-items: center;

  /* ============================================================ */
  /* DATA DE ABERTURA · campo no modal de criar pin              */
  /* ============================================================ */
  .pin-input[type="month"],
  .pin-input[type="date"] {
    color-scheme: dark;
    cursor: pointer;
  }
  .pin-input[type="month"]::-webkit-calendar-picker-indicator,
  .pin-input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(.7) sepia(1) saturate(2) hue-rotate(15deg);
    cursor: pointer;
    opacity: .75;
  }
  .pin-card-opening {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 12px;
    color: rgba(198,168,90,.85);
    letter-spacing: .5px;
  }
  .pin-card-opening .ico {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(198,168,90,.15);
    border: 1px solid rgba(198,168,90,.4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
  }
  .pin-card-opening-edit {
    background: transparent;
    border: 1px solid rgba(198,168,90,.35);
    color: #E6C77A;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    margin-left: 6px;
    font-family: inherit;
  }
  .pin-card-opening-edit:hover {
    background: rgba(198,168,90,.12);
  }

  /* ============================================================ */
  /* LINHA DO TEMPO · expansão de bases até 2031                  */
  /* ============================================================ */
  .bases-timeline-wrap {
    position: relative;
    border-radius: 22px;
    background:
      radial-gradient(circle at 0% 0%, rgba(198,168,90,.08), transparent 50%),
      linear-gradient(180deg, rgba(255,255,255,.025), rgba(255,255,255,0));
    border: 1px solid rgba(198,168,90,.22);
    backdrop-filter: blur(20px);
    padding: 28px 24px 20px;
  }
  .bases-timeline-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
  }
  .timeline-year-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,.12);
    color: rgba(255,255,255,.7);
    padding: 7px 16px;
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    transition: all .15s;
  }
  .timeline-year-btn:hover {
    border-color: rgba(198,168,90,.4);
    color: #E6C77A;
  }
  .timeline-year-btn.active {
    background: linear-gradient(135deg, rgba(198,168,90,.22), rgba(198,168,90,.08));
    border-color: rgba(198,168,90,.55);
    color: #E6C77A;
    box-shadow: 0 4px 14px rgba(198,168,90,.18);
  }
  .timeline-year-btn .y-count {
    font-size: 9px;
    color: rgba(198,168,90,.65);
    margin-left: 4px;
    font-weight: 400;
  }
  .timeline-year-btn.active .y-count { color: #E6C77A; }
  .timeline-summary {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 12px 16px;
    margin-bottom: 18px;
    border-radius: 14px;
    background: rgba(0,0,0,.3);
    border: 1px solid rgba(198,168,90,.15);
  }
  .timeline-summary .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .timeline-summary .stat .num {
    font-size: 18px;
    color: #E6C77A;
    font-weight: 500;
  }
  .timeline-summary .stat .lbl {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,.55);
  }
  .timeline-summary .stat-divider {
    width: 1px;
    height: 28px;
    background: rgba(198,168,90,.2);
  }
  .timeline-track {
    position: relative;
    padding-top: 6px;
  }
  .timeline-track::before {
    content: '';
    position: absolute;
    left: 16px;
    top: 6px;
    bottom: 6px;
    width: 2px;
    background: linear-gradient(180deg, rgba(198,168,90,.4), rgba(198,168,90,.05));
  }
  .timeline-month {
    position: relative;
    padding: 10px 0 10px 48px;
    min-height: 38px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .timeline-month .dot {
    position: absolute;
    left: 11px;
    top: 14px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(60,55,45,.95);
    border: 2px solid rgba(198,168,90,.3);
    box-sizing: border-box;
  }
  .timeline-month.has-base .dot {
    background: linear-gradient(180deg, #E6C77A, #C6A85A);
    border-color: #E6C77A;
    box-shadow: 0 0 12px rgba(230,199,122,.5);
  }
  .timeline-month .month-lbl {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,.45);
    min-width: 56px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .timeline-month.has-base .month-lbl { color: #E6C77A; }
  .timeline-bases {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    flex: 1;
  }
  .timeline-base-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 6px 6px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(198,168,90,.15), rgba(198,168,90,.04));
    border: 1px solid rgba(198,168,90,.28);
    cursor: pointer;
    transition: all .15s;
    font-size: 11px;
    color: rgba(255,255,255,.92);
    letter-spacing: .3px;
  }
  .timeline-base-chip:hover {
    background: linear-gradient(135deg, rgba(198,168,90,.28), rgba(198,168,90,.1));
    border-color: rgba(198,168,90,.55);
    transform: translateY(-1px);
  }
  .timeline-base-chip .chip-photo {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    overflow: hidden;
    background: rgba(0,0,0,.4);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(198,168,90,.5);
    font-size: 10px;
    border: 1px solid rgba(198,168,90,.3);
  }
  .timeline-base-chip .chip-photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .timeline-base-chip .chip-flag { font-size: 12px; opacity: .85; }
  .timeline-month .empty-hint {
    font-size: 10px;
    color: rgba(255,255,255,.25);
    font-style: italic;
    letter-spacing: 1px;
  }
  .timeline-empty-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255,255,255,.45);
  }
  .timeline-empty-state .ico {
    font-size: 32px;
    color: rgba(198,168,90,.4);
    margin-bottom: 10px;
  }
  .timeline-empty-state .title {
    font-size: 13px;
    color: rgba(255,255,255,.7);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .timeline-empty-state .text {
    font-size: 12px;
    color: rgba(255,255,255,.45);
  }

  /* ============================================================ */
  /* FORMAT PICKER · escolha do painel do item                     */
  /* ============================================================ */
  .format-picker {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    margin-bottom: 10px;
  }
  .format-opt {
    display: block;
    cursor: pointer;
    margin: 0 !important;
  }
  .format-opt input[type="radio"] {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }
  .format-card {
    padding: 14px;
    border: 1.5px solid rgba(255,255,255,.12);
    border-radius: 12px;
    background: rgba(255,255,255,.025);
    transition: all .18s ease;
    height: 100%;
  }
  .format-opt:hover .format-card {
    border-color: rgba(245,184,66,.35);
    background: rgba(245,184,66,.04);
  }
  .format-opt.active .format-card,
  .format-opt input:checked ~ .format-card,
  .format-opt:has(input:checked) .format-card {
    border-color: rgba(245,184,66,.7);
    background: linear-gradient(135deg, rgba(245,184,66,.18), rgba(245,184,66,.04));
    box-shadow: 0 6px 22px -8px rgba(245,184,66,.4);
  }
  .format-ico {
    font-size: 22px;
    margin-bottom: 6px;
  }
  .format-name {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .format-badge {
    background: linear-gradient(135deg, #E6C77A, #C6A85A);
    color: #1a140a;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 8px;
    letter-spacing: 1px;
    font-weight: 800;
  }
  .format-desc {
    font-size: 10px;
    line-height: 1.4;
    color: rgba(255,255,255,.55);
    letter-spacing: .3px;
  }
  .format-card.premium {
    background: linear-gradient(135deg, rgba(245,184,66,.06), rgba(255,255,255,.01));
    border-color: rgba(245,184,66,.22);
  }
  .format-card.presskit {
    background: linear-gradient(135deg, rgba(111,227,168,.08), rgba(245,184,66,.045));
    border-color: rgba(111,227,168,.24);
  }
  .format-opt.active .format-card.presskit,
  .format-opt input:checked ~ .format-card.presskit,
  .format-opt:has(input:checked) .format-card.presskit {
    border-color: rgba(111,227,168,.68);
    background: linear-gradient(135deg, rgba(111,227,168,.14), rgba(245,184,66,.06));
    box-shadow: 0 6px 22px -8px rgba(111,227,168,.42);
  }
  @container fly-vp (max-width: 640px) {
    .format-picker { grid-template-columns: 1fr; gap: 8px; }
    .format-card { padding: 12px; }
    .format-name { font-size: 12px; }
    .format-desc { font-size: 10px; }
  }

  /* ============================================================ */
  /* ============   📱 IPHONE / MOBILE OPTIMIZATION  ============ */
  /* ============================================================ */
  /* iOS safe-area + tap behavior */
  html, body {
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
    overscroll-behavior-y: contain;
  }
  body {
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
    container-type: inline-size;
    container-name: fly-vp;
    transition: max-width .25s ease;
  }
  /* User toggled "Mobile" — força layout iPhone num desktop também */
  body.force-mobile {
    max-width: 414px;
    margin: 0 auto;
    box-shadow: 0 0 80px rgba(0,0,0,.4);
    border-left: 1px solid rgba(245,184,66,.08);
    border-right: 1px solid rgba(245,184,66,.08);
  }
  /* User toggled "Desktop" mesmo no celular — permite scroll horizontal */
  body.force-desktop {
    min-width: 1280px;
  }
  body.force-mobile .back-btn {
    left: max(12px, calc(50% - 195px));
  }
  body.force-mobile .admin-toggle {
    right: max(12px, calc(50% - 195px));
  }
  /* Esconder o botão de toggle quando NÃO houver escolha manual e estivermos no auto-fit */
  /* (mantemos sempre visível para fácil acesso) */

  /* ============================================================ */
  /* TABLET (≤ 880px)                                             */
  /* ============================================================ */
  @media (max-width: 880px) {
    .modal { max-width: 92vw; }
    .modal.wide { max-width: 92vw; }
  }

  /* ============================================================ */
  /* MOBILE (≤ 640px) — iPhone Pro / Plus / Max                  */
  /* Usa @container para responder ao body (que pode ser limitado */
  /* a 414px quando user clicar no toggle "Mobile" no desktop)    */
  /* ============================================================ */
  @container fly-vp (max-width: 640px) {
    /* Top fixed UI */
    #brandLogo {
      top: max(env(safe-area-inset-top), 12px);
      left: 50%;
      transform: translateX(-50%);
      gap: 6px;
      padding: 4px 10px;
    }
    #brandLogo img { height: 22px; width: auto; }
    #brandLogo .eco-label { font-size: 8px; letter-spacing: 1.8px; }

    .back-btn {
      top: max(env(safe-area-inset-top), 12px);
      left: 12px;
      padding: 7px 12px;
      font-size: 9px;
      letter-spacing: 1.5px;
    }
    .admin-toggle {
      top: max(env(safe-area-inset-top), 12px);
      right: 12px;
      padding: 7px 12px;
      font-size: 9px;
      letter-spacing: 1.5px;
    }
    .utility-dock {
      left: 50%;
      right: auto;
      bottom: max(env(safe-area-inset-bottom), 10px);
      width: min(394px, calc(100vw - 20px));
      transform: translateX(-50%);
      max-width: none;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      padding: 7px;
      border-radius: 18px;
    }
    .utility-dock .print-btn,
    .utility-dock .present-toggle,
    .utility-dock .data-mode-toggle,
    .utility-dock .turmas-btn,
    .utility-dock .view-mode-toggle,
    .utility-dock .changelog-btn {
      height: 32px;
      padding: 0 10px;
      font-size: 9px;
      letter-spacing: 1.2px;
    }
    .utility-dock .changelog-btn {
      width: 32px;
      padding: 0;
    }
    .utility-dock .pt-lbl {
      display: none;
    }
    .sync-status {
      bottom: 88px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 9px;
      font-size: 9px;
    }

    /* Home / universe stage */
    .universe-stage { padding: 80px 8px 40px; }
    .grid-row { gap: 10px; flex-wrap: wrap; justify-content: center; }
    .grid-circle {
      width: 58px; height: 58px;
      font-size: 11px; letter-spacing: 1px;
    }
    .grid-circle.gold { width: 70px; height: 70px; }
    .grid-circle .grid-fly-logo { width: 30px; height: 30px; }

    /* Detail (mobile usa o MESMO wheel, mas labels distanciados via JS) */
    #detailView { padding: 80px 12px 40px; }
    /* Stage encolhe um pouco pra dar espaço aos labels distanciados */
    .stage { width: min(50vmin, 200px) !important; margin: 0 auto; }
    /* Topics no mobile: tipografia compacta, quebra natural por palavra */
    .topic {
      font-size: 9px !important;
      letter-spacing: .5px !important;
      white-space: normal !important;
      max-width: 84px;
      text-align: center;
      line-height: 1.15;
      font-weight: 700;
      padding: 3px;
      overflow-wrap: break-word;
      hyphens: auto;
    }
    /* Texto central encolhido para combinar com stage menor */
    .center-text { top: 14% !important; }
    .center-text .ano { font-size: 22px !important; letter-spacing: 3px; }
    .center-text .ano.long { font-size: 13px !important; letter-spacing: 1.5px; }
    .center-text .period { font-size: 9px !important; letter-spacing: 1.5px; margin-top: 4px; }
    .top-mark { font-size: 8px !important; letter-spacing: 1.5px; gap: 4px; top: 5% !important; }
    .center-circle .glyph { font-size: 10px !important; letter-spacing: 2.5px; }
    .center-circle .glyph .center-fly-logo { width: 50px !important; height: auto; }
    /* Topic banner (when used) */
    .topic-banner { padding: 18px 14px; border-radius: 18px; }
    .topic-banner h1 { font-size: 22px; letter-spacing: 2.5px; }
    .topic-banner .banner-icons { gap: 8px; margin-top: 12px; }
    .banner-icon { width: 50px; height: 36px; font-size: 12px; }

    /* Topic view (items) */
    #topicView { padding: 80px 14px 40px; }
    .items-grid { grid-template-columns: 1fr 1fr !important; gap: 10px; }
    .item-card { padding: 14px 12px; min-height: 80px; }
    .item-card h3, .item-card .item-name { font-size: 11px !important; letter-spacing: 1px; }

    /* Item view */
    #itemView { padding: 70px 0 60px; }

    /* Modal genérico */
    .modal {
      max-width: 94vw;
      max-height: 88vh;
      padding: 22px 18px;
      border-radius: 16px;
      overflow-y: auto;
    }
    .modal.wide { max-width: 94vw; }
    .modal h2 { font-size: 16px !important; letter-spacing: 2px; }
    .modal p, .modal label { font-size: 12px; }

    /* ---------- BASES FLY ---------- */
    .bases-module { padding: 0 12px 40px; }
    .bases-hero { padding: 22px 18px; border-radius: 18px; margin: 18px 0 18px; }
    .bases-hero h1 { font-size: 24px; letter-spacing: 3px; }
    .bases-hero .sub { font-size: 10px; letter-spacing: 1.5px; }
    .bases-hero-kpis {
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 16px;
    }
    .bases-kpi { padding: 10px 12px; }
    .bases-kpi .lbl { font-size: 9px; letter-spacing: 1.3px; }
    .bases-kpi .val { font-size: 20px; }

    /* Bases map section: stack sidebar above map */
    .bases-map-section {
      grid-template-columns: 1fr !important;
      gap: 12px;
    }
    .bases-sidebar {
      max-height: 280px;
      order: 2;
      border-radius: 16px;
    }
    .bases-map-stack { order: 1; }
    .dubai-map { min-height: 360px; aspect-ratio: 1/1; }
    .dubai-map-title {
      padding: 8px 12px;
      font-size: 9px;
      letter-spacing: 1.5px;
    }
    .dubai-map-title strong { font-size: 11px; letter-spacing: 2px; display: block; }
    .map-toolbar { top: 60px; left: 8px; right: 8px; gap: 6px; }
    .map-tool-btn {
      padding: 6px 10px;
      font-size: 9px;
      letter-spacing: 1px;
    }
    .map-tool-btn .lbl { display: none; }
    .map-zoom-controls {
      right: 10px;
      bottom: 60px;
      gap: 4px;
    }
    .zoom-btn { width: 36px; height: 36px; font-size: 16px; }
    .zoom-level { font-size: 9px; padding: 3px 6px; }
    .map-hint { font-size: 8px; padding: 5px 8px; letter-spacing: 1.2px; }

    /* Sidebar */
    .sidebar-head { padding: 12px; }
    .sidebar-title { font-size: 11px; letter-spacing: 1.5px; }
    .sidebar-sub { font-size: 9px; letter-spacing: 1px; }
    .sidebar-add-btn { width: 32px; height: 32px; font-size: 16px; }
    .sidebar-pin-row { padding: 8px; gap: 8px; }
    .sidebar-pin-thumb { width: 32px; height: 32px; }
    .sidebar-pin-name { font-size: 11px; }
    .sidebar-pin-city { font-size: 9px; }

    /* Pin modal */
    .pin-modal {
      max-width: 94vw;
      width: 94vw;
      padding: 22px 18px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 18px;
    }
    .pin-modal-title { font-size: 18px; letter-spacing: 2px; }
    .pin-modal-sub { font-size: 10px; letter-spacing: 1.2px; }
    .pin-step-label { font-size: 11px; letter-spacing: 1.5px; }
    .pin-input, .pin-select {
      font-size: 14px !important;
      padding: 11px 12px !important;
    }
    .pin-location-grid { grid-template-columns: 1fr; gap: 10px; }
    .pin-photo-zone { min-height: 110px; }
    .pin-photo-icon { font-size: 32px; }
    .pin-photo-text { font-size: 11px; letter-spacing: 1.5px; }
    .pin-photo-hint { font-size: 9px; }
    .pin-modal-actions { gap: 8px; flex-direction: column; }
    .pin-modal-actions .pin-btn { width: 100%; padding: 12px; font-size: 11px; }

    /* Pin card overlay */
    .pin-card { max-width: 94vw; }
    .pin-card-photo { height: 200px; }
    .pin-card-name { font-size: 18px; letter-spacing: 1.5px; }
    .pin-card-loc { font-size: 11px; }
    .pin-card-coords { font-size: 10px; }
    .pin-card-opening { flex-wrap: wrap; gap: 6px; }
    .pin-card-actions { flex-direction: column; gap: 8px; }
    .pin-card-actions .pin-btn { width: 100%; }

    /* Visual grid */
    .bases-visual-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .bases-visual-card { aspect-ratio: 4/3; border-radius: 14px; }
    .bases-visual-card .img { font-size: 36px; }
    .bases-visual-card .overlay { padding: 12px; }
    .bases-visual-card .overlay .lbl { font-size: 9px; letter-spacing: 1.5px; margin-bottom: 2px; }
    .bases-visual-card .overlay .name { font-size: 12px; }
    .bases-visual-card .visual-edit-btns { opacity: 1; top: 6px; right: 6px; gap: 4px; }
    .bases-visual-card .visual-edit-btn { width: 26px; height: 26px; font-size: 11px; }
    .bases-visual-card .visual-empty-hint { display: none; }
    .bases-video-card {
      grid-column: span 2;
      aspect-ratio: 16/9;
      border-radius: 14px;
    }
    .bases-video-card .play { width: 50px; height: 50px; font-size: 18px; }
    .bases-video-card .lbl { font-size: 9px; letter-spacing: 1.5px; padding: 0 12px; text-align: center; }
    .bases-video-card .visual-edit-btns { opacity: 1; top: 8px; right: 8px; }
    .bases-video-card .visual-edit-btn { width: 32px; height: 32px; }

    /* Section title */
    .bases-section { margin-top: 26px; }
    .bases-section-title { gap: 10px; margin-bottom: 14px; }
    .bases-section-title .ico { width: 30px; height: 30px; font-size: 13px; }
    .bases-section-title h2 { font-size: 14px; letter-spacing: 2.5px; }
    .bases-section-title small { font-size: 9px; letter-spacing: 1.3px; }

    /* Costs */
    .bases-costs { grid-template-columns: 1fr !important; gap: 14px; }
    .cost-card { padding: 18px; border-radius: 18px; }
    .cost-card h3 { font-size: 13px; letter-spacing: 2px; }
    .cost-card h3 small { font-size: 9px; letter-spacing: 1.2px; }
    .cost-card .cost-icon { width: 36px; height: 36px; font-size: 16px; }
    .cost-row { padding: 10px 0; }
    .cost-row .lbl { font-size: 11px; }
    .cost-row .val { font-size: 13px; }
    .cost-staff { padding: 10px 12px; }
    .cost-staff .head { font-size: 9px; letter-spacing: 1.3px; }
    .cost-staff .level .num { font-size: 22px; }
    .cost-staff .level .lbl { font-size: 9px; }

    /* Team */
    .bases-team-row { grid-template-columns: 1fr !important; gap: 14px; }
    .team-total .num { font-size: 52px; }
    .team-total .lbl { font-size: 10px; letter-spacing: 1.5px; }
    .team-row { padding: 10px 12px; gap: 10px; }
    .team-row .badge { width: 32px; height: 32px; font-size: 14px; }
    .team-row .info .name { font-size: 12px; }
    .team-row .info .desc { font-size: 10px; }

    /* Ops */
    .bases-ops { grid-template-columns: 1fr !important; gap: 14px; }
    .ops-card { padding: 18px; }
    .ops-card h3 { font-size: 13px; letter-spacing: 2px; }
    .ops-card .ops-icon { width: 36px; height: 36px; font-size: 16px; }
    .ops-list li { font-size: 11px; padding: 8px 0; }

    /* Scale */
    .scale-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .scale-item { padding: 14px 10px; }
    .scale-item .ico { font-size: 22px; }
    .scale-item .name { font-size: 11px; letter-spacing: 1.2px; }
    .scale-item .desc { font-size: 9px; }

    /* Timeline */
    .bases-timeline-wrap { padding: 18px 12px 14px; border-radius: 18px; }
    .timeline-summary {
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 12px;
    }
    .timeline-summary .stat { flex: 1; min-width: 80px; }
    .timeline-summary .stat .num { font-size: 14px; }
    .timeline-summary .stat .lbl { font-size: 8px; letter-spacing: 1.1px; }
    .timeline-summary .stat-divider { display: none; }
    .timeline-year-btn { padding: 6px 12px; font-size: 10px; letter-spacing: 1.5px; }
    .timeline-year-btn .y-count { font-size: 8px; }

    .timeline-month {

      flex-wrap: wrap;
      gap: 6px;
    }
    .timeline-month .dot { left: 6px; top: 12px; width: 10px; height: 10px; }
    .timeline-month .month-lbl {
      font-size: 9px;
      letter-spacing: 1.3px;
      min-width: 48px;
    }
    .timeline-base-chip {
      font-size: 10px;
      padding: 4px 10px 4px 4px;
      gap: 6px;
    }
    .timeline-base-chip .chip-photo { width: 18px; height: 18px; font-size: 8px; }
    .timeline-base-chip .chip-flag { font-size: 11px; }
    .timeline-month .empty-hint { font-size: 9px; }

    /* ---------- HIERARQUIA ---------- */
    .hier-module { padding: 0 12px 40px; }
    .hier-hero { padding: 22px 16px; border-radius: 18px; margin: 18px 0 18px; }
    .hier-hero h1 { font-size: 26px; letter-spacing: 3px; }
    .hier-hero .hier-sub { font-size: 10px; letter-spacing: 1.5px; }
    .hier-hero-kpis { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 14px; }
    .hier-hero-kpi { padding: 10px 12px; }
    .hier-hero-kpi .lbl { font-size: 9px; letter-spacing: 1.3px; }
    .hier-hero-kpi .val { font-size: 18px; }
    .hier-tabs {
      flex-wrap: wrap;
      gap: 6px;
      padding: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .hier-tabs::-webkit-scrollbar { display: none; }
    .hier-tab {
      padding: 8px 12px;
      font-size: 10px;
      letter-spacing: 1.2px;
      white-space: nowrap;
    }
    .year-row {
      flex-direction: column;
      gap: 8px;
      align-items: stretch;
    }
    .year-switcher { justify-content: center; }
    .year-btn { padding: 8px 14px; font-size: 11px; }
    .year-meta { font-size: 10px; text-align: center; }

      overflow-x: auto;

    }
    .org-canvas {

    .org-card .name { font-size: 11px; }
    .org-card .role { font-size: 9px; }
    .org-tool-btn { padding: 6px 10px; font-size: 9px; }

    /* Funcionários table → cards */
    .funcionarios-grid { grid-template-columns: 1fr; }
    .funcionario-card { padding: 12px; }
    .funcionario-card .name { font-size: 12px; }
    .funcionario-card .meta { font-size: 10px; }

    /* Financeiro */
    .fin-grid, .fin-row { grid-template-columns: 1fr !important; gap: 10px; }
    .fin-card { padding: 14px; }
    .fin-card .num { font-size: 22px; }
    .fin-card .lbl { font-size: 10px; }

    /* Crescimento / Performance / Contratações */
    .grow-grid, .perf-grid, .hire-grid { grid-template-columns: 1fr !important; gap: 10px; }
    .grow-card, .perf-card, .hire-card { padding: 14px; }

    /* AI Panel */
    .ai-panel { padding: 16px; border-radius: 14px; }
    .ai-panel h3 { font-size: 12px; letter-spacing: 1.5px; }
    .ai-panel p { font-size: 11px; }
    .ai-panel .ai-icon { width: 32px; height: 32px; font-size: 14px; }

    /* ---------- DUBAI EXPLORER ---------- */
    .dbx-module { padding: 12px 12px 60px; }
    .dbx-hero { height: 220px; border-radius: 18px; margin-bottom: 18px; }
    .dbx-hero-content { left: 16px; right: 16px; bottom: 18px; }
    .dbx-hero-content h1 { font-size: 24px; letter-spacing: 3px; }
    .dbx-eyebrow { font-size: 9px; letter-spacing: 2px; }
    .dbx-hero-kpis {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 6px;
      margin-top: 12px;
    }
    .dbx-kpi { padding: 8px 10px; }
    .dbx-kpi .lbl { font-size: 8px; letter-spacing: 1.2px; }
    .dbx-kpi .val { font-size: 16px; }

    /* DBX tabs - horizontal scroll */
    .dbx-tabs {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 6px;
      gap: 4px;
    }
    .dbx-tabs::-webkit-scrollbar { display: none; }

      padding: 8px 12px;
      font-size: 10px;
      letter-spacing: 1.2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* DBX panel grids */
    .dbx-2col, .dbx-finance-grid, .dbx-cards-grid {
      grid-template-columns: 1fr !important;
      gap: 10px;
    }
    .dbx-block { padding: 14px; border-radius: 14px; }
    .dbx-block h3 { font-size: 12px; letter-spacing: 1.5px; }

    .dbx-card-actions { opacity: 1; gap: 4px; }
    .dbx-act-btn { width: 28px; height: 28px; font-size: 11px; }

    /* DBX tables → cards */

      gap: 4px;
      padding: 10px;

      grid-template-columns: 1fr !important;
      gap: 6px;

    .dbx-add-card { padding: 14px; min-height: 100px; }
    .dbx-add-card .ico { font-size: 20px; }
    .dbx-add-card .lbl { font-size: 10px; }
    .dbx-add-row { padding: 10px; font-size: 11px; }

    .dbx-list-row .dbx-act-btn { width: 24px !important; height: 24px !important; font-size: 10px; }

      align-items: stretch !important;
      gap: 8px !important;

    .dbx-block-head h3 { font-size: 13px !important; line-height: 1.3; padding-right: 0 !important; }
    .dbx-block-head .dbx-block-actions,

    .dbx-block-head .dbx-mini-btn { padding: 6px 10px !important; font-size: 9px !important; }
    /* Header geral do painel */
    .dbx-panel-head {
      flex-direction: column !important;
      align-items: stretch !important;
      gap: 10px;
    }
    .dbx-panel-head h2 { font-size: 14px !important; line-height: 1.3; }
    .dbx-panel-head .dbx-actions { flex-wrap: wrap; gap: 6px; }
    .dbx-panel-head .dbx-btn { padding: 7px 12px; font-size: 10px; }

    /* Hero KPIs ainda mais compactos no mobile */
    .dbx-hero { height: 200px !important; }
    .dbx-hero-content h1 { font-size: 22px !important; }
    .dbx-meta { font-size: 10px; gap: 8px; }
    .dbx-meta .dot { display: inline-block; }

    /* Cards de experiências/passeios/equipe em 2 colunas */
    .dbx-cards-grid,
    .dbx-exp-grid,
    .dbx-team-grid {
      grid-template-columns: 1fr 1fr !important;
      gap: 8px !important;
    }
    .dbx-card,
    .dbx-exp-card {
      padding: 12px 8px !important;
      text-align: center;
    }
    .dbx-exp-card .icon,
    .dbx-exp-card .ico,
    .dbx-card .icon,
    .dbx-card .ico {
      font-size: 24px !important;
      margin-bottom: 4px !important;
    }
    .dbx-exp-card .nome,
    .dbx-card h4,
    .dbx-card .name,
    .dbx-card .nome { font-size: 11px !important; line-height: 1.2; letter-spacing: .5px; }
    .dbx-exp-card .desc,
    .dbx-card .role,
    .dbx-card .desc,
    .dbx-card .meta { font-size: 9px !important; line-height: 1.3; }

    /* Inclusos / Itens em row vertical */
    .dbx-inc-row, .dbx-art-row, .dbx-rot-row, .dbx-origem-row {
      grid-template-columns: 1fr !important;
      padding-right: 70px !important;
      gap: 4px !important;
    }
    .dbx-rot-row > *, .dbx-inc-row > *, .dbx-art-row > *, .dbx-origem-row > * {
      font-size: 11px !important;
    }
    .dbx-rot-row > *:first-child,
    .dbx-inc-row > *:first-child,
    .dbx-art-row > *:first-child,
    .dbx-origem-row > *:first-child {
      font-weight: 600 !important;
      color: #E6C77A !important;
    }

    /* Action buttons compactos no DBX */
    .dbx-act-btn { width: 26px; height: 26px; font-size: 11px; }

    /* Painéis com scroll horizontal pra tabelas grandes */
    .dbx-panel { overflow-x: hidden; }
    .dbx-block { overflow: hidden; }

    /* Alertas */
    .dbx-alert { padding: 12px !important; }
    .dbx-alert h4 { font-size: 11px !important; }
    .dbx-alert p { font-size: 11px !important; line-height: 1.4; }

    /* DBX modal */
    .dbx-modal {
      max-width: 94vw;
      width: 94vw;
      padding: 20px 16px;
      max-height: 90vh;
      overflow-y: auto;
      border-radius: 16px;
    }
    .dbx-modal h3 { font-size: 14px; letter-spacing: 1.5px; }
    .dbx-form-field label { font-size: 10px; letter-spacing: 1.2px; }
    .dbx-form-field input,
    .dbx-form-field textarea,
    .dbx-form-field select {
      font-size: 14px !important;
      padding: 10px 12px;
    }
    .dbx-modal-actions { flex-direction: column; gap: 8px; }
    .dbx-modal-actions button { width: 100%; padding: 12px; font-size: 11px; }

    /* Alert blocks */
    .dbx-alert { padding: 14px; border-radius: 14px; }
    .dbx-alert h4 { font-size: 12px; }
    .dbx-alert p { font-size: 11px; }

    /* Inline editing affordance — touch-friendly */
    .bases-inline-editable, .hier-inline-editable {
      min-height: 22px;
    }
  }

  /* ============================================================ */
  /* SMALL PHONE (≤ 380px) — iPhone SE / mini                    */
  /* ============================================================ */
  @container fly-vp (max-width: 380px) {
    .grid-circle { width: 50px; height: 50px; font-size: 9px; }
    .grid-circle.gold { width: 60px; height: 60px; }
    .items-grid { grid-template-columns: 1fr !important; }
    .stage { width: min(58vmin, 200px) !important; }
    .topic { font-size: 8px !important; max-width: 60px; letter-spacing: .7px !important; }
    .bases-hero h1 { font-size: 20px; letter-spacing: 2px; }
    .bases-hero-kpis,
    .hier-hero-kpis,
    .dbx-hero-kpis { grid-template-columns: repeat(2, 1fr); }
    .scale-grid, .bases-visual-grid {
      grid-template-columns: 1fr !important;
    }
    .bases-video-card { grid-column: span 1; }
    .dbx-hero-content h1 { font-size: 20px; letter-spacing: 2px; }
    .dubai-map { min-height: 320px; }
    .timeline-summary .stat { min-width: 70px; }
    .timeline-summary .stat .num { font-size: 13px; }
    .pin-modal-title { font-size: 16px; letter-spacing: 1.5px; }
    .modal h2 { font-size: 14px !important; }
  }

  /* ============================================================ */
  /* TOUCH DEVICES — always show edit buttons                    */
  /* ============================================================ */
  @media (hover: none) and (pointer: coarse) {
    .dbx-card-actions,
    .bases-visual-card .visual-edit-btns,
    .bases-video-card .visual-edit-btns,
    .visual-empty-hint {
      opacity: 1 !important;
    }
    .bases-inline-editable:hover,
    .hier-inline-editable:hover {
      background: rgba(198,168,90,.05);
    }
  }

  /* iOS: prevent input zoom on focus (font-size ≥16 fix) */
  @container fly-vp (max-width: 640px) {
    input[type="text"],
    input[type="month"],
    input[type="date"],
    input[type="number"],
    input[type="email"],
    input[type="tel"],
    textarea,
    select {
      font-size: 16px !important;
    }
  }
  /* Note: media query (real viewport) ainda usado pra inputs em phones reais */
  @media (max-width: 640px) {
    input[type="text"],
    input[type="month"],
    input[type="date"],
    input[type="number"],
    input[type="email"],
    input[type="tel"],
    textarea,
    select {
      font-size: 16px !important;
    }
  }
</style>
</head>

    /* =====================  SUPABASE SYNC  ===================== */
    // Conecta com Supabase e mantém localStorage espelhado em tempo real.
    // Estratégia: localStorage = cache rápido. Supabase = fonte da verdade.
    // - Em qualquer setItem(), enfileiramos um upsert (debounced 700ms)
    // - No load inicial, puxamos do Supabase e sobrescrevemos cache local
    // - Se offline ou erro, app continua funcionando 100% via localStorage

    const FLY_SUPA_URL = 'https://ezfmvblirhmootdvqmsr.supabase.co';
    const FLY_SUPA_KEY = 'sb_publishable_5vVImnH7PBHM0E5jDP1bAA_CiHZz6jt';
    const _BASE_SYNCED_KEYS = [
      'fly_7anos_data_v1',
      'fly_basesfly_pins_v2',
      'fly_basesfly_visual_v1',
      'fly_basesfly_inline_v1',
      'fly_hierarquia_inline_v1',
      'fly_basesfly_custom_cities_v1',
      'fly_design_overrides_v1',
      'fly_changelog_v1',
      'fly_turmas_v1',
      'fly_war_territories_v1',
      'fly_war_connections_v1'
    ];
    // Cada chave tem 3 variantes (demo / _operational / _goal) sincronizadas separadamente
    const SYNCED_KEYS = [
      ..._BASE_SYNCED_KEYS,
      ..._BASE_SYNCED_KEYS.filter(k => k !== 'fly_7anos_data_v1' && k !== 'fly_changelog_v1' && k !== 'fly_design_overrides_v1' && k !== 'fly_basesfly_custom_cities_v1')
