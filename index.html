    ];

    // Helper: dado uma chave base, retorna a chave do modo atual
    // (chama getDataMode que pode não estar definida ainda — fallback 'demo')
    function flyModeKey(baseKey) {
      const m = (typeof getDataMode === 'function') ? getDataMode() : 'demo';
      return m === 'demo' ? baseKey : (baseKey + '_' + m);
    }
    let supaClient = null;
    const __supaPending = new Map(); // key -> timeout id
    let __supaInitialPullDone = false;

    function setSyncStatus(status, msg) {
      const el = document.getElementById('syncStatus');
      if (!el) return;
      el.dataset.status = status;
      const m = el.querySelector('.sync-msg');
      if (m) m.textContent = msg || ({
        idle: 'Local',
        syncing: 'Sincronizando…',
        online: 'Sincronizado',
        offline: 'Offline · cache',
        error: 'Erro · cache local'
      })[status] || status;
    }

    function safeJSONParse(s) { try { return JSON.parse(s); } catch (e) { return null; } }

    /* =====================  AUTH GATE (LAYER 2 · Supabase Auth)  ===================== */
    // Login via email + senha. Sem signup público — somente o admin cria contas
    // pelo painel do Supabase. Sessão persiste automaticamente (cookie/localStorage).
    // - 5 tentativas erradas → bloqueia 30s
    // - Token JWT do Supabase é incluído automaticamente em requests da API

    const FLY_AUTH_FAILS_KEY = 'fly_auth_fails';
    const FLY_AUTH_LOCK_KEY  = 'fly_auth_locked_until';

    let __currentSession = null;

    async function getCurrentSession() {
      if (!supaClient) return null;
      try {
        const { data } = await supaClient.auth.getSession();
        return data?.session || null;
      } catch (e) { return null; }
    }

    function buildAuthOverlay({ onSubmit, onForgot }) {
      const overlay = document.createElement('div');
      overlay.className = 'pin-gate-overlay'; // reaproveita estilos
      overlay.innerHTML = `
        <div class="pin-gate-modal">
          <div class="pin-gate-logo"><img src="assets/fly-logo-white.svg" alt="FLY"></div>
          <h2>Acesso Restrito</h2>
          <p class="pin-gate-sub">Faça login para acessar o ECOSSISTEMA FLY</p>
          <label>Email</label>
          <input type="email" class="pin-gate-input pin-gate-input-text" id="authEmail" autocomplete="username" maxlength="120" placeholder="seu@email.com">
          <label>Senha</label>
          <input type="password" class="pin-gate-input" id="authPassword" autocomplete="current-password" maxlength="64">
          <div class="pin-gate-error" id="authError"></div>
          <div class="pin-gate-actions">
            <button class="pin-gate-btn primary" id="authSubmit" type="button">Entrar</button>
          </div>
          <button class="pin-gate-link" id="authForgot" type="button">Esqueci a senha</button>
        </div>
      `;
      document.body.appendChild(overlay);
      const emailInp = overlay.querySelector('#authEmail');
      const passInp  = overlay.querySelector('#authPassword');
      setTimeout(() => emailInp.focus(), 60);

      const showErr = (msg) => {
        const el = overlay.querySelector('#authError');
        el.textContent = msg || '';
        el.style.opacity = msg ? '1' : '0';
        if (msg) {
          const modal = overlay.querySelector('.pin-gate-modal');
          modal.classList.add('shake');
          setTimeout(() => modal.classList.remove('shake'), 400);
        }
      };

      overlay.querySelector('#authSubmit').addEventListener('click', async () => {
        // Lock por tentativas erradas
        const lockUntil = parseInt(sessionStorage.getItem(FLY_AUTH_LOCK_KEY) || '0', 10);
        if (lockUntil > Date.now()) {
          const secs = Math.ceil((lockUntil - Date.now()) / 1000);
          return showErr(`Muitas tentativas. Aguarde ${secs}s.`);
        }
        const email = emailInp.value.trim();
        const password = passInp.value;
        if (!email) return showErr('Digite seu email');
        if (!password) return showErr('Digite a senha');
        await onSubmit({ overlay, showErr, email, password });
      });

      overlay.querySelector('#authForgot').addEventListener('click', async () => {
        const email = emailInp.value.trim();
        if (!email) return showErr('Digite seu email pra receber o link de recuperação');
        await onForgot({ overlay, showErr, email });
      });

      [emailInp, passInp].forEach(el => el.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') { ev.preventDefault(); overlay.querySelector('#authSubmit').click(); }
      }));
      return overlay;
    }

    async function runAuthGate() {
      // Se Supabase não conectou, libera (modo offline = sem auth)
      if (!supaClient) return true;

      // Se já tem sessão ativa, libera
      const existingSession = await getCurrentSession();
      if (existingSession) {
        __currentSession = existingSession;
        setSyncStatus('online', existingSession.user.email);
        return true;
      }

      // Mostra modal de login
      return new Promise((resolve) => {
        const ov = buildAuthOverlay({
          onSubmit: async ({ overlay, showErr, email, password }) => {
            try {
              setSyncStatus('syncing', 'Entrando…');
              const { data, error } = await supaClient.auth.signInWithPassword({ email, password });
              if (error) throw error;
              if (!data?.session) throw new Error('Sessão não criada');
              __currentSession = data.session;
              sessionStorage.removeItem(FLY_AUTH_FAILS_KEY);
              sessionStorage.removeItem(FLY_AUTH_LOCK_KEY);
              setSyncStatus('online', data.user.email);
              overlay.remove();
              resolve(true);
            } catch (e) {
              const fails = (parseInt(sessionStorage.getItem(FLY_AUTH_FAILS_KEY) || '0', 10) || 0) + 1;
              sessionStorage.setItem(FLY_AUTH_FAILS_KEY, String(fails));
              if (fails >= 5) {
                sessionStorage.setItem(FLY_AUTH_LOCK_KEY, String(Date.now() + 30 * 1000));
                showErr('5 tentativas erradas — bloqueado por 30s');
              } else {
                const msg = (e?.message || '').toLowerCase();
                if (msg.includes('invalid') || msg.includes('credentials')) {
                  showErr(`Email ou senha incorretos (${fails}/5)`);
                } else {
                  showErr(e?.message || 'Erro ao entrar — tente novamente');
                }
              }
              overlay.querySelector('#authPassword').value = '';
            }
          },
          onForgot: async ({ overlay, showErr, email }) => {
            try {
              const { error } = await supaClient.auth.resetPasswordForEmail(email, {
                redirectTo: location.origin + location.pathname
              });
              if (error) throw error;
              showErr('');
              alert(`Link de recuperação enviado para ${email}. Confira sua caixa de entrada.`);
            } catch (e) {
              showErr(e?.message || 'Erro ao enviar email de recuperação');
            }
          }
        });
      });
    }

    async function logoutFlow() {
      if (!supaClient) { location.reload(); return; }
      try {
        await supaClient.auth.signOut();
      } catch (e) { console.warn('Logout falhou:', e); }
      __currentSession = null;
      location.reload();
    }
    window.flyLogout = logoutFlow;

    async function initSupabase() {
      if (typeof window.supabase === 'undefined' || !window.supabase.createClient) {
        console.warn('[FLY] Supabase SDK não carregada (offline)');
        setSyncStatus('offline', 'Offline · cache');
        return false;
      }
      try {
        supaClient = window.supabase.createClient(FLY_SUPA_URL, FLY_SUPA_KEY, {
          auth: {
            persistSession: true,
            autoRefreshToken: true,
            detectSessionInUrl: true,
            storage: window.localStorage,
            storageKey: 'fly-supa-auth'
          }
        });
      } catch (e) {
        console.warn('[FLY] Falha ao criar client Supabase:', e);
        setSyncStatus('error', 'Erro de conexão');
        return false;
      }
      // Pull inicial — tenta puxar todos os SYNCED_KEYS do banco
      setSyncStatus('syncing', 'Buscando dados…');
      try {
        const { data: rows, error } = await supaClient
          .from('fly_kv').select('key, value, updated_at').in('key', SYNCED_KEYS);
        if (error) throw error;
        let pulled = 0;
        for (const row of (rows || [])) {
          const remoteJSON = JSON.stringify(row.value);
          const localJSON = localStorage.getItem(row.key);
          if (remoteJSON !== localJSON) {
            // Salva sem disparar upsert de volta (flag silent)
            __supaSilent = true;
            localStorage.setItem(row.key, remoteJSON);
            __supaSilent = false;
            pulled++;
          }
        }
        // Push de keys locais que ainda não estão no banco (primeira sincronização)
        const remoteKeys = new Set((rows || []).map(r => r.key));
        for (const k of SYNCED_KEYS) {
          const local = localStorage.getItem(k);
          if (local && !remoteKeys.has(k)) {
            const v = safeJSONParse(local);
            if (v !== null) await supaClient.from('fly_kv').upsert({ key: k, value: v });
          }
        }
        __supaInitialPullDone = true;
        setSyncStatus('online', 'Sincronizado');
        // Se algo foi puxado e a app já estava renderizada, recarrega
        if (pulled > 0 && typeof showHome === 'function') {
          // Re-popular memória global a partir do localStorage atualizado
          if (typeof loadData === 'function' && typeof data !== 'undefined') {
            try { Object.assign(data, loadData()); } catch (e) {}
          }
          // Re-render se estiver na tela inicial ou em painéis dependentes
          if (typeof currentView !== 'undefined' && currentView === 'grid') {
            // nada a fazer — home é estática
          }
        }
        return true;
      } catch (e) {
        console.warn('[FLY] Pull do Supabase falhou:', e?.message || e);
        setSyncStatus('offline', 'Offline · cache');
        return false;
      }
    }

    let __supaSilent = false;
    function queueSupabaseSync(key) {
      if (!supaClient || !__supaInitialPullDone) return;
      if (__supaSilent) return;
      if (!SYNCED_KEYS.includes(key)) return;
      if (__supaPending.has(key)) clearTimeout(__supaPending.get(key));
      setSyncStatus('syncing');
      __supaPending.set(key, setTimeout(async () => {
        __supaPending.delete(key);
        try {
          const raw = localStorage.getItem(key);
          if (raw === null) {
            // Foi removido do cache — apaga do banco também
            await supaClient.from('fly_kv').delete().eq('key', key);
          } else {
            const value = safeJSONParse(raw);
            if (value === null) return;
            const { error } = await supaClient.from('fly_kv').upsert({ key, value });
            if (error) throw error;
          }
          if (__supaPending.size === 0) setSyncStatus('online', 'Sincronizado');
        } catch (e) {
          console.warn('[FLY] Sync falhou pra', key, ':', e?.message || e);
          setSyncStatus('error', 'Erro · cache local');
        }
      }, 700));
    }

    // Patcha localStorage.setItem/removeItem pra disparar sync automático
    (function patchLocalStorage() {
      const _set = Storage.prototype.setItem;
      const _del = Storage.prototype.removeItem;
      Storage.prototype.setItem = function(k, v) {
        _set.call(this, k, v);
        if (this === localStorage) queueSupabaseSync(k);
      };
      Storage.prototype.removeItem = function(k) {
        _del.call(this, k);
        if (this === localStorage) queueSupabaseSync(k);
      };
    })();

    /* =====================  STORAGE  ===================== */
    const STORAGE_KEY = 'fly_7anos_data_v1';

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) return JSON.parse(raw);
      } catch (e) {}
      return {};

        ts: Date.now(),
        usuario: (window.__currentSession?.user?.email) || 'anônimo',

        antes: antes !== undefined ? String(antes) : '',
        depois: depois !== undefined ? String(depois) : '',
        contexto: contexto || '',
        justificativa: justificativa || ''
      });
      // Limita a 1000 entradas pra não estourar localStorage

      flySaveChangelog(log);

    /* ============================================================
       FLY DESIGN EDITOR · admin pode editar logos/textos in-place
       ============================================================ */
    const FLY_DESIGN_KEY = 'fly_design_overrides_v1';
    window.FlyDesign = (function() {
      let overrides = {};
      try { overrides = JSON.parse(localStorage.getItem(FLY_DESIGN_KEY) || '{}') || {}; } catch (e) { overrides = {}; }

      function persist() {
        try { localStorage.setItem(FLY_DESIGN_KEY, JSON.stringify(overrides)); } catch (e) {}
      }
      function get(id) { return overrides[id] || {}; }
      function set(id, props) {
        overrides[id] = Object.assign({}, get(id), props);
        persist();
      }
      function reset(id) { delete overrides[id]; persist(); }

      // Aplica overrides salvos no elemento (texto, imagem, estilo)
      function applyTo(el, id, type) {
        if (!el) return;
        const o = get(id);
        if (!o) return;
        if (type === 'text') {
          if (o.text !== undefined && o.text !== null) {
            // Se o elemento tem filhos não-texto, só substitui o nó de texto
            if (el.children.length === 0) el.textContent = o.text;
            else {
              // Para elementos com children, troca apenas o último texto
              const tn = Array.from(el.childNodes).find(n => n.nodeType === 3);
              if (tn) tn.nodeValue = o.text;
              else el.textContent = o.text;
            }
          }
          if (o.fontSize)       el.style.fontSize = o.fontSize + 'px';
          if (o.color)          el.style.color = o.color;
          if (o.letterSpacing !== undefined) el.style.letterSpacing = o.letterSpacing + 'px';
          if (o.fontWeight)     el.style.fontWeight = o.fontWeight;
          if (o.textAlign)      el.style.textAlign = o.textAlign;
          if (o.x || o.y) {
            const existing = el.style.transform || '';
            const cleaned = existing.replace(/translate\([^)]*\)/g, '').trim();
            el.style.transform = `translate(${o.x||0}px, ${o.y||0}px) ${cleaned}`.trim();
          }
        } else if (type === 'image') {
          if (o.image) el.src = o.image;
          if (o.width)  el.style.width  = o.width + 'px';
          if (o.height) el.style.height = o.height + 'px';
          else if (o.width) el.style.height = 'auto';
          if (o.x || o.y) {
            const existing = el.style.transform || '';
            const cleaned = existing.replace(/translate\([^)]*\)/g, '').trim();
            el.style.transform = `translate(${o.x||0}px, ${o.y||0}px) ${cleaned}`.trim();
          }
        } else if (type === 'background') {
          if (o.image) el.style.backgroundImage = `url('${o.image}')`;
          if (o.width)  el.style.width  = o.width + 'px';
          if (o.height) el.style.height = o.height + 'px';
          if (o.x || o.y) {
            const existing = el.style.transform || '';
            const cleaned = existing.replace(/translate\([^)]*\)/g, '').trim();
            el.style.transform = `translate(${o.x||0}px, ${o.y||0}px) ${cleaned}`.trim();
          }
        }
      }

      // Marca elemento como editável + aplica overrides
      function bindEditable(el, id, opts = {}) {
        if (!el) return;
        const type = opts.type || 'text';
        el.dataset.designId = id;
        el.dataset.designType = type;
        if (opts.label) el.dataset.designLabel = opts.label;
        applyTo(el, id, type);
        if (!el._flyDesignBound) {
          el._flyDesignBound = true;
          el.addEventListener('click', (ev) => {
            if (!document.body.classList.contains('admin-mode')) return;
            ev.preventDefault();
            ev.stopPropagation();
            openEditor(el, id, opts);
          }, true);
        }
      }

      function openEditor(el, id, opts) {
        // Remove qualquer popover anterior
        document.querySelectorAll('.fly-design-popover').forEach(p => p.remove());
        const o = get(id);
        const type = opts.type || 'text';
        const label = opts.label || id;
        const pop = document.createElement('div');
        pop.className = 'fly-design-popover';
        const isImage = (type === 'image' || type === 'background');

        // Posicionar perto do elemento
        const rect = el.getBoundingClientRect();
        pop.style.left = Math.max(12, Math.min(window.innerWidth - 360, rect.left + rect.width/2 - 170)) + 'px';
        pop.style.top  = Math.min(window.innerHeight - 420, rect.bottom + 8) + 'px';

        // Detect current values from element if no override
        const computedColor = getComputedStyle(el).color;
        const computedFs = parseFloat(getComputedStyle(el).fontSize) || 16;
        const currentText = (o.text !== undefined && o.text !== null) ? o.text : (el.textContent || '').trim();

        pop.innerHTML = `
          <div class="fdp-head">
            <div class="fdp-title">${escapeHtml(label)}</div>
            <button class="fdp-close" type="button" title="Fechar">✕</button>
          </div>
          ${isImage ? `
            <label class="fdp-label">IMAGEM (PNG/JPG/SVG)</label>
            <input type="file" accept="image/png,image/jpeg,image/svg+xml" class="fdp-file">
            <div class="fdp-preview" id="fdpPreview" style="${o.image ? `background-image:url('${o.image}')` : ''}"></div>
            <div class="fdp-row">
              <div class="fdp-col">
                <label class="fdp-label">LARGURA (PX)</label>
                <input type="number" class="fdp-w" min="8" max="2000" step="1" placeholder="auto" value="${o.width || ''}">
              </div>
              <div class="fdp-col">
                <label class="fdp-label">ALTURA (PX)</label>
                <input type="number" class="fdp-h" min="8" max="2000" step="1" placeholder="auto" value="${o.height || ''}">
              </div>
            </div>
            <p class="fdp-hint">Deixe altura em branco para escala proporcional</p>
            <label class="fdp-label">POSIÇÃO (X / Y)</label>
            <div class="fdp-row">
              <div class="fdp-col">
                <input type="number" class="fdp-x" step="1" placeholder="X" value="${o.x || 0}">
              </div>
              <div class="fdp-col">
                <input type="number" class="fdp-y" step="1" placeholder="Y" value="${o.y || 0}">
              </div>
            </div>
          ` : `
            <label class="fdp-label">TEXTO</label>
            <textarea class="fdp-text" rows="2">${escapeHtml(currentText)}</textarea>
            <div class="fdp-row">
              <div class="fdp-col">
                <label class="fdp-label">TAMANHO (PX)</label>
                <input type="number" class="fdp-fs" min="6" max="200" step="1" value="${o.fontSize || Math.round(computedFs)}">
              </div>
              <div class="fdp-col">
                <label class="fdp-label">COR</label>
                <input type="color" class="fdp-color" value="${o.color ? toHex(o.color) : toHex(computedColor)}">
              </div>
            </div>
            <div class="fdp-row">
              <div class="fdp-col">
                <label class="fdp-label">ESPAÇAMENTO</label>
                <input type="number" class="fdp-ls" min="-5" max="20" step=".5" value="${o.letterSpacing !== undefined ? o.letterSpacing : ''}">
              </div>
              <div class="fdp-col">
                <label class="fdp-label">PESO</label>
                <select class="fdp-fw">
                  <option value="">— padrão —</option>
                  <option value="300" ${o.fontWeight==='300'?'selected':''}>Light 300</option>
                  <option value="400" ${o.fontWeight==='400'?'selected':''}>Regular 400</option>
                  <option value="500" ${o.fontWeight==='500'?'selected':''}>Medium 500</option>
                  <option value="600" ${o.fontWeight==='600'?'selected':''}>Semibold 600</option>
                  <option value="700" ${o.fontWeight==='700'?'selected':''}>Bold 700</option>
                  <option value="800" ${o.fontWeight==='800'?'selected':''}>Extrabold 800</option>
                  <option value="900" ${o.fontWeight==='900'?'selected':''}>Black 900</option>
                </select>
              </div>
            </div>
            <label class="fdp-label">ALINHAMENTO</label>
            <div class="fdp-align">
              ${['left','center','right'].map(a => `
                <button class="fdp-align-btn ${o.textAlign === a ? 'active' : ''}" data-align="${a}" type="button">${a==='left'?'◀':(a==='center'?'■':'▶')}</button>
              `).join('')}
            </div>
            <label class="fdp-label">POSIÇÃO (X / Y)</label>
            <div class="fdp-row">
              <div class="fdp-col">
                <input type="number" class="fdp-x" step="1" placeholder="X" value="${o.x || 0}">
              </div>
              <div class="fdp-col">
                <input type="number" class="fdp-y" step="1" placeholder="Y" value="${o.y || 0}">
              </div>
            </div>
          `}
          <div class="fdp-actions">
            <button class="fdp-btn ghost" type="button" data-act="reset">↺ Resetar</button>
            <button class="fdp-btn primary" type="button" data-act="save">Salvar</button>
          </div>
        `;
        document.body.appendChild(pop);

        // Wire close
        pop.querySelector('.fdp-close').addEventListener('click', () => pop.remove());
        const closeOnOutside = (ev) => {
          if (!pop.contains(ev.target)) {
            pop.remove();
            document.removeEventListener('mousedown', closeOnOutside, true);
          }
        };
        setTimeout(() => document.addEventListener('mousedown', closeOnOutside, true), 100);

        // Live updates
        if (!isImage) {
          // Align
          pop.querySelectorAll('.fdp-align-btn').forEach(b => b.addEventListener('click', () => {
            pop.querySelectorAll('.fdp-align-btn').forEach(x => x.classList.remove('active'));
            b.classList.add('active');
          }));
        } else {
          // Image upload preview — usa compressLogo (preserva PNG transparente / SVG vetorial)
          const fileIn = pop.querySelector('.fdp-file');
          const preview = pop.querySelector('#fdpPreview');
          fileIn.addEventListener('change', async () => {
            const f = fileIn.files && fileIn.files[0];
            if (!f) return;
            const dataUrl = await (typeof compressLogo === 'function' ? compressLogo(f, 1000) : compressImage(f, 1200, 0.9));
            preview.style.backgroundImage = `url('${dataUrl}')`;
            preview.dataset.newImage = dataUrl;
          });
        }

        // Save
        pop.querySelector('[data-act="save"]').addEventListener('click', () => {
          if (isImage) {
            const newImg = pop.querySelector('#fdpPreview').dataset.newImage;
            const w = pop.querySelector('.fdp-w')?.value;
            const h = pop.querySelector('.fdp-h')?.value;
            const x = pop.querySelector('.fdp-x')?.value;
            const y = pop.querySelector('.fdp-y')?.value;
            const props = {};
            if (newImg) props.image = newImg;
            if (w !== '' && w !== undefined) props.width = parseInt(w, 10) || null;
            else props.width = null;
            if (h !== '' && h !== undefined) props.height = parseInt(h, 10) || null;
            else props.height = null;
            if (x !== '' && x !== undefined) props.x = parseInt(x, 10);
            if (y !== '' && y !== undefined) props.y = parseInt(y, 10);
            // Limpa props nulos pra não poluir storage
            Object.keys(props).forEach(k => { if (props[k] === null) delete props[k]; });
            if (Object.keys(props).length > 0) set(id, props);
          } else {
            const text = pop.querySelector('.fdp-text').value;
            const fs = pop.querySelector('.fdp-fs').value;
            const color = pop.querySelector('.fdp-color').value;
            const ls = pop.querySelector('.fdp-ls').value;
            const fw = pop.querySelector('.fdp-fw').value;
            const align = pop.querySelector('.fdp-align-btn.active')?.dataset.align;
            const x = pop.querySelector('.fdp-x').value;
            const y = pop.querySelector('.fdp-y').value;
            const props = {};
            props.text = text;
            if (fs) props.fontSize = parseInt(fs, 10);
            if (color) props.color = color;
            if (ls !== '') props.letterSpacing = parseFloat(ls);
            if (fw) props.fontWeight = fw;
            if (align) props.textAlign = align;
            if (x !== '' && parseInt(x, 10) !== 0) props.x = parseInt(x, 10); else if (x === '0') props.x = 0;
            if (y !== '' && parseInt(y, 10) !== 0) props.y = parseInt(y, 10); else if (y === '0') props.y = 0;
            set(id, props);
          }
          applyTo(el, id, type);
          pop.remove();
        });

        // Reset
        pop.querySelector('[data-act="reset"]').addEventListener('click', () => {
          if (!confirm('Resetar este elemento para o padrão?')) return;
          reset(id);
          // Reload to re-render from defaults (simpler than undoing inline styles)
          location.reload();
        });
      }

      function toHex(c) {
        if (!c) return '#ffffff';
        if (c.startsWith('#')) return c.length >= 7 ? c.slice(0,7) : c;
        const m = c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
        if (m) {
          return '#' + [m[1], m[2], m[3]].map(n => parseInt(n,10).toString(16).padStart(2,'0')).join('');
        }
        return '#ffffff';
      }

      // Quando admin-mode liga/desliga, atualiza highlight dos editáveis
      function refreshAdminHighlight() {

          if (isAdmin) el.classList.add('design-editable');
          else el.classList.remove('design-editable');
        });
      }

      return { get, set, reset, applyTo, bindEditable, openEditor, refreshAdminHighlight };
    })();

    function getTopic(yearKey, topicKey) {
      data[yearKey] = data[yearKey] || {};
      if (!data[yearKey][topicKey]) {
        data[yearKey][topicKey] = {
          banner: { title: topicKey, image: '', icons: [] },
          pacotes: [],
          items: []
        };
      }
      const t = data[yearKey][topicKey];
      t.banner = t.banner || { title: topicKey, image: '', icons: [] };
      t.banner.icons = t.banner.icons || [];
      t.pacotes = t.pacotes || [];
      t.items = t.items || [];
      // Auto-seed ECOSSISTEMA FLY → ESTRUTURA CORPORATIVA on first access
      if (yearKey === 'ECOSSISTEMA FLY' && topicKey === 'ESTRUTURA CORPORATIVA' && t.items.length === 0) {
        t.banner.title = 'ESTRUTURA CORPORATIVA';
        t.items = ESTRUTURA_CORP_SEED.map(seed => {
          const item = defaultItemShape(seed.name);
          item.descricao = seed.descricao || '';
          item.inclui = seed.inclui || [];
          item.responsavel = seed.responsavel || '';
          item.subitens = (seed.subitens || []).map(s => ({
            id: genId(),
            name: s.name || '',
            descricao: s.descricao || '',
            responsavel: s.responsavel || '',
            responsabilidades: s.responsabilidades || []
          }));
          return item;
        });
        saveData();
      }
      // Auto-seed ECOSSISTEMA FLY → PROJETOS on first access
      if (yearKey === 'ECOSSISTEMA FLY' && topicKey === 'PROJETOS' && t.items.length === 0) {
        t.banner.title = 'PROJETOS';
        t.items = PROJETOS_SEED.map(seed => {
          const item = defaultItemShape(seed.name);
          item.categoria = seed.categoria || '';
          item.folder    = seed.folder    || '';
          item.descricao = seed.descricao || '';
          return item;
        });
        saveData();
      }
      // Auto-seed ECOSSISTEMA FLY → PRODUTOS on first access
      if (yearKey === 'ECOSSISTEMA FLY' && topicKey === 'PRODUTOS' && t.items.length === 0) {
        t.banner.title = 'PRODUTOS';
        t.banner.icons = [
          { label: 'ATRAÇÕES',    image: '' },
          { label: 'HOSPEDAGEM',  image: '' },
          { label: 'ALIMENTAÇÃO', image: '' },
          { label: 'TRANSPORTES', image: '' }
        ];
        t.items = PRODUTOS_SEED.map(seed => {
          const item = defaultItemShape(seed.name);
          item.categoria = seed.categoria || '';
          item.descricao = seed.descricao || '';
          return item;
        });
        saveData();
      }
      return t;
    }

    function getPeriodId(year) {
      return year?.label === 'FLY' ? 'fly' : String(year?.label || '').toLowerCase();
    }

    function handleCircleClick(id) {
      if (document.body.classList.contains('admin-mode')) return;

      const targetId = String(id || '').toLowerCase();
      const idx = years.findIndex((year) => getPeriodId(year) === targetId);
      if (idx < 0) return;

      returnTo3DDetail = false;
      window.__flyTimelineLanding?.setActive?.(false);
      showDetail(idx);
    }
    window.handleCircleClick = handleCircleClick;

    function setCurrentYearFrom3D(id) {
      const targetId = String(id || '').toLowerCase();
      const idx = years.findIndex((year) => getPeriodId(year) === targetId);
      if (idx >= 0) currentYear = years[idx];
      return idx;
    }

    const fly3DTopicMap = {
      estrutura: 'ESTRUTURA CORPORATIVA',
      produtos: 'PRODUTOS',
      sustentabilidade: 'SUSTENTABILIDADE',
      marketing: 'MARKETING',
      projetos: 'PROJETOS',
      parceiros: 'PARCEIROS ESTRATEGICOS',
      rede: 'REDE COMERCIAL'
    };

    function openTopicFrom3D(topicId, earthId) {
      setCurrentYearFrom3D(earthId);
      const topicKey = fly3DTopicMap[topicId];
      const topic = topics.find((entry) => entry.key === topicKey);
      if (!topic || !currentYear) return;

      currentFolder = null;
      returnTo3DDetail = true;
      window.__flyTimelineLanding?.setActive?.(false);
      showTopic(topic);
    }

    years.forEach((y, i) => {
      const c = document.createElement('div');
      c.className = 'grid-circle' + (i === 0 ? ' gold' : '');
      // First (golden) circle = FLY logo (black) inside; others stay as text label
      if (i === 0 && y.label === 'FLY') {
        c.innerHTML = '<img class="grid-fly-logo" src="assets/fly-logo-black.svg" alt="FLY">';
        const flyImg = c.querySelector('.grid-fly-logo');
        FlyDesign.bindEditable(flyImg, 'home.circleLogo', { type: 'image', label: 'Logo do círculo dourado' });
      } else {
        c.textContent = y.label;
        FlyDesign.bindEditable(c, `home.year_${y.label}`, { type: 'text', label: `Círculo "${y.label}"` });
      }
      c.addEventListener('click', () => {
        // Em modo admin, clique abre editor (handled em FlyDesign.bindEditable);
        // se não admin, navega normalmente
        handleCircleClick(getPeriodId(y));
      });
      gridRow.appendChild(c);
    });

    function initFlyTimelineLanding() {
      const mount = document.getElementById('flyTimelineLandingMount');
      if (!mount || !window.FlyTimelineLanding?.create || window.__flyTimelineLanding) return;

      try {
        window.__flyTimelineLanding = window.FlyTimelineLanding.create(mount, {
          selectionMode: 'detail',
          overviewZoom: 0.72,
          labelScale: 1.32,
          onFocusPeriod: ({ id }) => {
            setCurrentYearFrom3D(id);
          },
          onSelectTopic: ({ topicId, earth }) => {
            openTopicFrom3D(topicId, earth?.id);
          },
          onOverview: () => {
            if (currentView === 'grid') currentYear = null;
          }
        });
        gridView.classList.add('has-3d-landing');
      } catch (error) {
        console.warn('Landing 3D indisponivel. Mantendo a tela inicial padrao.', error);
        gridView.classList.remove('has-3d-landing');
      }

          t.status = destination || strategic ? 'dominated' : 'active';

            if (key === 'ltv') return [key, value ? Math.round(value * 1.35) : value];
            return [key, Math.round(Number(value || 0) * multiplier)];
          }));
          return t;
        });

      function getWarMapPoint(territory) {
        if (!territory) return [WAR_MAP_WIDTH / 2, WAR_MAP_HEIGHT / 2];
        const [lat, lon] = territory.coordinates || [0, 0];
        const [dx, dy] = territory.mapOffset || [0, 0];
        return [
          ((lon + 180) / 360) * WAR_MAP_WIDTH + dx,
          ((90 - lat) / 180) * WAR_MAP_HEIGHT + dy
        ];
      }

      function yearFromDate(date) {
        return Number(String(date || '').slice(0, 4)) || 2025;
      }

      function monthFromDate(date) {
        return Number(String(date || '').slice(5, 7)) || 1;
      }

      function periodIndex(date) {
        const year = yearFromDate(date);
        const month = monthFromDate(date);
        return (year * 12) + month;
      }

      function activePeriodIndex() {
        return (activeYear * 12) + activeMonth;
      }

      function isAvailableAtActivePeriod(item) {
        return periodIndex(item.startDate) <= activePeriodIndex();
      }

      function visibleTerritories() {
        return territories.filter(territory => isAvailableAtActivePeriod(territory) && layerMatches(territory));
      }

      function visibleFlows() {
        return flows.filter(flow => isAvailableAtActivePeriod(flow));
      }

      function layerMatches(territory) {
        const haystack = [...territory.products, ...territory.projects, territory.role].join(' ').toLowerCase();
        if (activeLayer === 'overview') return true;
        if (activeLayer === 'packages') return haystack.includes('dubai') || haystack.includes('family') || haystack.includes('billionaire') || haystack.includes('premium');
        if (activeLayer === 'flycup') return haystack.includes('fly cup');
        if (activeLayer === 'tourism') return territory.role === 'destination' || haystack.includes('dubai') || haystack.includes('paris') || haystack.includes('maldivas');
        if (activeLayer === 'events') return haystack.includes('reality') || haystack.includes('festival') || haystack.includes('copa') || haystack.includes('event');
        if (activeLayer === 'bases') return territory.role === 'base' || haystack.includes('base');
        if (activeLayer === 'partners') return territory.role === 'partner' || haystack.includes('parceiro') || haystack.includes('hotel') || haystack.includes('fornecedor');
        if (activeLayer === 'finance') return Boolean(territory.metrics.revenue || territory.metrics.profit);
        return true;
      }

      function formatCompact(value) {
        const n = Number(value) || 0;
        if (Math.abs(n) >= 1000000) return (n / 1000000).toFixed(n >= 10000000 ? 0 : 1).replace('.0', '') + 'M';
        if (Math.abs(n) >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace('.0', '') + 'k';
        return String(n);
      }

      function formatMoney(value) {
        const n = Number(value) || 0;
        if (n >= 1000000) return 'R$ ' + (n / 1000000).toFixed(1).replace('.', ',') + 'M';
        if (n >= 1000) return 'R$ ' + Math.round(n / 1000) + 'k';
        return 'R$ ' + n.toLocaleString('pt-BR');
      }

      function flowPath(flow) {
        const from = territoryById(flow.fromTerritoryId);
        const to = territoryById(flow.toTerritoryId);
        if (!from || !to) return '';
        const [x1, y1] = getWarMapPoint(from);
        const [x2, y2] = getWarMapPoint(to);
        const lift = Math.max(68, Math.abs(x2 - x1) * 0.18);
        const cx = (x1 + x2) / 2;
        const cy = Math.min(y1, y2) - lift;
        const className = `war-flow war-flow--${flow.metricType} war-flow--${flow.status} ${flow.id === activeConnectionId ? 'active' : ''}`;
        return `<path class="${className}" data-war-connection="${escapeHtml(flow.id)}" onclick="event.stopPropagation();window.__flyWarSelectConnection && window.__flyWarSelectConnection('${escapeHtml(flow.id)}')" d="M ${x1} ${y1} Q ${cx} ${cy} ${x2} ${y2}" />`;
      }

      function monthValueToDate(value) {
        return value ? `${value}-01` : `${activeYear}-${String(activeMonth).padStart(2, '0')}-01`;

      function slugifyWar(value) {
        return String(value || 'territorio')
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-|-$/g, '') || ('territorio-' + Date.now());
      }

      function parseWarList(value) {
        return String(value || '')
          .split(',')
          .map(item => item.trim())
          .filter(Boolean);
      }

      function clampWarPoint(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function getClickMapCoordinates(event) {
        const inner = event.target.closest('.war-map-inner') || mapStage.querySelector('.war-map-inner');
        if (!inner) return { x: WAR_MAP_WIDTH / 2, y: WAR_MAP_HEIGHT / 2, lat: 0, lon: 0 };
        const rect = inner.getBoundingClientRect();
        const x = clampWarPoint(((event.clientX - rect.left) / rect.width) * WAR_MAP_WIDTH, 0, WAR_MAP_WIDTH);
        const y = clampWarPoint(((event.clientY - rect.top) / rect.height) * WAR_MAP_HEIGHT, 0, WAR_MAP_HEIGHT);
        const lon = ((x / WAR_MAP_WIDTH) * 360) - 180;
        const lat = 90 - ((y / WAR_MAP_HEIGHT) * 180);
        return { x, y, lat, lon };
      }

      function closeWarEditor() {
        editorOverlay.classList.add('hidden');
        editorOverlay.innerHTML = '';
      }

      function removeWarTerritory(territoryId) {
        const territory = territoryById(territoryId);
        if (!territory) return;
        if (!document.body.classList.contains('admin-mode')) {
          alert('Ative ADMIN para excluir pontos do Plano WAR.');
          return;
        }
        if (!confirm(`Excluir "${territory.name}" do Plano WAR?\n\nAs conexões ligadas a esse ponto também serão removidas.`)) return;
        territories = territories.filter(item => item.id !== territoryId);
        flows = flows.filter(flow => flow.fromTerritoryId !== territoryId && flow.toTerritoryId !== territoryId);
        activeTerritoryId = null;
        activeConnectionId = null;
        saveWarData();
        renderWarPlan();
      }

      window.__flyWarSelectTerritory = (territoryId) => {
        if (overlay.classList.contains('hidden')) return;
        activeTerritoryId = territoryId;
        activeConnectionId = null;
        renderWarPlan();
      };

      window.__flyWarSelectConnection = (connectionId) => {
        if (overlay.classList.contains('hidden')) return;
        activeConnectionId = connectionId;
        activeTerritoryId = null;
        renderWarPlan();
      };

      function saveWarEditor(form) {
        const data = new FormData(form);
        const name = String(data.get('name') || '').trim();
        if (!name) return;
        const idBase = slugifyWar(name);
        let id = idBase;
        let suffix = 2;
        while (territoryById(id)) {
          id = `${idBase}-${suffix++}`;
        }
        const startDate = monthValueToDate(data.get('startDate'));
        const targetDate = monthValueToDate(data.get('targetDate'));
        const territory = normalizeWarTerritory({
          id,
          name,
          type: 'city',
          coordinates: [Number(data.get('lat')), Number(data.get('lon'))],
          status: data.get('status'),
          role: data.get('role'),
          country: data.get('country'),
          state: data.get('state'),
          city: data.get('city') || name,
          startDate,
          targetDate,
          period: `${months[monthFromDate(startDate) - 1]} ${yearFromDate(startDate)} — ${months[monthFromDate(targetDate) - 1]} ${yearFromDate(targetDate)}`,
          responsible: data.get('responsible') || 'A definir',
          leadersQuantity: data.get('leadersQuantity'),
          basesQuantity: data.get('basesQuantity'),
          hasBase: Number(data.get('basesQuantity')) > 0,
          baseType: data.get('baseType'),
          destinationLinks: parseWarList(data.get('destinationLinks')),
          projects: parseWarList(data.get('projects')),
          products: parseWarList(data.get('products')),
          metrics: {
            leads: data.get('leads'),
            subscribers: data.get('subscribers'),
            packagesSold: data.get('packagesSold'),
            revenue: data.get('revenue'),
            profit: data.get('profit'),
            events: data.get('events'),
            influencers: data.get('influencers'),
            partnerCompanies: data.get('partnerCompanies'),
            bases: data.get('basesQuantity'),
            cac: data.get('cac'),
            ltv: data.get('ltv')
          },
          nextActions: parseWarList(data.get('nextActions')),
          notes: data.get('notes'),
          internal: { topicKey: 'PROJETOS' }
        });
        territories = [...territories, territory];
        saveWarData();
        activeTerritoryId = territory.id;
        activeConnectionId = null;
        closeWarEditor();
        renderWarPlan();
      }

      function renderWarPlan() {
        renderWarControls();
        renderKpis();
        renderLayers();
        renderTimeline();
        renderMap();
        renderSidePanel();
        renderDashboard();
      }

      function openWarPlan() {
        activeTerritoryId = null;
        activeConnectionId = null;
        reloadWarData();
        warOpenGuard = true;
        overlay.classList.remove('hidden');
        overlay.setAttribute('aria-hidden', 'false');
        document.body.classList.add('war-plan-open');
        window.__flyTimelineLanding?.setActive?.(false);
        renderWarPlan();
        window.setTimeout(() => {
          warOpenGuard = false;
          activeTerritoryId = null;
          activeConnectionId = null;
          renderMap();
          renderSidePanel();
        }, 220);
      }

      function closeWarPlan() {
        overlay.classList.add('hidden');
        overlay.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('war-plan-open');
        activeTerritoryId = null;
        activeConnectionId = null;
        warAddMode = false;
        closeWarEditor();
        if (currentView === 'grid') window.__flyTimelineLanding?.setActive?.(true);
      }

      function openInternalFromTerritory(territoryId) {
        const territory = territoryById(territoryId);
        if (!territory?.internal) return;
        closeWarPlan();
        currentYear = years[0];
        currentFolder = null;
        returnTo3DDetail = false;
        const topic = topics.find(entry => entry.key === territory.internal.topicKey);
        if (!topic) return;
        const topicData = getTopic(currentYear.ano, topic.key);
        if (territory.internal.itemName) {
          const idx = topicData.items.findIndex(item => (item.name || '').toUpperCase() === territory.internal.itemName.toUpperCase());
          if (idx >= 0) {
            showItem(topicData, 'item', idx);
            return;
          }
        }
        currentFolder = territory.internal.folder || null;
        showTopic(topic);
      }

      function cycleWarMode() {
        const cur = currentWarDataMode();
        const next = cur === 'demo' ? 'operational' : cur === 'operational' ? 'goal' : 'demo';
        if (typeof setDataMode === 'function') setDataMode(next);
        else {
          localStorage.setItem('fly_data_mode', next);
          window.dispatchEvent(new CustomEvent('fly:data-mode-change', { detail: { mode: next } }));
        }
      }

      function toggleWarAddMode() {
        if (!document.body.classList.contains('admin-mode')) {
          warAddMode = false;
          renderWarControls();
          alert('Ative ADMIN para adicionar pontos no Plano WAR.');
          return;
        }
        warAddMode = !warAddMode;
        activeTerritoryId = null;
        activeConnectionId = null;
        renderWarPlan();
      }

      window.__flyWarCycleMode = () => {
        if (overlay.classList.contains('hidden')) return;
        cycleWarMode();
      };
      window.__flyWarToggleAddMode = () => {
        if (overlay.classList.contains('hidden')) return;
        toggleWarAddMode();
      };
      window.__flyWarDeleteSelected = () => {
        if (overlay.classList.contains('hidden') || !activeTerritoryId) return;
        removeWarTerritory(activeTerritoryId);
      };
      window.__flyWarDeleteTerritory = (territoryId) => {
        if (overlay.classList.contains('hidden')) return;
        removeWarTerritory(territoryId);
      };

      trigger.addEventListener('click', (event) => {
        event.stopPropagation();
        openWarPlan();
      });

      closeBtn.addEventListener('click', closeWarPlan);
      overlay.querySelector('[data-war-mode-toggle]')?.addEventListener('click', (event) => {
        event.stopPropagation();
        cycleWarMode();
      });
      overlay.querySelector('[data-war-add-toggle]')?.addEventListener('click', (event) => {
        event.stopPropagation();
        toggleWarAddMode();
      });
      overlay.querySelector('[data-war-delete-selected]')?.addEventListener('click', (event) => {
        event.stopPropagation();
        if (activeTerritoryId) removeWarTerritory(activeTerritoryId);
      });
      try {
        new MutationObserver(() => {
          if (!overlay.classList.contains('hidden')) renderWarControls();
        }).observe(document.body, { attributes: true, attributeFilter: ['class'] });
      } catch (error) {}
      window.addEventListener('fly:data-mode-change', () => {
        if (overlay.classList.contains('hidden')) return;
        reloadWarData();
        activeTerritoryId = null;
        activeConnectionId = null;
        renderWarPlan();
      });
      editorOverlay.addEventListener('click', (event) => {
        if (event.target === editorOverlay || event.target.closest('[data-war-editor-close]')) {
          closeWarEditor();
        }
      });
      editorOverlay.addEventListener('submit', (event) => {
        if (event.target?.id === 'warEditorForm') {
          event.preventDefault();
          saveWarEditor(event.target);
        }
      });
      overlay.addEventListener('click', (event) => {
        if (warOpenGuard) {
          const guardedMapClick = event.target.closest('.war-map-inner') || event.target.closest('[data-war-territory]') || event.target.closest('[data-war-connection]');
          if (guardedMapClick) {
            event.stopPropagation();
            return;
          }
          warOpenGuard = false;
        }
        if (event.target.closest('[data-war-close-panel]')) {
          activeTerritoryId = null;
          activeConnectionId = null;
          renderMap();
          renderSidePanel();
          renderWarControls();
          return;
        }
        if (event.target.closest('[data-war-mode-toggle]')) {
          cycleWarMode();
          return;
        }
        if (event.target.closest('[data-war-add-toggle]')) {
          toggleWarAddMode();
          return;
        }
        const deleteTerritory = event.target.closest('[data-war-delete-territory]')?.dataset.warDeleteTerritory;
        if (deleteTerritory) {
          removeWarTerritory(deleteTerritory);
          return;
        }
        if (event.target.closest('[data-war-delete-selected]')) {
          if (activeTerritoryId) removeWarTerritory(activeTerritoryId);
          return;
        }
        const layer = event.target.closest('[data-war-layer]')?.dataset.warLayer;
        if (layer) {
          activeLayer = layer;
          renderWarPlan();
          return;
        }
        const territory = event.target.closest('[data-war-territory]')?.dataset.warTerritory;
        if (territory) {
          activeTerritoryId = territory;
          activeConnectionId = null;
          warAddMode = false;
          renderWarPlan();
          return;
        }
        const connection = event.target.closest('[data-war-connection]')?.dataset.warConnection;
        if (connection) {
          activeConnectionId = connection;
          activeTerritoryId = null;
          renderWarPlan();
          return;
        }
        const year = event.target.closest('[data-war-year]')?.dataset.warYear;
        if (year) {
          activeYear = Number(year);
          renderWarPlan();
          return;
        }
        const month = event.target.closest('[data-war-month]')?.dataset.warMonth;
        if (month) {
          activeMonth = Number(month);
          renderWarPlan();
          return;
        }
        const zoomAction = event.target.closest('[data-war-zoom]')?.dataset.warZoom;
        if (zoomAction) {
          mapZoom = Math.max(0.82, Math.min(1.55, mapZoom + (zoomAction === 'in' ? 0.12 : -0.12)));
          renderMap();
          return;
        }
        const internalId = event.target.closest('[data-war-open-internal]')?.dataset.warOpenInternal;
        if (internalId) {
          openInternalFromTerritory(internalId);
          return;
        }
        const dashboardTab = event.target.closest('[data-war-dashboard]')?.dataset.warDashboard;
        if (dashboardTab) {
          activeDashboardTab = dashboardTab;
          renderDashboard();
          return;
        }
        const mapClick = event.target.closest('.war-map-inner');
        if (mapClick && warAddMode && document.body.classList.contains('admin-mode') && !event.target.closest('.war-pin') && !event.target.closest('[data-war-connection]')) {
          openWarEditor(getClickMapCoordinates(event));
          return;
        }
      });

      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !overlay.classList.contains('hidden')) closeWarPlan();
      });
    }
    initWarPlan();

    function getViewMode() {
      const saved = localStorage.getItem('fly_view_mode');
      if (saved === 'desktop' || saved === 'mobile') return saved;
      return window.matchMedia('(max-width: 640px)').matches ? 'mobile' : 'desktop';
    }
    function setViewMode(mode) {
      if (mode !== 'desktop' && mode !== 'mobile') return;
      localStorage.setItem('fly_view_mode', mode);
      applyViewMode();
      // Re-render current view to apply layout changes
      if (currentView === 'detail' && currentYear) {
        const idx = years.indexOf(currentYear);
        if (idx >= 0) showDetail(idx);
      }
    }
    function applyViewMode() {
      const saved = localStorage.getItem('fly_view_mode');
      const mode = getViewMode();
      // SÓ força body class se usuário escolheu manualmente
      // (caso contrário deixa o auto-detect via @container responder ao viewport real)
      document.body.classList.toggle('force-mobile', saved === 'mobile');
      document.body.classList.toggle('force-desktop', saved === 'desktop');
      // Atualizar botão visual
      const btn = document.getElementById('viewModeToggle');
      if (btn) {
        btn.dataset.mode = mode;
        btn.title = (mode === 'mobile') ? 'Mudar para Desktop' : 'Mudar para Mobile';
        btn.querySelector('.vm-ico').textContent = (mode === 'mobile') ? '📱' : '🖥';
        btn.querySelector('.vm-lbl').textContent = (mode === 'mobile') ? 'MOBILE' : 'DESKTOP';
      }
    }
    function isMobileView() { return getViewMode() === 'mobile'; }

    function showDetail(idx) {
      currentYear = years[idx];
      currentView = 'detail';
      const y = currentYear;
      stage.innerHTML = '';

      const halo = document.createElement('div');
      halo.className = 'halo';
      stage.appendChild(halo);

      const ring = document.createElement('div');
      ring.className = 'ring';
      stage.appendChild(ring);

      const mark = document.createElement('div');
      mark.className = 'top-mark';
      mark.innerHTML = '<span>A FLY</span><span class="gold-text">COMPANY ✈</span>';
      stage.appendChild(mark);
      FlyDesign.bindEditable(mark, 'detail.topMark', { type: 'text', label: 'Marca "A FLY COMPANY ✈"' });

      const cc = document.createElement('div');
      cc.className = 'center-circle';
      if (y.label === 'FLY') {
        cc.innerHTML = '<div class="glyph"><img class="center-fly-logo" src="assets/fly-logo-white.svg" alt="FLY"></div>';
      } else {
        cc.innerHTML = '<div class="glyph">' + y.label + '</div>';
      }
      stage.appendChild(cc);
      // Logo central editável
      const centerLogo = cc.querySelector('.center-fly-logo');
      if (centerLogo) FlyDesign.bindEditable(centerLogo, 'detail.centerLogo', { type: 'image', label: 'Logo FLY central' });
      const centerGlyph = cc.querySelector('.glyph');
      if (centerGlyph && !centerLogo) FlyDesign.bindEditable(centerGlyph, `detail.centerGlyph_${y.label}`, { type: 'text', label: `Texto central "${y.label}"` });

      const ct = document.createElement('div');
      ct.className = 'center-text';
      const anoClass = y.ano.length > 8 ? 'ano long' : 'ano';
      ct.innerHTML = '<div class="' + anoClass + '">' + y.ano + '</div><div class="period">' + y.period + '</div>';
      stage.appendChild(ct);
      const anoEl = ct.querySelector('.ano');
      if (anoEl) FlyDesign.bindEditable(anoEl, `detail.title_${y.label}`, { type: 'text', label: `Título "${y.ano}"` });
      const periodEl = ct.querySelector('.period');
      if (periodEl) FlyDesign.bindEditable(periodEl, `detail.period_${y.label}`, { type: 'text', label: `Período "${y.period}"` });

      // Em mobile, distanciamos os labels (labelR maior) para caberem
      const ringR  = 35;
      const labelR = isMobileView() ? 62 : 42;

      topics.forEach(t => {
        const rad = t.angle * Math.PI / 180;
        const cos = Math.cos(rad);
        const sin = Math.sin(rad);

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.left = (50 + ringR * cos) + '%';
        dot.style.top  = (50 + ringR * sin) + '%';
        stage.appendChild(dot);

        const lineLen = labelR - ringR;
        if (lineLen > 0) {
          const line = document.createElement('div');
          line.className = 'topic-link';
          line.style.left = (50 + ringR * cos) + '%';
          line.style.top  = (50 + ringR * sin) + '%';
          line.style.width = lineLen + '%';
          line.style.transform = 'rotate(' + rad + 'rad)';
          stage.appendChild(line);
        }

        const lbl = document.createElement('div');
        lbl.className = 'topic';
        lbl.innerHTML = t.name;
        lbl.style.left = (50 + labelR * cos) + '%';
        lbl.style.top  = (50 + labelR * sin) + '%';
        lbl.addEventListener('click', () => {
          // Em admin-mode o click abre editor (handled via FlyDesign)
          if (document.body.classList.contains('admin-mode')) return;
          currentFolder = null; selectMode = false; selectedIds.clear();
          document.body.classList.remove('select-mode');
          showTopic(t);
        });
        FlyDesign.bindEditable(lbl, `detail.topic_${t.key}`, { type: 'text', label: `Tópico "${t.name}"` });

        if (cos > 0.3) {
          lbl.style.transform = 'translate(0, -50%)';
          lbl.style.textAlign = 'left';
          lbl.style.paddingLeft = '10px';
        } else if (cos < -0.3) {
          lbl.style.transform = 'translate(-100%, -50%)';
          lbl.style.textAlign = 'right';
          lbl.style.paddingRight = '10px';
        } else {
          lbl.style.textAlign = 'center';
          if (sin > 0) lbl.style.transform = 'translate(-50%, 8px)';
          else         lbl.style.transform = 'translate(-50%, calc(-100% - 8px))';
        }
        stage.appendChild(lbl);
      });

      switchTo('detail');
    }

    function getHierData(t) {
      // 3 MODOS: hier (demo) / hier_operational (vazio) / hier_goal (full crescido)
      const mode = (typeof getDataMode === 'function') ? getDataMode() : 'demo';

      // Sempre garante o demo populado (usado como base pra goal)
      if (!t._hierDemo) {
        t._hierDemo = {
          '2026': HIER_SEED['2026'].map(e => ({...e})),
          '2027': null, '2028': null
        };
      }
      // Lazy expand do demo
      if (!t._hierDemo['2027']) t._hierDemo['2027'] = expandHierYear(38, HIER_SEED['2026'].map(e => ({...e})), 'h27');
      if (!t._hierDemo['2028']) t._hierDemo['2028'] = expandHierYear(90, t._hierDemo['2027'].map(e => ({...e})), 'h28');

      if (mode === 'demo') {
        t.hier = t._hierDemo;
      } else if (mode === 'operational') {
        if (!t._hierOperational) {
          t._hierOperational = { '2026': [], '2027': [], '2028': [] };
        }
        t.hier = t._hierOperational;
      } else if (mode === 'goal') {
        if (!t._hierGoal) {
          // Modo META: organograma já cumprido em 100% (cópia do demo, mas todos como 'ativo' e cargos preenchidos)
          t._hierGoal = JSON.parse(JSON.stringify(t._hierDemo));
          for (const yr of Object.keys(t._hierGoal)) {
            (t._hierGoal[yr] || []).forEach(e => { e.status = 'ativo'; });
          }
        }
        t.hier = t._hierGoal;
      }

      if (!t.hierYear) t.hierYear = '2026';
      if (!t.hierTab)  t.hierTab  = 'organograma';
      try { saveData(); } catch (e) {}
      return t;
    }

      const custom = loadCustomCities();
      const merged = {};
      for (const k of Object.keys(COUNTRIES_DEFAULT)) {
        merged[k] = {
          flag: COUNTRIES_DEFAULT[k].flag,
          cities: [...COUNTRIES_DEFAULT[k].cities]
        };
      }
      for (const k of Object.keys(custom)) {
        if (!merged[k]) merged[k] = { flag: custom[k].flag || '🌍', cities: [] };
        for (const city of (custom[k].cities || [])) {
          if (!merged[k].cities.includes(city)) merged[k].cities.push(city);
        }
      }
      return merged;
    }

      const custom = loadCustomCities();
      if (!custom[country]) custom[country] = { flag: flag || '🌍', cities: [] };

      // ============================================================
      // BASES FLY · INLINE EDITING (todos os textos/valores editáveis)
      // ============================================================
      const BASES_INLINE_KEY = 'fly_basesfly_inline_v1';
      const inlineEdits = (() => {
        try { return JSON.parse(localStorage.getItem(flyModeKey(BASES_INLINE_KEY)) || '{}'); } catch (e) { return {}; }
      })();
      // Em modo NORMAL: apaga todos os defaults inline editáveis (deixa vazio)
      // Em modo META: usa textos padrão fortalecidos (já vêm do HTML, então só clear se for goal precisar)
      function persistInline() {
        try { localStorage.setItem(flyModeKey(BASES_INLINE_KEY), JSON.stringify(inlineEdits)); } catch (e) {}
      }
      // Marca cada elemento com um ID único e torna editável
      const editTargets = wrap.querySelectorAll(
        '.cost-row .val, .cost-row .lbl, .cost-card h3, .cost-card h3 small, ' +
        '.cost-staff .head, .cost-staff .level .num, .cost-staff .level .lbl, ' +
        '.team-total .num, .team-total .lbl, .team-row .info .name, .team-row .info .desc, ' +
        '.ops-card h3, .ops-list li, ' +
        '.scale-item .name, .scale-item .desc'
      );
      editTargets.forEach((el, idx) => {
        const key = 'bases_inline_' + idx;
        // Restaurar valor salvo
        if (inlineEdits[key] !== undefined) {
          el.innerHTML = inlineEdits[key];
        }
        el.setAttribute('data-inline-key', key);
        el.setAttribute('contenteditable', 'plaintext-only');
        el.classList.add('bases-inline-editable');
        el.addEventListener('blur', () => {
          inlineEdits[key] = el.innerText.trim();
          persistInline();

        // Não navegar quando clica em um campo editável
        el.addEventListener('click', (e) => e.stopPropagation());

      // ============================================================
      // SISTEMA DE MAPA · imagem PNG + zoom + pan + pins customizados
      // ============================================================
      let pins = loadPins();         // [{ x, y, name, photo }]  x,y normalizados (0..1)
      let addPinMode = true;
      const view = { scale: 1, tx: 0, ty: 0, min: 0.4, max: 6 };
      const viewport = wrap.querySelector('#map-viewport');
      const canvas   = wrap.querySelector('#map-canvas');
      const pinLayer = wrap.querySelector('#dubai-pin-layer');
      const photo    = wrap.querySelector('#map-photo');
      const zoomLevelEl = wrap.querySelector('#zoom-level');

      // Inicializar transform após carregar imagem (centrar e enquadrar)
      function fitImage() {
        const vw = viewport.clientWidth, vh = viewport.clientHeight;
        if (!photo.naturalWidth || !vw) return;
        const sx = vw / photo.naturalWidth;
        const sy = vh / photo.naturalHeight;
        view.scale = Math.min(sx, sy) * 0.98;
        view.tx = (vw - photo.naturalWidth  * view.scale) / 2;
        view.ty = (vh - photo.naturalHeight * view.scale) / 2;
        applyTransform();
      }
      function applyTransform() {
        canvas.style.transform = `translate3d(${view.tx}px, ${view.ty}px, 0) scale(${view.scale})`;
        if (zoomLevelEl) zoomLevelEl.textContent = Math.round(view.scale * 100) + '%';
        positionPins();
      }
      function positionPins() {
        // Pins ficam em tamanho fixo (não escalam), só a posição segue a imagem
        const els = pinLayer.querySelectorAll('.fly-pin');
        const W = photo.naturalWidth || 1, H = photo.naturalHeight || 1;
        els.forEach((el, i) => {
          const p = pins[i];
          if (!p) return;
          const px = p.x * W * view.scale + view.tx;
          const py = p.y * H * view.scale + view.ty;
          el.style.left = px + 'px';
          el.style.top  = py + 'px';
        });
      }

      function refreshAddBtn() {
        const btn = wrap.querySelector('#pin-add-btn');
        if (!btn) return;
        btn.dataset.active = addPinMode ? 'true' : 'false';
        btn.querySelector('.lbl').textContent = addPinMode ? 'Modo: Adicionar' : 'Adicionar Pin';
      }
      refreshAddBtn();

      function renderPins() {
        pinLayer.innerHTML = '';
        pins.forEach((p, idx) => {
          const el = document.createElement('div');
          el.className = 'fly-pin';
          el.dataset.idx = idx;
          const photoBlock = p.photo
            ? `<div class="fly-pin-tooltip-photo"><img src="${p.photo}" alt=""></div>`
            : `<div class="fly-pin-tooltip-photo no-photo">📍</div>`;
          const locLine = (p.cidade || p.pais)
            ? `<div class="fly-pin-tooltip-loc">${escapeHtml(p.cidade || '')}${(p.cidade && p.pais) ? ' · ' : ''}${escapeHtml(p.pais || '')}</div>`
            : '';
          el.innerHTML = `
            <div class="fly-pin-marker">
              <div class="fly-pin-glow"></div>
              <div class="fly-pin-dot"></div>

              ${photoBlock}

                <div class="fly-pin-tooltip-name">${escapeHtml(p.name || 'Base FLY')}</div>
                ${locLine}
              </div>
            </div>
          `;
          // Click no pin → abrir card detalhado (com foto)
          el.addEventListener('click', (ev) => {
            ev.stopPropagation();
            ev.preventDefault();
            openPinCard(idx);
          });
          // Hover sincroniza highlight com a sidebar
          el.addEventListener('mouseenter', () => {
            const row = wrap.querySelector(`.sidebar-pin-row[data-idx="${idx}"]`);
            if (row) row.classList.add('hover');
          });
          el.addEventListener('mouseleave', () => {
            wrap.querySelectorAll('.sidebar-pin-row.hover').forEach(r => r.classList.remove('hover'));
          });
          // Impedir que mousedown no pin inicie pan
          el.addEventListener('mousedown', (ev) => ev.stopPropagation());
          pinLayer.appendChild(el);
        });
        positionPins();
      }

      // ---------- SIDEBAR DINÂMICA AGRUPADA POR PAÍS ----------
      const collapsedCountries = new Set();
      function renderSidebar() {
        const sidebar = wrap.querySelector('#bases-sidebar');
        const groupsEl = wrap.querySelector('#sidebar-groups');
        const emptyEl  = wrap.querySelector('#sidebar-empty');
        if (!groupsEl) return;
        if (!pins.length) {
          groupsEl.innerHTML = '';
          emptyEl.classList.remove('hidden');
          return;
        }
        emptyEl.classList.add('hidden');

        // Agrupa pins por país (mantendo ordem de criação)
        const byCountry = {};
        const orderedCountries = [];
        pins.forEach((p, idx) => {
          const key = p.pais || 'Sem país';
          if (!byCountry[key]) { byCountry[key] = []; orderedCountries.push(key); }
          byCountry[key].push({ pin: p, idx });
        });

        const countriesMap = getCountriesMap();
        groupsEl.innerHTML = orderedCountries.map(country => {
          const flag = (countriesMap[country] && countriesMap[country].flag) || '🌍';
          const items = byCountry[country];
          const collapsed = collapsedCountries.has(country);
          return `
            <div class="sidebar-country" data-country="${escapeHtml(country)}">
              <div class="sidebar-country-head ${collapsed ? 'collapsed' : ''}">
                <span class="sidebar-country-arrow">▾</span>
                <span class="sidebar-country-flag">${flag}</span>
                <span class="sidebar-country-name">${escapeHtml(country)}</span>
                <span class="sidebar-country-count">(${items.length})</span>
              </div>
              <div class="sidebar-country-list ${collapsed ? 'hidden' : ''}">
                ${items.map(({ pin, idx }) => `
                  <div class="sidebar-pin-row" data-idx="${idx}">
                    <div class="sidebar-pin-thumb">${pin.photo
                      ? `<img src="${pin.photo}" alt="">`
                      : `<div class="thumb-empty">📍</div>`}</div>
                    <div class="sidebar-pin-info">
                      <div class="sidebar-pin-name">${escapeHtml(pin.name || 'Base')}</div>
                      <div class="sidebar-pin-city">${escapeHtml(pin.cidade || '—')}</div>
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          `;
        }).join('');

        // Click no country head → toggle collapse
        groupsEl.querySelectorAll('.sidebar-country-head').forEach(head => {
          head.addEventListener('click', () => {
            const country = head.parentElement.dataset.country;
            if (collapsedCountries.has(country)) collapsedCountries.delete(country);
            else collapsedCountries.add(country);
            renderSidebar();
          });
        });
        // Click no pin row → centraliza no mapa + glow
        groupsEl.querySelectorAll('.sidebar-pin-row').forEach(row => {
          const idx = parseInt(row.dataset.idx, 10);
          row.addEventListener('click', () => {
            setActivePin(idx);
            centerPin(idx);
          });
          row.addEventListener('mouseenter', () => {
            const pinEl = pinLayer.querySelector(`.fly-pin[data-idx="${idx}"]`);
            if (pinEl) pinEl.classList.add('hover-from-list');
          });
          row.addEventListener('mouseleave', () => {
            pinLayer.querySelectorAll('.fly-pin.hover-from-list').forEach(p => p.classList.remove('hover-from-list'));
          });
        });
      }

      function setActivePin(idx) {
        pinLayer.querySelectorAll('.fly-pin.active').forEach(el => el.classList.remove('active'));
        wrap.querySelectorAll('.sidebar-pin-row.active').forEach(el => el.classList.remove('active'));
        const pinEl = pinLayer.querySelector(`.fly-pin[data-idx="${idx}"]`);
        const rowEl = wrap.querySelector(`.sidebar-pin-row[data-idx="${idx}"]`);
        if (pinEl) pinEl.classList.add('active');
        if (rowEl) rowEl.classList.add('active');
      }

      function centerPin(idx) {
        const p = pins[idx];
        if (!p) return;
        const vw = viewport.clientWidth, vh = viewport.clientHeight;
        const W = photo.naturalWidth || 1, H = photo.naturalHeight || 1;
        // Mantem o zoom atual se já estiver acima de 1.4x; senão, força 1.6x
        const targetScale = Math.max(view.scale, 1.6);
        view.scale = Math.min(view.max, targetScale);
        view.tx = vw/2 - p.x * W * view.scale;
        view.ty = vh/2 - p.y * H * view.scale;
        canvas.classList.add('animated');
        applyTransform();
        clearTimeout(centerPin._t);
        centerPin._t = setTimeout(() => canvas.classList.remove('animated'), 600);
      }

      function refreshKPIs() {
        const total = pins.length;
        const paises  = new Set(pins.map(p => p.pais).filter(Boolean)).size;
        const cidades = new Set(pins.map(p => `${p.pais}|${p.cidade}`).filter(s => s !== '|undefined' && !s.startsWith('|'))).size;
        const t = wrap.querySelector('#kpi-total');
        const p = wrap.querySelector('#kpi-paises');
        const c = wrap.querySelector('#kpi-cidades');
        if (t) t.textContent = total;
        if (p) p.textContent = paises;
        if (c) c.textContent = cidades;
      }

      // ---------- ZOOM / PAN ----------
      function zoomAt(clientX, clientY, factor) {
        const rect = viewport.getBoundingClientRect();
        const px = clientX - rect.left, py = clientY - rect.top;
        const newScale = Math.max(view.min, Math.min(view.max, view.scale * factor));
        const realFactor = newScale / view.scale;
        view.tx = px - (px - view.tx) * realFactor;
        view.ty = py - (py - view.ty) * realFactor;
        view.scale = newScale;
        applyTransform();
      }
      viewport.addEventListener('wheel', (ev) => {
        ev.preventDefault();
        const factor = ev.deltaY < 0 ? 1.12 : 1 / 1.12;
        zoomAt(ev.clientX, ev.clientY, factor);
      }, { passive: false });

      // Drag-pan
      let dragging = false, dragMoved = false, dragStart = null;
      viewport.addEventListener('mousedown', (ev) => {
        if (ev.target.closest('.map-toolbar') || ev.target.closest('.map-zoom-controls') || ev.target.closest('.fly-pin')) return;
        dragging = true;
        dragMoved = false;
        dragStart = { x: ev.clientX, y: ev.clientY, tx: view.tx, ty: view.ty };
        viewport.classList.add('grabbing');
      });
      window.addEventListener('mousemove', (ev) => {
        if (!dragging) return;
        const dx = ev.clientX - dragStart.x, dy = ev.clientY - dragStart.y;
        if (Math.abs(dx) + Math.abs(dy) > 4) dragMoved = true;
        view.tx = dragStart.tx + dx;
        view.ty = dragStart.ty + dy;
        applyTransform();
      });
      window.addEventListener('mouseup', (ev) => {
        if (!dragging) return;
        const wasDragMove = dragMoved;
        dragging = false;
        viewport.classList.remove('grabbing');
        // Click puro (sem arrastar) e em modo adicionar → cria pin
        if (!wasDragMove && addPinMode && !ev.target.closest('.fly-pin') && !ev.target.closest('.map-toolbar') && !ev.target.closest('.map-zoom-controls')) {
          if (document.querySelector('.pin-modal-overlay') || document.querySelector('.pin-card-overlay')) return;
          const rect = viewport.getBoundingClientRect();
          const px = ev.clientX - rect.left, py = ev.clientY - rect.top;
          if (px < 0 || py < 0 || px > rect.width || py > rect.height) return;
          // Converte coordenadas de viewport para coordenadas normalizadas da imagem
          const W = photo.naturalWidth || 1, H = photo.naturalHeight || 1;
          const ix = ((px - view.tx) / view.scale) / W;
          const iy = ((py - view.ty) / view.scale) / H;
          if (ix < 0 || ix > 1 || iy < 0 || iy > 1) return;
          openPinNamePrompt(ix, iy);
        }
      });

      // Touch (1 dedo = pan, 2 dedos = pinch zoom)
      let touchState = null;
      viewport.addEventListener('touchstart', (ev) => {
        if (ev.target.closest('.map-toolbar') || ev.target.closest('.map-zoom-controls') || ev.target.closest('.fly-pin')) return;
        if (ev.touches.length === 1) {
          touchState = { mode: 'pan', x: ev.touches[0].clientX, y: ev.touches[0].clientY, tx: view.tx, ty: view.ty, moved: false };
        } else if (ev.touches.length === 2) {
          const a = ev.touches[0], b = ev.touches[1];
          touchState = {
            mode: 'pinch',
            d: Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY),
            cx: (a.clientX + b.clientX) / 2,
            cy: (a.clientY + b.clientY) / 2,
            scale: view.scale
          };
        }
      }, { passive: true });
      viewport.addEventListener('touchmove', (ev) => {
        if (!touchState) return;
        if (touchState.mode === 'pan' && ev.touches.length === 1) {
          const t = ev.touches[0];
          const dx = t.clientX - touchState.x, dy = t.clientY - touchState.y;
          if (Math.abs(dx) + Math.abs(dy) > 4) touchState.moved = true;
          view.tx = touchState.tx + dx;
          view.ty = touchState.ty + dy;
          applyTransform();
          ev.preventDefault();
        } else if (touchState.mode === 'pinch' && ev.touches.length === 2) {
          const a = ev.touches[0], b = ev.touches[1];
          const d2 = Math.hypot(a.clientX - b.clientX, a.clientY - b.clientY);
          const factor = d2 / touchState.d;
          const newScale = Math.max(view.min, Math.min(view.max, touchState.scale * factor));
          const realFactor = newScale / view.scale;
          view.tx = touchState.cx - (touchState.cx - view.tx) * realFactor;
          view.ty = touchState.cy - (touchState.cy - view.ty) * realFactor;
          view.scale = newScale;
          applyTransform();
          ev.preventDefault();
        }
      }, { passive: false });
      viewport.addEventListener('touchend', (ev) => {
        if (touchState && touchState.mode === 'pan' && !touchState.moved && addPinMode) {
          // Tap simples = adicionar pin
          const rect = viewport.getBoundingClientRect();
          const px = touchState.x - rect.left, py = touchState.y - rect.top;
          const W = photo.naturalWidth || 1, H = photo.naturalHeight || 1;
          const ix = ((px - view.tx) / view.scale) / W;
          const iy = ((py - view.ty) / view.scale) / H;
          if (ix >= 0 && ix <= 1 && iy >= 0 && iy <= 1 && !document.querySelector('.pin-modal-overlay')) {
            openPinNamePrompt(ix, iy);
          }
        }
        touchState = null;
      }, { passive: true });

      // ---------- MODAL: criar pin (foto + nome + país + cidade) ----------
      function openPinNamePrompt(x, y) {
        if (document.querySelector('.pin-modal-overlay')) return;
        const countriesMap = getCountriesMap();
        const countryOpts = ['', ...Object.keys(countriesMap), '__OUTROS__'];
        const overlay = document.createElement('div');
        overlay.className = 'pin-modal-overlay';
        overlay.innerHTML = `
          <div class="pin-modal premium">
            <div class="pin-modal-head">
              <div class="pin-modal-title">Nova Base FLY</div>
              <div class="pin-modal-sub">Cadastre sua nova base no mapa global</div>
            </div>

              <!-- ETAPA 4: DATA DE ABERTURA -->
              <div class="pin-step">

        `;
        document.body.appendChild(overlay);
        const input        = overlay.querySelector('#pin-name-input');

        // País → Cidades dinâmicas
        function refreshCityOptions() {
          const v = countrySel.value;
          citySel.innerHTML = '';

            otherWrap.classList.remove('hidden');

            addCityWrap.classList.remove('hidden');

              cities.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
          } else {
            otherWrap.classList.add('hidden');
            addCityWrap.classList.add('hidden');
            citySel.disabled = true;
            citySel.innerHTML = '<option value="">— Escolha um país —</option>';

        }
        countrySel.addEventListener('change', refreshCityOptions);

        // Adicionar nova cidade ao país escolhido
        addCityBtn.addEventListener('click', () => {
          addCityForm.classList.remove('hidden');
          addCityBtn.classList.add('hidden');
