        newCityCancel.addEventListener('click', () => {
          addCityForm.classList.add('hidden');
          addCityBtn.classList.remove('hidden');
          newCityInput.value = '';
        });
        newCitySave.addEventListener('click', () => {
          const v = (newCityInput.value || '').trim();
          const country = countrySel.value;
          if (!v || !country || country === '__OUTROS__') return;
          registerCity(country, v, countriesMap[country]?.flag);
          // Atualiza countriesMap em memória
          if (countriesMap[country] && !countriesMap[country].cities.includes(v)) {
            countriesMap[country].cities.push(v);
          }
          refreshCityOptions();
          citySel.value = v;
          addCityForm.classList.add('hidden');
          addCityBtn.classList.remove('hidden');
          newCityInput.value = '';
        });
        newCityInput.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') { ev.preventDefault(); newCitySave.click(); }
          if (ev.key === 'Escape') newCityCancel.click();
        });

        const close = () => overlay.remove();
        const flash = (el) => { el.classList.add('shake'); setTimeout(()=>el.classList.remove('shake'),400); };
        const save = () => {
          const name = (input.value || '').trim();
          if (!name) { input.focus(); flash(input); return; }
          let pais = '', cidade = '';
          if (countrySel.value === '__OUTROS__') {
            pais   = (customCountry.value || '').trim();
            cidade = (customCity.value || '').trim();
            if (!pais) { customCountry.focus(); flash(customCountry); return; }
            if (!cidade) { customCity.focus(); flash(customCity); return; }
            registerCity(pais, cidade, '🌍');
          } else {
            pais   = countrySel.value;
            cidade = citySel.value;
            if (!pais) { countrySel.focus(); flash(countrySel); return; }
            if (!cidade) { citySel.focus(); flash(citySel); return; }
          }
          const dataAbertura = (openingInput && openingInput.value) ? openingInput.value : ''; // formato 'YYYY-MM'
          pins.push({ x, y, name, photo: photoData, pais, cidade, dataAbertura });
          savePins(pins);
          renderPins();
          renderSidebar();
          refreshKPIs();
          if (typeof window.__refreshBasesTimeline === 'function') window.__refreshBasesTimeline();
          close();
        };
        overlay.querySelector('#pin-cancel').addEventListener('click', close);
        overlay.querySelector('#pin-save').addEventListener('click', save);
        overlay.addEventListener('click', (ev) => { if (ev.target === overlay) close(); });
        overlay.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') close(); });
        input.addEventListener('keydown', (ev) => {
          if (ev.key === 'Enter') { ev.preventDefault(); countrySel.focus(); }
        });
      }

      // ---------- CARD: mostrar foto + nome + país/cidade + data abertura ao clicar no pin ----------
      function formatOpeningDate(ym) {
        if (!ym) return '';
        const [y, m] = ym.split('-').map(s => parseInt(s, 10));
        if (!y || !m) return '';
        const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
        return `${months[m-1]} de ${y}`;
      }

      function openPinCard(idx) {
        const p = pins[idx];
        if (!p) return;
        setActivePin(idx);
        const countriesMap = getCountriesMap();
        const flag = (countriesMap[p.pais] && countriesMap[p.pais].flag) || '🌍';
        const overlay = document.createElement('div');
        overlay.className = 'pin-card-overlay';
        overlay.innerHTML = `
          <div class="pin-card">
            <button class="pin-card-close" title="Fechar">✕</button>
            ${p.photo
              ? `<div class="pin-card-photo"><img src="${p.photo}" alt="${escapeHtml(p.name)}"></div>`
              : `<div class="pin-card-photo no-photo"><div class="pin-card-placeholder">📸<br><small>Sem foto</small></div></div>`}
            <div class="pin-card-body">
              <div class="pin-card-label">Base FLY</div>
              <h3 class="pin-card-name">${escapeHtml(p.name)}</h3>
              ${(p.pais || p.cidade) ? `
                <div class="pin-card-loc">
                  <span class="loc-flag">${flag}</span>
                  <span class="loc-text">${escapeHtml(p.cidade || '')}${(p.cidade && p.pais) ? ' · ' : ''}${escapeHtml(p.pais || '')}</span>
                </div>
              ` : ''}
              <div class="pin-card-coords">📍 ${(p.x*100).toFixed(1)}% · ${(p.y*100).toFixed(1)}%</div>
              <div class="pin-card-opening" id="pin-card-opening">
                <span class="ico">⌛</span>
                <span id="pin-card-opening-txt">${p.dataAbertura ? 'Abertura: ' + escapeHtml(formatOpeningDate(p.dataAbertura)) : 'Data de abertura não definida'}</span>
                <button class="pin-card-opening-edit" data-act="edit-opening">${p.dataAbertura ? 'Alterar' : 'Definir'}</button>
              </div>
              <div class="pin-card-opening-form hidden" id="pin-card-opening-form" style="margin-top:8px;display:none;gap:8px;align-items:center;">
                <input type="month" class="pin-input" id="pin-card-opening-input" min="2026-01" max="2031-12" value="${escapeHtml(p.dataAbertura || '')}" style="flex:1;">
                <button class="pin-btn ghost small" data-act="opening-save">OK</button>
                <button class="pin-btn ghost small" data-act="opening-cancel">Cancelar</button>
              </div>
              <div class="pin-card-actions">
                <button class="pin-btn ghost" data-act="edit-photo">Trocar Foto</button>
                <button class="pin-btn danger" data-act="delete">Remover Base</button>
              </div>
              <input type="file" id="pin-card-file" accept="image/*" hidden>
            </div>
          </div>
        `;
        document.body.appendChild(overlay);
        const close = () => overlay.remove();
        overlay.querySelector('.pin-card-close').addEventListener('click', close);
        overlay.addEventListener('click', (ev) => { if (ev.target === overlay) close(); });
        overlay.addEventListener('keydown', (ev) => { if (ev.key === 'Escape') close(); });

        // Edit photo
        const fileIn = overlay.querySelector('#pin-card-file');
        overlay.querySelector('[data-act="edit-photo"]').addEventListener('click', () => fileIn.click());
        fileIn.addEventListener('change', () => {
          const file = fileIn.files && fileIn.files[0];
          if (!file) return;
          compressImage(file, 800).then(dataUrl => {
            pins[idx].photo = dataUrl;
            savePins(pins);
            renderPins();
            renderSidebar();
            if (typeof window.__refreshBasesTimeline === 'function') window.__refreshBasesTimeline();
            close();
            openPinCard(idx);
          });

        // Edit opening date
        const openingForm = overlay.querySelector('#pin-card-opening-form');
        const openingTxt  = overlay.querySelector('#pin-card-opening-txt');

          openingForm.style.display = 'none';
          openingBlock.style.display = 'flex';
        });

        // Delete
        overlay.querySelector('[data-act="delete"]').addEventListener('click', () => {
          if (!confirm(`Remover base "${p.name}"?`)) return;
          pins.splice(idx, 1);
          savePins(pins);
          renderPins();
          renderSidebar();
          refreshKPIs();
          if (typeof window.__refreshBasesTimeline === 'function') window.__refreshBasesTimeline();
          close();
        });
      }

      // ---------- COMPRIMIR IMAGEM (canvas → data URL) ----------
      function compressImage(file, maxW) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const ratio = img.width > maxW ? maxW / img.width : 1;
              const w = Math.round(img.width * ratio), h = Math.round(img.height * ratio);
              const cv = document.createElement('canvas');
              cv.width = w; cv.height = h;
              cv.getContext('2d').drawImage(img, 0, 0, w, h);
              resolve(cv.toDataURL('image/jpeg', 0.82));
            };
            img.onerror = reject;
            img.src = e.target.result;
          };
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      // ---------- TOOLBAR ----------
      wrap.querySelector('#pin-add-btn')?.addEventListener('click', (ev) => {

      wrap.querySelector('#pin-clear-btn')?.addEventListener('click', (ev) => {

          renderPins();
          renderSidebar();
          refreshKPIs();
          if (typeof window.__refreshBasesTimeline === 'function') window.__refreshBasesTimeline();

      });

      wrap.querySelector('#sidebar-add-btn')?.addEventListener('click', (ev) => {

      wrap.querySelector('#zoom-out-btn')?.addEventListener('click', (ev) => {

        ev.stopPropagation();

      // ---------- INICIALIZAÇÃO ----------

      if (photo.complete && photo.naturalWidth) initWhenReady();
      else photo.addEventListener('load', initWhenReady);

      // Reposicionar pins se viewport mudar de tamanho
      const ro = new ResizeObserver(() => fitImage());
      ro.observe(viewport);

      // ============================================================
      // Visual grid · cards com upload de foto/vídeo (premium)
      // ============================================================
      const visualGrid = wrap.querySelector('#bases-visual');
      const visuals = [
        { icon:'▥', name:'Quiosque Físico',     lbl:'Estrutura' },
        { icon:'☻', name:'Atendimento ao Cliente', lbl:'Equipe' },
        { icon:'▦', name:'Mural de Fotos',     lbl:'Comunidade' },
        { icon:'☺', name:'Clientes Atendidos', lbl:'Operação' },
        { icon:'✈', name:'Operação Aeroporto', lbl:'Logística' },
        { icon:'★', name:'Experiência Cidade', lbl:'Premium' }
      ];
      const visualMap = loadBasesVisual();

      function buildCardMedia(cardEl, key, fallbackIcon) {
        const imgWrap = cardEl.querySelector('.img');
        const m = visualMap[key];
        imgWrap.classList.remove('is-photo', 'is-video');
        imgWrap.innerHTML = '';
        if (m && m.type === 'photo' && m.data) {
          imgWrap.classList.add('is-photo');
          const im = document.createElement('img');
          im.src = m.data;
          im.alt = '';
          imgWrap.appendChild(im);
        } else if (m && m.type === 'video' && m.data) {
          imgWrap.classList.add('is-video');
          const v = document.createElement('video');
          v.src = m.data;
          v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
          v.setAttribute('playsinline', '');
          imgWrap.appendChild(v);
        } else {
          imgWrap.textContent = fallbackIcon;
        }
      }

      visuals.forEach((v, i) => {
        const key = 'card_' + i;
        const c = document.createElement('div');
        c.className = 'bases-visual-card';
        c.innerHTML = `
          <div class="img">${v.icon}</div>
          <div class="visual-edit-btns">
            <button class="visual-edit-btn" data-act="upload" title="Enviar foto ou vídeo">📷</button>
            <button class="visual-edit-btn danger" data-act="remove" title="Remover mídia">✕</button>
          </div>
          <div class="visual-empty-hint">Clique 📷 para enviar foto/vídeo</div>
          <div class="overlay">
            <div class="lbl">${v.lbl}</div>
            <div class="name">${v.name}</div>
          </div>
          <input type="file" accept="image/*,video/*" hidden class="visual-file-input">
        `;
        const fileIn = c.querySelector('.visual-file-input');
        const uploadBtn = c.querySelector('[data-act="upload"]');
        const removeBtn = c.querySelector('[data-act="remove"]');

        buildCardMedia(c, key, v.icon);

        uploadBtn.addEventListener('click', (e) => { e.stopPropagation(); fileIn.click(); });
        // Click no card também abre o seletor (sem mídia ainda)
        c.addEventListener('click', (e) => {
          if (e.target.closest('.visual-edit-btns')) return;
          if (!visualMap[key]) fileIn.click();
        });
        fileIn.addEventListener('change', async () => {
          const file = fileIn.files && fileIn.files[0];
          if (!file) return;
          try {
            if (file.type.startsWith('video/')) {
              const data = await readVideoFile(file);
              visualMap[key] = { type: 'video', data };
            } else if (file.type.startsWith('image/')) {
              const data = await compressImage(file, 1400);
              visualMap[key] = { type: 'photo', data };
            } else {
              alert('Envie uma foto (JPG/PNG) ou vídeo (MP4/WebM).');
              return;
            }
            saveBasesVisual(visualMap);
            buildCardMedia(c, key, v.icon);
          } catch (err) { console.warn(err); }
          fileIn.value = '';
        });
        removeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!visualMap[key]) return;
          if (!confirm(`Remover mídia de "${v.name}"?`)) return;
          delete visualMap[key];
          saveBasesVisual(visualMap);
          buildCardMedia(c, key, v.icon);
        });

        visualGrid.appendChild(c);
      });

      // Video card spanning 2 cols (também aceita foto OU vídeo)
      const videoCard = document.createElement('div');
      videoCard.className = 'bases-video-card';
      videoCard.innerHTML = `
        <div class="play">▶</div>
        <div class="lbl">Vídeo Demonstrativo · Operação FLY Dubai</div>
        <div class="visual-edit-btns">
          <button class="visual-edit-btn" data-act="upload" title="Enviar foto ou vídeo">📷</button>
          <button class="visual-edit-btn danger" data-act="remove" title="Remover">✕</button>
        </div>
        <input type="file" accept="image/*,video/*" hidden class="visual-file-input-big">
      `;
      function buildBigMedia() {
        const m = visualMap['video_main'];
        // remove imagens/vídeos antigos
        videoCard.querySelectorAll('img, video').forEach(el => el.remove());
        videoCard.classList.remove('is-photo', 'is-video');
        if (m && m.type === 'photo' && m.data) {
          videoCard.classList.add('is-photo');
          const im = document.createElement('img');
          im.src = m.data;
          videoCard.insertBefore(im, videoCard.firstChild);
        } else if (m && m.type === 'video' && m.data) {
          videoCard.classList.add('is-video');
          const vd = document.createElement('video');
          vd.src = m.data;
          vd.controls = true;
          vd.playsInline = true;
          videoCard.insertBefore(vd, videoCard.firstChild);
        }
      }
      const bigFileIn = videoCard.querySelector('.visual-file-input-big');
      videoCard.querySelector('[data-act="upload"]').addEventListener('click', (e) => { e.stopPropagation(); bigFileIn.click(); });
      videoCard.addEventListener('click', (e) => {
        if (e.target.closest('.visual-edit-btns') || e.target.tagName === 'VIDEO') return;
        if (!visualMap['video_main']) bigFileIn.click();
      });
      bigFileIn.addEventListener('change', async () => {
        const file = bigFileIn.files && bigFileIn.files[0];
        if (!file) return;
        try {
          if (file.type.startsWith('video/')) {
            const data = await readVideoFile(file);
            visualMap['video_main'] = { type: 'video', data };
          } else if (file.type.startsWith('image/')) {
            const data = await compressImage(file, 1600);
            visualMap['video_main'] = { type: 'photo', data };
          } else { alert('Envie foto ou vídeo.'); return; }
          saveBasesVisual(visualMap);
          buildBigMedia();

          <div class="stat-divider"></div>
          <div class="stat"><div class="num">${totalUnset}</div><div class="lbl">Sem Data Definida</div></div>
          <div class="stat-divider"></div>

        trackEl.innerHTML = '';

              <div class="timeline-bases">
                ${basesForMonth.map((p, idx) => {
                  const flag = (countriesMap[p.pais] && countriesMap[p.pais].flag) || '🌍';
                  const photoEl = p.photo

    // ============================================================
    // HIERARQUIA · INLINE EDITING (todos os textos/valores editáveis)
    // ============================================================
    const HIER_INLINE_KEY = 'fly_hierarquia_inline_v1';
    function hierLoadInlineEdits() {
      try { return JSON.parse(localStorage.getItem(flyModeKey(HIER_INLINE_KEY)) || '{}'); } catch (e) { return {}; }
    }
    function hierPersistInlineEdits(map) {
      try { localStorage.setItem(flyModeKey(HIER_INLINE_KEY), JSON.stringify(map)); } catch (e) {}
    }
    function hierEnableInlineEditing(panel) {
      const inlineEdits = hierLoadInlineEdits();
      // Selecionar TODOS os elementos com texto puro — exceto interativos/icônicos
      const all = panel.querySelectorAll('*');
      let counter = 0;
      all.forEach((el) => {
        if (el.classList.contains('hier-inline-editable')) return;
        // Excluir interativos/visuais
        const tag = el.tagName;
        if (['INPUT','TEXTAREA','SELECT','BUTTON','SVG','CANVAS','IMG','IFRAME','SCRIPT','STYLE'].includes(tag)) return;
        // Só elementos folha (sem children que sejam elementos com texto)
        const hasChildEl = Array.from(el.children).some(c => c.nodeType === 1);
        if (hasChildEl) return;
        // Texto não vazio, não muito longo, e que tem caracteres não-numéricos puros (evita ícones)
        const txt = el.textContent.trim();
        if (!txt) return;
        if (txt.length > 200) return;
        // Indexar com data-attr para chave estável
        if (!el.dataset.hierKey) {
          el.dataset.hierKey = 'hier_' + (counter++) + '_' + btoa(unescape(encodeURIComponent(tag + '|' + (el.className||'').slice(0,30) + '|' + txt.slice(0,40)))).slice(0,16);
        }
        const key = el.dataset.hierKey;
        if (inlineEdits[key] !== undefined) el.textContent = inlineEdits[key];
        el.setAttribute('contenteditable', 'plaintext-only');
        el.classList.add('hier-inline-editable');
        el.addEventListener('blur', () => {
          inlineEdits[key] = el.innerText.trim();
          hierPersistInlineEdits(inlineEdits);
        });
        el.addEventListener('click', (e) => {
          if (e.target === el) e.stopPropagation();
        });
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); el.blur(); }
        });
      });
    }

    /* ---------- TAB 1 — ORGANOGRAMA ---------- */
    function renderTabOrganograma(t, panel) {
      panel.appendChild(buildYearSwitcher(t));

      const wrap = document.createElement('div');
      wrap.className = 'org-chart-wrap';

      const toolbar = document.createElement('div');
      toolbar.className = 'org-chart-toolbar';
      toolbar.innerHTML = `
        <button class="org-tool-btn" data-act="zoomout">– ZOOM</button>
        <button class="org-tool-btn" data-act="reset">100%</button>
        <button class="org-tool-btn" data-act="zoomin">+ ZOOM</button>
        <button class="org-tool-btn" data-act="expand">EXPANDIR TUDO</button>
        <button class="org-tool-btn" data-act="collapse">RECOLHER</button>
      `;
      wrap.appendChild(toolbar);

      const canvas = document.createElement('div');
      canvas.className = 'org-canvas';
      const tree = document.createElement('div');
      tree.className = 'org-tree';
      tree.style.transform = 'scale(1)';
      canvas.appendChild(tree);
      wrap.appendChild(canvas);
      panel.appendChild(wrap);

      const list = t.hier[t.hierYear] || [];
      const president = list.find(e => !e.superior) || list[0];
      if (!president) {
        tree.innerHTML = '<div style="color:rgba(255,255,255,.55);padding:60px;text-align:center;">Nenhum funcionário cadastrado.</div>';
        return;
      }

      // Build hierarchy levels via BFS
      const levels = [];
      let frontier = [president];
      const visited = new Set([president.id]);
      while (frontier.length) {
        levels.push(frontier);
        const next = [];
        frontier.forEach(p => {
          subordinatesOf(list, p.id).forEach(s => {
            if (!visited.has(s.id)) { visited.add(s.id); next.push(s); }
          });
        });
        frontier = next;
        if (levels.length > 6) break; // safety
      }

      // Render levels — collapse beyond 4 by default to keep visual clean
      const MAX_LEVELS_DEFAULT = 4;
      let maxLevels = MAX_LEVELS_DEFAULT;

      function renderLevels() {
        tree.innerHTML = '';
        const slice = levels.slice(0, maxLevels);
        slice.forEach((lev, i) => {
          const row = document.createElement('div');
          row.className = 'org-level';
          // Cap each level to avoid overflowing on big years (2028)
          const cap = i === 0 ? 1 : (i === 1 ? 6 : 8);
          const visible = lev.slice(0, cap);
          visible.forEach(emp => row.appendChild(buildOrgCard(emp, t, i === 0)));
          if (lev.length > cap) {
            const more = document.createElement('div');
            more.className = 'org-card';
            more.style.cssText = 'background:rgba(245,184,66,.08);border-style:dashed;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ffd070;font-size:11px;letter-spacing:2px;text-transform:uppercase;width:160px;';
            more.innerHTML = '<div style="font-size:24px;font-weight:300;color:#ffd070;">+' + (lev.length - cap) + '</div><div>ver todos</div>';
            more.addEventListener('click', () => {
              t.hierTab = 'funcionarios';
              saveData();
              showTopic(currentTopic);
            });
            row.appendChild(more);
          }
          tree.appendChild(row);
        });
        if (levels.length > maxLevels) {
          const expandRow = document.createElement('div');
          expandRow.style.cssText = 'margin-top:-32px;text-align:center;';
          const btn = document.createElement('button');
          btn.className = 'org-tool-btn';
          btn.textContent = '↓ EXPANDIR PRÓXIMOS NÍVEIS';
          btn.addEventListener('click', () => { maxLevels = levels.length; renderLevels(); });
          expandRow.appendChild(btn);
          tree.appendChild(expandRow);
        }
      }
      renderLevels();

      let scale = 1;
      toolbar.querySelectorAll('.org-tool-btn').forEach(b => {
        b.addEventListener('click', () => {
          const act = b.dataset.act;
          if (act === 'zoomin')  scale = Math.min(1.4, scale + 0.1);
          if (act === 'zoomout') scale = Math.max(0.6, scale - 0.1);
          if (act === 'reset')   scale = 1;
          if (act === 'expand')  { maxLevels = levels.length; renderLevels(); return; }
          if (act === 'collapse'){ maxLevels = MAX_LEVELS_DEFAULT; renderLevels(); return; }
          tree.style.transform = 'scale(' + scale + ')';
        });
      });
    }

              <div class="emp-field"><div class="lbl">Performance Atual</div><div class="val gold">${e.performance||0}%</div><div class="emp-progress"><span style="width:${e.performance||0}%"></span></div></div>

    function rankInSector(list, e) {
      const peers = list.filter(x => x.setor === e.setor)
        .sort((a,b) => (b.performance||0) - (a.performance||0));
      const idx = peers.findIndex(x => x.id === e.id);
      return idx >= 0 ? (idx + 1) : '—';
    }

    /* ---------- TAB 6 — PERFORMANCE ---------- */
    function renderTabPerformance(t, panel) {
      panel.appendChild(buildYearSwitcher(t));
      const list = t.hier[t.hierYear] || [];

      const grid = document.createElement('div');
      grid.className = 'perf-grid';

      // Top performers
      const top = list.slice().sort((a,b) => (b.performance||0) - (a.performance||0)).slice(0, 6);
      const topCard = document.createElement('div');
      topCard.className = 'perf-card';
      topCard.innerHTML = `<h3>★ Top Performers</h3>`;
      top.forEach((e, i) => {
        const row = document.createElement('div');
        row.className = 'perf-row';
        row.style.cursor = 'pointer';
        row.innerHTML = `<div class="perf-rank ${i<3?'gold':''}">${i+1}</div><div class="name">${escapeHtml(e.nome)}<small>${escapeHtml(e.cargo)}</small></div><div class="bar"><span style="width:${e.performance||0}%"></span></div><div class="score">${e.performance||0}%</div>`;
        row.addEventListener('click', () => openEmployeeProfile(t, e.id));
        topCard.appendChild(row);
      });
      grid.appendChild(topCard);

      // Times mais produtivos (média por setor)
      const setMap = {};
      list.forEach(e => {
        if (!setMap[e.setor]) setMap[e.setor] = { sum: 0, count: 0 };
        setMap[e.setor].sum += (e.performance||0);
        setMap[e.setor].count++;
      });
      const setRank = Object.entries(setMap)
        .map(([s, d]) => [s, Math.round(d.sum/d.count)])
        .sort((a,b) => b[1] - a[1]);
      const teamCard = document.createElement('div');
      teamCard.className = 'perf-card';
      teamCard.innerHTML = `<h3>● Times Mais Produtivos</h3>`;
      setRank.slice(0, 6).forEach(([s, p], i) => {
        const row = document.createElement('div');
        row.className = 'perf-row';
        row.innerHTML = `<div class="perf-rank ${i<3?'gold':''}">${i+1}</div><div class="name">${escapeHtml(s)}<small>média do setor</small></div><div class="bar"><span style="width:${p}%"></span></div><div class="score">${p}%</div>`;
        teamCard.appendChild(row);
      });
      grid.appendChild(teamCard);

      // Líderes mais eficientes — quem é superior + tem subordinados, ranqueado por avg(performance dos subs)
      const leaders = list.filter(l => subordinatesOf(list, l.id).length > 0)
        .map(l => {
          const subs = subordinatesOf(list, l.id);
          const avg = subs.reduce((a,s) => a+(s.performance||0), 0) / subs.length;
          return { ...l, _avg: Math.round(avg), _team: subs.length };
        })
        .sort((a,b) => b._avg - a._avg)
        .slice(0, 6);
      const leadCard = document.createElement('div');
      leadCard.className = 'perf-card';
      leadCard.innerHTML = `<h3>♛ Líderes Mais Eficientes</h3>`;
      leaders.forEach((l, i) => {
        const row = document.createElement('div');
        row.className = 'perf-row';
        row.style.cursor = 'pointer';
        row.innerHTML = `<div class="perf-rank ${i<3?'gold':''}">${i+1}</div><div class="name">${escapeHtml(l.nome)}<small>${l._team} subordinados · ${escapeHtml(l.cargo)}</small></div><div class="bar"><span style="width:${l._avg}%"></span></div><div class="score">${l._avg}%</div>`;
        row.addEventListener('click', () => openEmployeeProfile(t, l.id));
        leadCard.appendChild(row);
      });
      grid.appendChild(leadCard);

      // Setores abaixo da meta
      const belowCard = document.createElement('div');
      belowCard.className = 'perf-card';
      belowCard.innerHTML = `<h3>↓ Setores Abaixo da Meta</h3>`;
      const below = setRank.filter(([_, p]) => p < 85).slice(0, 6);
      if (below.length === 0) {
        belowCard.innerHTML += '<div style="color:rgba(255,255,255,.5);font-size:12px;padding:18px 0;">Nenhum setor está abaixo da meta de 85%.</div>';
      } else {
        below.forEach(([s, p], i) => {
          const row = document.createElement('div');
          row.className = 'perf-row';
          row.innerHTML = `<div class="perf-rank" style="background:rgba(231,76,60,.15);border-color:rgba(231,76,60,.4);color:#f08573;">!</div><div class="name">${escapeHtml(s)}<small>requer atenção</small></div><div class="bar"><span style="width:${p}%;background:linear-gradient(90deg,#f08573,#e76d52);"></span></div><div class="score" style="color:#f08573;">${p}%</div>`;
          belowCard.appendChild(row);
        });
      }
      grid.appendChild(belowCard);

      panel.appendChild(grid);
    }

    /* ---------- IA SUGGESTIONS ---------- */
    function buildAIPanel(t) {
      const list = t.hier[t.hierYear] || [];
      const setMap = {};
      list.forEach(e => {
        if (!setMap[e.setor]) setMap[e.setor] = { count: 0, perf: 0, subOf: {} };
        setMap[e.setor].count++;
        setMap[e.setor].perf += (e.performance||0);
      });
      // Setor com falta — menor headcount
      const setorFaltando = Object.entries(setMap).sort((a,b) => a[1].count - b[1].count)[0];
      // Líder sobrecarregado — > 6 subordinados diretos
      const lideresSobrecarga = list.filter(l => subordinatesOf(list, l.id).length > 6);
      const sobrecarregado = lideresSobrecarga[0];
      // Pronto para promoção — performance >= 95 e cargo não-diretor
      const prontoPromocao = list
        .filter(e => (e.performance||0) >= 95 && !/(Diretor|Presidente)/i.test(e.cargo))
        .sort((a,b) => (b.performance||0) - (a.performance||0))[0];
      // Previsão ideal — diff até próximo ano
      const years = ['2026','2027','2028'];
      const idx = years.indexOf(t.hierYear);
      const next = idx < 2 ? (t.hier[years[idx+1]] || []).length : null;
      const cur = list.length;
      const previsao = next ? (next - cur) : null;

      const ai = document.createElement('div');
      ai.className = 'ai-panel';
      ai.innerHTML = `
        <h3><span class="ai-badge">AI</span> Inteligência FLY · Sugestões</h3>
        <div class="ai-list">
          ${setorFaltando ? `<div class="ai-item"><div class="ai-icon">⊕</div><div class="ai-text"><strong>Setor com falta de pessoal</strong>${escapeHtml(setorFaltando[0])} tem apenas ${setorFaltando[1].count} ${setorFaltando[1].count===1?'pessoa':'pessoas'}. Recomendado contratar +${Math.max(2, Math.round(setorFaltando[1].count*0.5))} para equilibrar carga.</div></div>` : ''}
          ${sobrecarregado ? `<div class="ai-item"><div class="ai-icon">⚠</div><div class="ai-text"><strong>Líder sobrecarregado</strong>${escapeHtml(sobrecarregado.nome)} (${escapeHtml(sobrecarregado.cargo)}) tem ${subordinatesOf(list, sobrecarregado.id).length} subordinados diretos. Considere criar uma camada intermediária de supervisão.</div></div>` : ''}
          ${prontoPromocao ? `<div class="ai-item"><div class="ai-icon">↑</div><div class="ai-text"><strong>Pronto para promoção</strong>${escapeHtml(prontoPromocao.nome)} entrega ${prontoPromocao.performance}% de performance como ${escapeHtml(prontoPromocao.cargo)}. Forte candidato a ser elevado.</div></div>` : ''}
          ${previsao !== null ? `<div class="ai-item"><div class="ai-icon">∞</div><div class="ai-text"><strong>Previsão ideal de contratação</strong>Para atingir o headcount projetado em ${years[idx+1]} (${next} pessoas), abra ~${Math.ceil(previsao/12)} vagas/mês nos próximos 12 meses.</div></div>` : `<div class="ai-item"><div class="ai-icon">✓</div><div class="ai-text"><strong>Headcount no topo</strong>Você está no ano final do plano (${t.hierYear}). Foque em retenção e excelência operacional.</div></div>`}
        </div>
      `;
      return ai;
    }

    /* =====================  VIEW 3 (TOPIC)  ===================== */
    function showTopic(topic) {
      currentTopic = topic;
      const t = getTopic(currentYear.ano, topic.key);
      topicView.innerHTML = '';

      if (!currentFolder) {
        /* ===== ROOT VIEW ===== */
        // Banner do tópico
        const banner = document.createElement('div');
        banner.className = 'topic-banner' + (t.banner.image ? ' has-image' : '');
        if (t.banner.image) banner.style.setProperty('--banner-image', `url("${t.banner.image}")`);

        const bTitle = document.createElement('h1');
        bTitle.textContent = t.banner.title || topic.key;
        banner.appendChild(bTitle);
        FlyDesign.bindEditable(bTitle, `topic.banner_${topic.key}`, { type: 'text', label: `Título "${t.banner.title || topic.key}"` });

        const iconWrap = document.createElement('div');
        iconWrap.className = 'banner-icons';
        t.banner.icons.forEach((ic, i) => {
          const el = document.createElement('div');
          el.className = 'banner-icon';
          if (ic.image) el.style.backgroundImage = `url("${ic.image}")`;
          el.innerHTML = `<span>${ic.label || ''}</span>`;
          iconWrap.appendChild(el);
          FlyDesign.bindEditable(el, `topic.banner_${topic.key}_icon_${i}`, { type: 'background', label: `Ícone ${i + 1}` });
        });
        banner.appendChild(iconWrap);

        const editBanner = document.createElement('button');
        editBanner.className = 'edit-banner-btn';
        editBanner.textContent = 'EDITAR BANNER';
        editBanner.addEventListener('click', () => openBannerEditor(t));
        banner.appendChild(editBanner);
        topicView.appendChild(banner);

        // Único botão Apple-style "Adicionar nova pasta" (só admin)
        const adminBar = document.createElement('div');
        adminBar.className = 'topic-admin-bar';
        adminBar.innerHTML = `
          <button class="apple-btn" id="btn-newfolder">
            <span class="apple-icon">＋</span>
            <span>Adicionar nova pasta</span>
          </button>
        `;
        adminBar.querySelector('#btn-newfolder').addEventListener('click', () => openCreateFolderModal(t));
        topicView.appendChild(adminBar);

        // Botão Comparador — aparece em PRODUTOS (e qualquer tópico que tenha pacotes), pra TODOS (não só admin)
        const pacotesNoTopico = (t.items || []).filter(it => {
          const upper = (it.name || '').toUpperCase();
          const isLegacyDubai = (topic.key === 'PRODUTOS' && upper === 'DUBAI EXPLORER');
          return it.format === 'pacotes' || isLegacyDubai;
        });
        if (pacotesNoTopico.length > 0) {
          const cmpBar = document.createElement('div');
          cmpBar.className = 'topic-comparador-bar';
          cmpBar.innerHTML = `
            <button class="topic-comparador-btn" id="btn-comparador">
              <span class="cmp-ico">📊</span>
              <span class="cmp-lbl">COMPARADOR ESTRATÉGICO</span>
              <span class="cmp-count">${pacotesNoTopico.length} ${pacotesNoTopico.length === 1 ? 'pacote' : 'pacotes'}</span>
            </button>
          `;
          cmpBar.querySelector('#btn-comparador').addEventListener('click', () => flyOpenComparador());
          topicView.appendChild(cmpBar);
        }
      } else {
        /* ===== FOLDER VIEW ===== */
        const fh = document.createElement('div');
        fh.className = 'folder-header-apple';
        const inside = t.items.filter(x => x.folder === currentFolder);
        fh.innerHTML = `
          <div class="fh-left">
            <button class="folder-back-apple" id="fh-back">← Voltar</button>
            <h2>${escapeHtml(currentFolder)}</h2>
            <span class="fh-count">${inside.length} ${inside.length === 1 ? 'item' : 'itens'}</span>
          </div>
          <div class="fh-right">
            <button class="apple-btn ghost" id="fh-add"><span class="apple-icon">＋</span><span>Adicionar itens</span></button>
            <button class="apple-btn ghost" id="fh-rename"><span class="apple-icon">✎</span><span>Editar nome</span></button>
            <button class="apple-btn ghost danger" id="fh-delete"><span class="apple-icon">×</span><span>Excluir pasta</span></button>
          </div>
        `;
        fh.querySelector('#fh-back').addEventListener('click', () => { currentFolder = null; showTopic(currentTopic); });
        fh.querySelector('#fh-add').addEventListener('click', () => openAddToFolderModal(t, currentFolder));
        fh.querySelector('#fh-rename').addEventListener('click', () => {
          const nv = prompt('Novo nome da pasta:', currentFolder);
          if (!nv || !nv.trim() || nv.trim() === currentFolder) return;
          const old = currentFolder;
          const newN = nv.trim();
          t.items.forEach(it => { if (it.folder === old) it.folder = newN; });
          saveData();
          currentFolder = newN;
          showTopic(currentTopic);
        });
        fh.querySelector('#fh-delete').addEventListener('click', () => {
          const c = confirm(
            'Excluir a pasta "' + currentFolder + '"?\n\n' +
            'Os ' + inside.length + ' itens dentro dela voltarão para a lista principal.\n' +
            '(Os itens NÃO serão apagados.)'
          );
          if (!c) return;
          t.items.forEach(it => { if (it.folder === currentFolder) it.folder = ''; });
          saveData();
          currentFolder = null;
          showTopic(currentTopic);
        });
        topicView.appendChild(fh);
      }

      /* Grid principal */
      const grid = document.createElement('div');
      grid.className = 'items-grid';

      if (currentFolder) {
        // Dentro de uma pasta: mostra só os itens da pasta + botão "remover" no card
        t.items.forEach((it, i) => {
          if (it.folder !== currentFolder) return;
          const card = buildCard(it, 'item-card',
            () => showItem(t, 'item', i),
            () => deleteEntry(t, 'items', i),
            t
          );
          // Botão "Tirar da pasta" só dentro de pasta
          const out = document.createElement('button');
          out.className = 'remove-from-folder-btn';
          out.textContent = '⤴';
          out.title = 'Tirar item desta pasta';
          out.addEventListener('click', e => {
            e.stopPropagation();
            if (!confirm('Tirar "' + (it.name || 'item') + '" desta pasta? Ele volta para a lista principal.')) return;
            it.folder = '';
            saveData();
            showTopic(currentTopic);
          });
          card.appendChild(out);
          grid.appendChild(card);
        });
      } else {
        // Raiz: pastas (cards iPhone) + itens soltos (sem folder)
        const seenFolders = new Set();
        t.items.forEach((it, i) => {
          if (it.folder && it.folder.trim()) {
            if (seenFolders.has(it.folder)) return;
            seenFolders.add(it.folder);
            const folderItems = t.items.filter(x => x.folder === it.folder);
            grid.appendChild(buildFolderCard(it.folder, folderItems, t));
          } else {
            grid.appendChild(buildCard(it, 'item-card',
              () => showItem(t, 'item', i),
              () => deleteEntry(t, 'items', i),
              t
            ));
          }
        });
      }

      const add = document.createElement('div');
      add.className = 'add-card';
      add.textContent = '+';
      add.title = currentFolder ? 'Criar item nesta pasta' : 'Criar item solto na raiz';
      add.addEventListener('click', () => openItemEditor(t, 'item', null));
      grid.appendChild(add);
      topicView.appendChild(grid);

      currentView = 'topic';
      switchTo('topic');
    }

    /* ============================================================
       openCreateFolderModal — modal Apple para criar pasta nova
       (mostra TODOS os itens "soltos" do tópico para selecionar)
       ============================================================ */
    function openCreateFolderModal(topicData) {
      // candidatos: APENAS itens que ainda estão soltos (sem folder)
      const candidates = topicData.items.filter(it => !it.folder);
      const picked = new Set();

      modal.className = 'modal apple-modal';
      modal.innerHTML = `
        <div class="apple-modal-header">
          <h3>Nova pasta</h3>
          <p>Dê um nome e selecione os itens que vão entrar.</p>
        </div>

        <div class="apple-field">
          <label>Nome da pasta</label>
          <input type="text" id="cf_name" placeholder="Ex: Eventos, Marcas, Esportes…" autocomplete="off" />
        </div>

        <div class="apple-field">
          <div class="apple-field-row">
            <label>Itens disponíveis</label>
            <span class="apple-hint" id="cf_count">0 selecionado(s)</span>
          </div>
          ${candidates.length === 0
            ? '<p class="apple-empty">Nenhum item solto neste tópico. Tire itens de outras pastas primeiro ou crie itens novos.</p>'
            : `<div class="apple-list" id="cf_list">
                ${candidates.map(c => `
                  <label class="apple-row" data-id="${c.id}">
                    <span class="apple-check"></span>
                    <span class="apple-row-label">${escapeHtml(c.name || '(sem nome)')}</span>
                    ${c.categoria ? `<span class="apple-row-tag">${escapeHtml(c.categoria)}</span>` : ''}
                  </label>
                `).join('')}
               </div>`
          }
        </div>

        <div class="apple-actions">
          <button class="apple-btn ghost" id="cf_cancel">Cancelar</button>
          <button class="apple-btn primary" id="cf_confirm" disabled>Confirmar criação da pasta</button>
        </div>
      `;
      modalOverlay.classList.add('active');

      const nameInput = modal.querySelector('#cf_name');
      const countEl   = modal.querySelector('#cf_count');
      const confirmBtn = modal.querySelector('#cf_confirm');

      function refreshState() {
        if (countEl) countEl.textContent = picked.size + ' selecionado(s)';
        const okName = (nameInput.value || '').trim().length > 0;
        confirmBtn.disabled = !(okName && picked.size > 0);
      }

      modal.querySelectorAll('.apple-row').forEach(row => {
        row.addEventListener('click', e => {
          e.preventDefault();
          const id = row.dataset.id;
          if (picked.has(id)) { picked.delete(id); row.classList.remove('checked'); }
          else { picked.add(id); row.classList.add('checked'); }
          refreshState();
        });
      });

      nameInput.addEventListener('input', refreshState);
      modal.querySelector('#cf_cancel').addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', () => {
        const fname = nameInput.value.trim();
        if (!fname || picked.size === 0) return;
        // Verifica colisão de nome
        const existing = new Set(topicData.items.map(it => it.folder).filter(Boolean));
        if (existing.has(fname)) {
          if (!confirm('Já existe uma pasta com esse nome. Os itens selecionados serão somados a ela. Continuar?')) return;
        }
        topicData.items.forEach(it => { if (picked.has(it.id)) it.folder = fname; });
        saveData();
        closeModal();
        currentFolder = fname; // entra direto na pasta criada
        showTopic(currentTopic);
        showToast('PASTA CRIADA');
      });

      setTimeout(() => nameInput.focus(), 50);
      refreshState();
    }

    /* ============================================================
       openAddToFolderModal — adicionar mais itens a uma pasta existente
       (mostra apenas itens "soltos" — NUNCA itens de outras pastas, pra
       evitar bagunça e respeitar a regra "item só em um lugar")
       ============================================================ */
    function openAddToFolderModal(topicData, folderName) {
      const candidates = topicData.items.filter(it => !it.folder);
      const picked = new Set();

      modal.className = 'modal apple-modal';
      modal.innerHTML = `
        <div class="apple-modal-header">
          <h3>Adicionar à pasta</h3>
          <p>Pasta: <b>${escapeHtml(folderName)}</b></p>
        </div>
        <div class="apple-field">
          <div class="apple-field-row">
            <label>Itens disponíveis na lista principal</label>
            <span class="apple-hint" id="af_count">0 selecionado(s)</span>
          </div>
          ${candidates.length === 0
            ? '<p class="apple-empty">Não há itens soltos. Crie um item novo ou tire itens de outras pastas primeiro.</p>'
            : `<div class="apple-list">
                ${candidates.map(c => `
                  <label class="apple-row" data-id="${c.id}">
                    <span class="apple-check"></span>
                    <span class="apple-row-label">${escapeHtml(c.name || '(sem nome)')}</span>
                    ${c.categoria ? `<span class="apple-row-tag">${escapeHtml(c.categoria)}</span>` : ''}
                  </label>
                `).join('')}
              </div>`
          }
        </div>
        <div class="apple-actions">
          <button class="apple-btn ghost" id="af_cancel">Cancelar</button>
          <button class="apple-btn primary" id="af_confirm" disabled>Adicionar selecionados</button>
        </div>
      `;
      modalOverlay.classList.add('active');

      const countEl = modal.querySelector('#af_count');
      const confirmBtn = modal.querySelector('#af_confirm');
      function refresh() {
        if (countEl) countEl.textContent = picked.size + ' selecionado(s)';
        confirmBtn.disabled = picked.size === 0;
      }
      modal.querySelectorAll('.apple-row').forEach(row => {
        row.addEventListener('click', e => {
          e.preventDefault();
          const id = row.dataset.id;
          if (picked.has(id)) { picked.delete(id); row.classList.remove('checked'); }
          else { picked.add(id); row.classList.add('checked'); }
          refresh();
        });
      });
      modal.querySelector('#af_cancel').addEventListener('click', closeModal);
      confirmBtn.addEventListener('click', () => {
        if (picked.size === 0) return;
        topicData.items.forEach(it => { if (picked.has(it.id)) it.folder = folderName; });
        saveData();
        closeModal();
        showTopic(currentTopic);
        showToast(picked.size + ' ITEM(NS) ADICIONADO(S)');
      });
      refresh();
    }

    function buildFolderCard(folderName, items, topicData) {
      const card = document.createElement('div');
      card.className = 'folder-card';

      // Mini grid of up to 9 items (3x3)
      const grid = document.createElement('div');
      grid.className = 'folder-grid';
      const max = 9;
      const visible = items.slice(0, max);
      visible.forEach(it => {
        const m = document.createElement('div');
        m.className = 'mini-icon';
        if (it.image) m.style.setProperty('--mini-image', `url("${it.image}")`);
        else m.textContent = (it.name || '').slice(0, 8);
        grid.appendChild(m);
      });
      // Filler / "+N more" indicator
      if (items.length > max) {
        const last = grid.lastChild;
        if (last) {
          last.classList.add('more');
          last.textContent = '+' + (items.length - max + 1);
          last.style.removeProperty('--mini-image');
        }
      }
      // Empty cells to fill 3x3 if fewer than 9
      const filler = Math.max(0, max - visible.length);
      for (let i = 0; i < filler; i++) {
        const e = document.createElement('div');
        e.className = 'mini-icon empty';
        grid.appendChild(e);
      }
      card.appendChild(grid);

      // Count badge
      const count = document.createElement('div');
      count.className = 'folder-count';
      count.textContent = items.length;
      card.appendChild(count);

      // Folder name
      const nm = document.createElement('div');
      nm.className = 'folder-name';
      nm.textContent = folderName;
      card.appendChild(nm);

      // Click → entra na pasta. Sem botões de admin no card (gestão fica dentro da pasta).
      card.addEventListener('click', () => {
        currentFolder = folderName;
        showTopic(currentTopic);
      });
      return card;
    }

    function buildCard(entry, cls, onClick, onDelete, topicData) {
      const card = document.createElement('div');
      card.className = cls;
      if (entry.id) card.dataset.itemId = entry.id;
      if (entry.image) card.style.setProperty('--card-image', `url("${entry.image}")`);
      card.innerHTML = `<div class="name">${entry.name || ''}</div>`;
      card.addEventListener('click', e => {
        if (e.target.classList.contains('delete-btn')) return;
        if (e.target.classList.contains('card-edit-btn')) return;
        if (e.target.classList.contains('remove-from-folder-btn')) return;
        // Em admin-mode click no NOME (que é editável) abre design editor;
        // o card propriamente continua navegando.
        if (document.body.classList.contains('admin-mode') && e.target.closest('[data-design-id]')) return;
        onClick();
      });
      const del = document.createElement('button');
      del.className = 'delete-btn';
      del.textContent = '×';
      del.title = 'Remover';
      del.addEventListener('click', e => {
        e.stopPropagation();
        if (confirm('Remover "' + (entry.name || 'item') + '"?')) onDelete();
      });
      card.appendChild(del);
      if (topicData && Array.isArray(topicData.items)) {
        const edit = document.createElement('button');
        edit.className = 'card-edit-btn';
        edit.textContent = '✎';
        edit.title = 'Editar item e formato de painel';
        edit.addEventListener('click', e => {
          e.stopPropagation();
          const editIdx = topicData.items.findIndex(x => x === entry || (x.id && entry.id && x.id === entry.id));
          if (editIdx >= 0) openItemEditor(topicData, 'item', editIdx);
        });
        card.appendChild(edit);
      }
      // Marca o título do item como editável (texto/cor/tamanho/posição)
      const nameEl = card.querySelector('.name');
      const topicKey = (topicData && topicData.banner && topicData.banner.title) || (currentTopic && currentTopic.key) || 'topic';
      const safeName = (entry.name || entry.id || 'item').replace(/\s+/g, '_').slice(0, 40);
      if (nameEl) FlyDesign.bindEditable(nameEl, `topic.${topicKey}.itemName_${safeName}`, { type: 'text', label: `Item "${entry.name || ''}"` });
      return card;
    }

    function deleteEntry(topicData, key, idx) {
      topicData[key].splice(idx, 1);
      saveData();
      showTopic(currentTopic);
    }

    /* =====================  ITEM HELPERS  ===================== */
    function genId() { return 'i_' + Date.now() + '_' + Math.random().toString(36).slice(2,7); }
    function defaultItemShape(name = '') {
      return {
        id: genId(),
        name,
        image: '',
        categoria: '',
        folder: '',
        format: 'default', // 'default' | 'pacotes' | 'presskit' — formato de painel quando aberto
        descricao: '',
        inclui: [],
        publico: '',
        data: '',
        periodo: '',
        responsavel: '',
        subitens: [],
        financeiro: { faturamento: 0, custos: 0, ticket_medio: 0, custo_implementacao: '' },
        performance: { vendas_mes: 0, crescimento: 0, clientes: 0, historico: [] },
        operacao: { fornecedores: [], estrutura: '', etapas: [], observacoes: '' },
        marketing: { estrategia: '', canais: [] },
        midia: { fotos: [], referencias: [], videos: [], video_ia: '' },
        cronograma: [],
        documentos: { link_principal: '', links_adicionais: [] }
      };
    }
    function normalizeItem(it) {
      const base = defaultItemShape();
      if (!it.descricao && it.description) it.descricao = it.description;
      it.id = it.id || base.id;
      it.categoria = it.categoria || '';
      it.folder = it.folder || '';
      it.format = (it.format === 'pacotes' || it.format === 'presskit' || it.format === 'default') ? it.format : 'default';
      it.descricao = it.descricao || '';
      it.inclui = Array.isArray(it.inclui) ? it.inclui : [];
      it.publico = it.publico || '';
      it.data = it.data || '';
      it.periodo = it.periodo || '';
      it.responsavel = it.responsavel || '';
      it.subitens = Array.isArray(it.subitens) ? it.subitens.map(s => ({
        id: s.id || genId(),
        name: s.name || '',
        descricao: s.descricao || '',
        responsavel: s.responsavel || '',
        responsabilidades: Array.isArray(s.responsabilidades) ? s.responsabilidades : []
      })) : [];
      it.financeiro = Object.assign({}, base.financeiro, it.financeiro || {});
      it.performance = Object.assign({}, base.performance, it.performance || {});
      it.performance.historico = Array.isArray(it.performance.historico) ? it.performance.historico : [];
      it.operacao = Object.assign({}, base.operacao, it.operacao || {});
      it.operacao.fornecedores = Array.isArray(it.operacao.fornecedores) ? it.operacao.fornecedores : [];
      it.operacao.etapas = Array.isArray(it.operacao.etapas) ? it.operacao.etapas : [];
      it.marketing = Object.assign({}, base.marketing, it.marketing || {});
      it.marketing.canais = Array.isArray(it.marketing.canais) ? it.marketing.canais : [];
      it.midia = Object.assign({}, base.midia, it.midia || {});
      it.midia.fotos = Array.isArray(it.midia.fotos) ? it.midia.fotos : [];
      it.midia.referencias = Array.isArray(it.midia.referencias) ? it.midia.referencias : [];
      it.midia.videos = Array.isArray(it.midia.videos) ? it.midia.videos : [];
      it.cronograma = Array.isArray(it.cronograma) ? it.cronograma : [];
      it.documentos = Object.assign({}, base.documentos, it.documentos || {});
      it.documentos.links_adicionais = Array.isArray(it.documentos.links_adicionais) ? it.documentos.links_adicionais : [];
      return it;
    }
    function fmtDate(s) {
      if (!s) return '';
      const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (m) return `${m[3]}/${m[2]}/${m[1]}`;
      return s;
    }
    function fmtCurrency(n) {
      const num = Number(n) || 0;
      return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL', maximumFractionDigits: 2 });
    }
    function fmtNumber(n) { return (Number(n) || 0).toLocaleString('pt-BR'); }
    function calcLucro(f) { return (Number(f.faturamento)||0) - (Number(f.custos)||0); }
    function calcMargem(f) {
      const fat = Number(f.faturamento) || 0;
      if (!fat) return 0;
      return (calcLucro(f) / fat) * 100;
    }

    function showToast(msg) {
      let toast = document.querySelector('.save-toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.className = 'save-toast';
        document.body.appendChild(toast);
      }
      toast.textContent = msg;
      requestAnimationFrame(() => toast.classList.add('show'));
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    /* Lightbox */

    const lightboxImg = document.getElementById('lightboxImg');
    function openLightbox(src) {
      if (!src) return;
      lightboxImg.src = src;
      lightbox.classList.add('active');
    }
    lightbox.addEventListener('click', () => lightbox.classList.remove('active'));

    const FLY_DATA_MODE_KEY = 'fly_data_mode';
    function getDataMode() {
      const m = localStorage.getItem(FLY_DATA_MODE_KEY);
      return ['demo', 'operational', 'goal'].includes(m) ? m : 'demo';
    }
    function applyDataModeUI() {
      const mode = getDataMode();
      document.body.dataset.dataMode = mode;
      const btn = document.getElementById('dataModeToggle');
      if (btn) {
        btn.dataset.mode = mode;
        const lbl = btn.querySelector('.dm-lbl');
        const ico = btn.querySelector('.dm-ico');
        if (lbl) lbl.textContent = ({ demo: 'DEMO', operational: 'NORMAL', goal: 'META' })[mode];
        if (ico) ico.textContent = ({ demo: '👁', operational: '⚙', goal: '🎯' })[mode];
        btn.title = ({
          demo: 'MODO DEMO · números preenchidos pra apresentação · click pra Normal',
          operational: 'MODO NORMAL · em branco, seu painel real · click pra Meta',
          goal: 'MODO META · simulação se bater 100% das metas · click pra Demo'
        })[mode];
      }
    }
    function setDataMode(m) {
      if (!['demo', 'operational', 'goal'].includes(m)) return;
      localStorage.setItem(FLY_DATA_MODE_KEY, m);
      applyDataModeUI();
      try {
        window.dispatchEvent(new CustomEvent('fly:data-mode-change', { detail: { mode: m } }));
      } catch (e) {}
      // Re-render hard: o modo afeta dados em todas as views (item/topic/etc)
      if (typeof currentView !== 'undefined') {
        if (currentView === 'item' && currentItemRef) {
          // Item view (Pacotes/Hierarquia/Bases) — re-render
          showItem(currentItemRef.topicData, currentItemRef.kind, currentItemRef.idx);
        } else if (currentView === 'topic' && currentTopic) {
          showTopic(currentTopic);
        } else if (currentView === 'detail' && currentYear) {
          // Recarrega via clique no círculo do ano se possível
          const idx = years.indexOf(currentYear);
          if (idx >= 0) showDetail(idx);
        }
      }
      if (document.querySelector('.fly-tu-overlay')) flyOpenTurmas();
    }
    window.flySetDataMode = setDataMode;

    function createGoalDubai(item) {
      // Goal mode = projeção se bater 100% das metas
      const demo = item.dubai || DUBAI_EXPLORER_DEFAULTS;
      const g = JSON.parse(JSON.stringify(demo));
      g.produto.nome = item.name || g.produto.nome;
      const meta = g.metaReal || demo.metaReal || {};
      const metaCli = meta.clientes?.meta || 100;
      const metaRec = meta.receita?.meta || 2500000;
      const metaLuc = meta.lucro?.meta || 1000000;
      const ticketGoal = metaCli > 0 ? Math.round(metaRec / metaCli) : 0;
      const monthsLeft = 12;

      // Marca real = meta (100% atingido)
      g.metaReal = g.metaReal || {};
      g.metaReal.clientes = g.metaReal.clientes || {};
      g.metaReal.receita = g.metaReal.receita || {};
      g.metaReal.lucro = g.metaReal.lucro || {};
      g.metaReal.clientes.meta = metaCli;
      g.metaReal.clientes.real = metaCli;
      g.metaReal.receita.meta = metaRec;
      g.metaReal.receita.real = metaRec;
      g.metaReal.lucro.meta = metaLuc;
      g.metaReal.lucro.real = metaLuc;
      // Distribuir mensal igualmente
      const cliM = Math.ceil(metaCli / 12);
      const recM = Math.round(metaRec / 12);
      const lucM = Math.round(metaLuc / 12);
      g.metaReal.clientes.mensal = {};
      g.metaReal.receita.mensal = {};
      g.metaReal.lucro.mensal = {};
      for (let m = 1; m <= 12; m++) {
        const k = String(m).padStart(2, '0');
        g.metaReal.clientes.mensal[k] = cliM;
        g.metaReal.receita.mensal[k] = recM;
        g.metaReal.lucro.mensal[k] = lucM;
      }
      // Vendas com ticket goal
      g.vendas = g.vendas || {};
      g.vendas.ticketMedio = ticketGoal;
      // Forecast com pipeline saudável projetado
      g.forecast = g.forecast || {};
      g.forecast.metaMensal = { clientes: cliM, receita: recM };
      g.forecast.pipeline = {
        frios: { qtd: cliM * 4, origem: { 'Tráfego Pago': cliM * 2, 'Indicação': cliM, 'Influenciador': cliM } },
        quentes: { qtd: cliM * 2, tempoMedioDias: 7, status: 'saudavel' },
        negociacao: { qtd: cliM, valorPotencial: cliM * ticketGoal, probabilidade: 80 },
        fecharaoMes: { qtd: cliM, receitaProjetada: recM, confianca: 95 }
      };
      g.forecast.premissas = g.forecast.premissas || {};
      g.forecast.premissas.taxaConversao = 25;
      g.forecast.premissas.leadsMes = cliM * 4;
      // Clientes "todos pagos" simulando meta
      g.clientes = [];
      for (let i = 0; i < metaCli; i++) {
        g.clientes.push({
          nome: 'Cliente ' + (i + 1),
          origem: ['Tráfego Pago', 'Influenciador', 'Indicação', 'Orgânico'][i % 4],
          status: 'pago',
          tipoQuarto: 'Ocean View',
          recorrente: i % 4 === 0
        });
      }
      g.alertas = [];
      return g;
    }

    function loadDubaiExplorer(item) {
      const mode = getDataMode();
      const key = mode === 'demo' ? 'dubai' : ('dubai_' + mode);

      if (!item[key]) {
        if (mode === 'demo') {
          item[key] = JSON.parse(JSON.stringify(DUBAI_EXPLORER_DEFAULTS));
          const isOriginalDubai = ((item.name || '').toUpperCase() === 'DUBAI EXPLORER');
          if (!isOriginalDubai && item.name) {
            item[key].produto.nome = item.name;
          }
        } else if (mode === 'operational') {
          item[key] = createEmptyDubai(item);
        } else if (mode === 'goal') {
          item[key] = createGoalDubai(item);
        }
        try { saveData(); } catch (e) {}
      }
      // Mescla defaults para campos novos que possam ter aparecido após updates
      const def = DUBAI_EXPLORER_DEFAULTS;
      for (const k of Object.keys(def)) {
        if (item[key][k] === undefined) item[key][k] = JSON.parse(JSON.stringify(def[k]));
      }
      return item[key];
    }
    function saveDubaiExplorer() { try { saveData(); } catch (e) {} }

    /* ============================================================
       COMPARADOR DE PACOTES · visão estratégica de portfolio
       Compara lado a lado todos os itens com format=pacotes
       (+ legacy "DUBAI EXPLORER" em PRODUTOS).
       ============================================================ */
    function flyCollectPacotes() {
      // Itera por todos os anos, todos os tópicos, todos os itens
      const out = [];
      try {
        for (const yearKey of Object.keys(data || {})) {
          const yearObj = data[yearKey] || {};
          for (const topicKey of Object.keys(yearObj)) {
            const t = yearObj[topicKey];
            if (!t || !Array.isArray(t.items)) continue;
            for (const it of t.items) {
              if (!it) continue;
              const upper = (it.name || '').toUpperCase();
              const isLegacyDubai = (topicKey === 'PRODUTOS' && upper === 'DUBAI EXPLORER');
              if (it.format === 'pacotes' || isLegacyDubai) {
                if (!out.find(x => x.id === it.id)) {
                  out.push({ id: it.id, name: it.name, image: it.image, item: it, yearKey, topicKey });
                }
              }
            }
          }
        }
      } catch (e) { console.warn('flyCollectPacotes error', e); }
      return out;
    }

    function flyPacoteMetrics(item) {
      // Garante que item.dubai existe (cria a partir de DEFAULTS se não)
      const D = loadDubaiExplorer(item);
      const fin = dbxComputeFinance(D);
      const dre = dbxComputeDRE(D, fin);
      // Mix do portfolio é calculado fora (precisa do total)
      const ret = D.retencao || {};
      const totalClientes = fin.totalClientes || 0;
      const taxaRecompra = totalClientes > 0
        ? ((Number(ret.voltaram || 0) + Number(ret.recompraOutroPacote || 0)) / totalClientes * 100)
        : 0;
      const recorrentes = (D.clientes || []).filter(c => c.recorrente).length;
      const upsellVendidos = (D.upsell?.extras || []).reduce((s, e) => s + (Number(e.vendidos) || 0), 0);
      const taxaUpsell = totalClientes > 0 ? (upsellVendidos / totalClientes * 100) : 0;
      // LTV estimado (heurística): receita/cliente × (1 + taxaRecompra)
      const receitaTotal = fin.totalReceita + fin.upsellReceita;
      const receitaCliente = totalClientes > 0 ? receitaTotal / totalClientes : 0;
      const ltv = receitaCliente * (1 + (taxaRecompra / 100));
      const ltvCac = fin.cac > 0 ? (ltv / fin.cac) : 0;
      const lucroCliente = totalClientes > 0 ? dre.lucroLiquido / totalClientes : 0;
      const custoCliente = totalClientes > 0 ? (fin.totalCusto / totalClientes) : 0;
      // Origem #1
      const origemMap = D.vendas?.origem || {};
      let origemTop = '—';
      let origemTopVal = 0;
      Object.entries(origemMap).forEach(([k, v]) => {
        if (Number(v) > origemTopVal) { origemTopVal = Number(v); origemTop = k; }
      });
      // Operação

      const complexidade = D.meta?.complexidade || 3; // default 3 estrelas

      return {
        item,
        // Comercial
        ticketMedio: D.vendas?.ticketMedio || 0,
        clientesPagos: totalClientes,
        receitaTotal,
        receitaUpsell: fin.upsellReceita,

      function heatmap(values, higherIsBetter = true) {
        const nums = values.map(v => (typeof v === 'number' ? v : NaN));
        const valid = nums.filter(v => !isNaN(v));
        if (valid.length < 2) return values.map(() => '');
        const max = Math.max(...valid);
        const min = Math.min(...valid);
        if (max === min) return values.map(() => '');
        return nums.map(v => {
          if (isNaN(v)) return '';
          const t = higherIsBetter ? (v - min) / (max - min) : (max - v) / (max - min);
          if (t > 0.85) return ' fly-cmp-best';
          if (t < 0.15) return ' fly-cmp-worst';
          if (t > 0.6) return ' fly-cmp-good';
          if (t < 0.4) return ' fly-cmp-bad';

    function dbxComputeFinance(D) {
      const clientesPagos = D.clientes.filter(c => c.status === 'pago').length;
      const totalClientes = clientesPagos;
      const ticket = D.vendas.ticketMedio || 0;
      const totalReceita = totalClientes * ticket;
      const totalCustoFixo = D.custos.fixos.reduce((s,c) => s + (Number(c.valor)||0), 0);
      const custoVarPorCliente = D.custos.variaveis.reduce((s,c) => s + (Number(c.valor)||0), 0);
      const totalCustoVar = custoVarPorCliente * totalClientes;
      const upsellReceita = D.upsell.extras.reduce((s,e) => s + (Number(e.receita)||0), 0);
      const totalCusto = totalCustoFixo + totalCustoVar;
      const lucro = totalReceita + upsellReceita - totalCusto;
      const margem = (totalReceita + upsellReceita) > 0 ? (lucro / (totalReceita + upsellReceita) * 100) : 0;
      // CAC: gasto em marketing / clientes adquiridos
      const investMkt = D.marketing.campanhas.reduce((s,c) => s + (Number(c.investido)||0), 0);
      const cac = totalClientes > 0 ? (investMkt / totalClientes) : 0;
      // ROI: receita gerada por marketing / investido
      const receitaMkt = D.marketing.campanhas.reduce((s,c) => s + (Number(c.retorno)||0), 0);
      const roi = investMkt > 0 ? ((receitaMkt - investMkt) / investMkt * 100) : 0;
      return {
        totalClientes, ticket, totalReceita, totalCustoFixo, custoVarPorCliente,
        totalCustoVar, upsellReceita, totalCusto, lucro, margem, investMkt, cac, receitaMkt, roi
      };
    }

      const form = overlay.querySelector('.dbx-form');

      fields.forEach(f => {
        const wrap = document.createElement('div');
        wrap.className = 'dbx-form-field';
        const lbl = document.createElement('label');
        lbl.textContent = f.label || f.key;
        wrap.appendChild(lbl);
        const v = values[f.key] !== undefined ? values[f.key] : (f.default || '');
        if (f.type === 'textarea') {
          const ta = document.createElement('textarea');
          ta.name = f.key;
          ta.placeholder = f.placeholder || '';
          ta.value = v;
          wrap.appendChild(ta);
        } else if (f.type === 'select') {
          const sel = document.createElement('select');
          sel.name = f.key;
          (f.options || []).forEach(opt => {
            const o = document.createElement('option');
            o.value = typeof opt === 'string' ? opt : opt.value;
            o.textContent = typeof opt === 'string' ? opt : opt.label;
            if (String(o.value) === String(v)) o.selected = true;
            sel.appendChild(o);
          });
          wrap.appendChild(sel);
        } else if (f.type === 'photo') {
          photoState[f.key] = v || '';
          const row = document.createElement('div');
          row.className = 'dbx-form-photo';
          row.innerHTML = `
            <div class="dbx-form-photo-preview">${v ? `<img src="${v}" alt="">` : '📷'}</div>
            <div style="flex:1; display:flex; flex-direction:column; gap:6px;">

            </div>
          `;
          const fileInput = row.querySelector('input[type=file]');
          const previewEl = row.querySelector('.dbx-form-photo-preview');
          row.querySelector('[data-act="pick-photo"]').addEventListener('click', () => fileInput.click());
          fileInput.addEventListener('change', () => {
            const file = fileInput.files && fileInput.files[0];
            if (!file) return;
            compressImage(file, 1200).then(dataUrl => {
              photoState[f.key] = dataUrl;
              previewEl.innerHTML = `<img src="${dataUrl}" alt="">`;
              // ensure remove button exists
              if (!row.querySelector('[data-act="clear-photo"]')) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'dbx-mini-btn danger';
                btn.dataset.act = 'clear-photo';
                btn.textContent = 'Remover foto';
                btn.addEventListener('click', () => {
                  photoState[f.key] = '';
                  previewEl.innerHTML = '📷';
                  btn.remove();
                });
                row.querySelector('div[style]').appendChild(btn);
              }
            });
          });
          const clearBtn = row.querySelector('[data-act="clear-photo"]');
          if (clearBtn) {
            clearBtn.addEventListener('click', () => {
              photoState[f.key] = '';
              previewEl.innerHTML = '📷';
              clearBtn.remove();
            });
          }
          wrap.appendChild(row);
        } else {
          const inp = document.createElement('input');
          inp.type = f.type === 'number' ? 'number' : 'text';
          inp.name = f.key;
          inp.placeholder = f.placeholder || '';
          inp.value = v;
          if (f.min !== undefined) inp.min = f.min;
          if (f.max !== undefined) inp.max = f.max;
          if (f.step !== undefined) inp.step = f.step;
          wrap.appendChild(inp);
        }
        form.appendChild(wrap);
      });
      function close() { overlay.remove(); }
      overlay.querySelector('.dbx-modal-close').addEventListener('click', close);

      overlay.addEventListener('click', e => { if (e.target === overlay) close(); });
      overlay.querySelector('[data-act="save"]').addEventListener('click', () => {
        const out = {};
        fields.forEach(f => {
          if (f.type === 'photo') {
            out[f.key] = photoState[f.key] || '';
          } else {
            const el = form.querySelector(`[name="${f.key}"]`);
            if (!el) return;
            let val = el.value;
            if (f.type === 'number') val = Number(val) || 0;
            out[f.key] = val;
          }
        });
        if (typeof onSave === 'function') onSave(out);
        close();
      });
      document.body.appendChild(overlay);
      // focus first input
      const firstInp = form.querySelector('input,textarea,select');
      if (firstInp) firstInp.focus();
    }

    /* ===== META vs REAL · seção topo do painel Pacotes ===== */
    function dbxRenderMetaReal(D) {
      const mr = D.metaReal || {};
      const now = new Date();
      const monthNum = now.getMonth() + 1;
      const propPct = (monthNum / 12) * 100;

      // Calcula status pra cada KPI
      function calcStatus(real, meta) {
        if (!meta) return { pct: 0, propMeta: 0, status: 'na', diag: '—' };
        const pct = (real / meta) * 100;
        const propMeta = meta * (monthNum / 12);
        const ratio = propMeta > 0 ? real / propMeta : 0;
        let status, diag;
        if (ratio >= 0.95) { status = 'good'; diag = '🟢 NO RITMO'; }
        else if (ratio >= 0.75) { status = 'warn'; diag = '🟡 ATENÇÃO'; }
        else { status = 'bad'; diag = '🔴 ATRASADO'; }
        return { pct: Math.min(pct, 200), propMeta, ratio, status, diag };
      }
      const cli = mr.clientes || { meta: 0, real: 0 };
      const rec = mr.receita  || { meta: 0, real: 0 };
      const luc = mr.lucro    || { meta: 0, real: 0 };
      const sCli = calcStatus(cli.real, cli.meta);
      const sRec = calcStatus(rec.real, rec.meta);
      const sLuc = calcStatus(luc.real, luc.meta);
      const monthsRest = 12 - monthNum;
      const ritmoCli = monthsRest > 0 ? Math.max(0, (cli.meta - cli.real) / monthsRest) : 0;
      const ritmoRec = monthsRest > 0 ? Math.max(0, (rec.meta - rec.real) / monthsRest) : 0;

      const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
      function buildRow(data, fmtFn) {
        let acum = 0;
        return meses.map((m, i) => {
          const k = String(i + 1).padStart(2, '0');
          const v = Number(data?.mensal?.[k] || 0);
          acum += v;
          const isPast = (i + 1) < monthNum;
          const isNow  = (i + 1) === monthNum;
          return `
            <td class="${isNow ? 'now' : (isPast ? 'past' : 'future')}">
              <div class="m-real">${v > 0 ? fmtFn(v) : '—'}</div>
              <div class="m-acum">${acum > 0 ? fmtFn(acum) : ''}</div>
            </td>`;
        }).join('');
      }
      const fmtMon = v => Number(v).toLocaleString('pt-BR', { maximumFractionDigits: 0 });
      const fmtMoneyMon = v => 'R$ ' + Math.round(Number(v) / 1000) + 'k';

      // Plano de recuperação (se atrasado >20%)
      const showRescue = sCli.status === 'bad' && cli.meta > 0;
      const gap = Math.max(0, cli.meta - cli.real);

      return `
        <div class="mr-section">
          <div class="mr-head">
            <span class="mr-title">📊 META vs REALIZADO · ${mr.ano || 2026}</span>
            <button class="mr-edit-btn" data-act="mr-edit">✎ Editar metas</button>
          </div>

          <div class="mr-cards">
            <div class="mr-card status-${sCli.status}">
              <div class="mr-c-head"><span class="mr-c-ttl">CLIENTES VENDIDOS</span><span class="mr-c-diag">${sCli.diag}</span></div>
              <div class="mr-c-bar">
                <div class="mr-c-fill" style="width: ${Math.min(sCli.pct, 100)}%"></div>
                <div class="mr-c-now" style="left: ${propPct}%" title="Posição esperada agora"></div>
              </div>
              <div class="mr-c-vals"><strong>${cli.real}</strong> / ${cli.meta} clientes <span class="mr-c-pct">(${sCli.pct.toFixed(0)}%)</span></div>
              <div class="mr-c-sub">Mês ${monthNum}/12 · meta proporcional: ${Math.round(sCli.propMeta)} clientes · ritmo necessário: ${ritmoCli.toFixed(1)}/mês</div>
            </div>

            <div class="mr-card status-${sRec.status}">

    function dbxBindMetaReal(wrap, D, item) {
      const editBtn = wrap.querySelector('[data-act="mr-edit"]');
      if (editBtn) editBtn.addEventListener('click', () => {
        const mr = D.metaReal || {};
        dbxOpenModal({
          title: '🎯 Editar Metas Anuais',
          fields: [
            { key: 'metaCli', label: 'Meta de clientes (ano)', type: 'number', step: '1' },
            { key: 'metaRec', label: 'Meta de receita (R$)', type: 'number', step: '0.01' },
            { key: 'metaLuc', label: 'Meta de lucro líquido (R$)', type: 'number', step: '0.01' },
            { key: 'realCli', label: 'Realizado clientes (ano até hoje)', type: 'number', step: '1' },
            { key: 'realRec', label: 'Realizado receita (R$)', type: 'number', step: '0.01' },
            { key: 'realLuc', label: 'Realizado lucro líquido (R$)', type: 'number', step: '0.01' }
          ],
          values: {
            metaCli: mr.clientes?.meta || 100,
            metaRec: mr.receita?.meta || 2500000,
            metaLuc: mr.lucro?.meta || 1000000,
            realCli: mr.clientes?.real || 0,
            realRec: mr.receita?.real || 0,
            realLuc: mr.lucro?.real || 0
          },
          onSave: (vals) => {
            if (!D.metaReal) D.metaReal = { ano: new Date().getFullYear() };
            D.metaReal.clientes = D.metaReal.clientes || { mensal: {} };
            D.metaReal.receita  = D.metaReal.receita  || { mensal: {} };
            D.metaReal.lucro    = D.metaReal.lucro    || { mensal: {} };
            D.metaReal.clientes.meta = Number(vals.metaCli) || 0;
            D.metaReal.clientes.real = Number(vals.realCli) || 0;
            D.metaReal.receita.meta  = Number(vals.metaRec) || 0;
            D.metaReal.receita.real  = Number(vals.realRec) || 0;
            D.metaReal.lucro.meta    = Number(vals.metaLuc) || 0;
            D.metaReal.lucro.real    = Number(vals.realLuc) || 0;
            saveDubaiExplorer();
            const mrEl = wrap.querySelector('#dbx-meta-vs-real');
            if (mrEl) {
              mrEl.innerHTML = dbxRenderMetaReal(D);
              dbxBindMetaReal(wrap, D, item);
            }
          }
        });
      });
    }

    function renderDbxPanel(key, D, panelEl, item) {
      const fin = dbxComputeFinance(D);
      if (key === 'produto')   panelEl.innerHTML = dbxRenderProduto(D);
      else if (key === 'custos')   panelEl.innerHTML = dbxRenderCustos(D, fin);
      else if (key === 'operacao') panelEl.innerHTML = dbxRenderOperacao(D);
      else if (key === 'equipe')   panelEl.innerHTML = dbxRenderEquipe(D);
      else if (key === 'clientes') panelEl.innerHTML = dbxRenderClientes(D);
      else if (key === 'vendas')   panelEl.innerHTML = dbxRenderVendas(D, fin);
      else if (key === 'marketing') panelEl.innerHTML = dbxRenderMarketing(D);
      else if (key === 'analise')   panelEl.innerHTML = dbxRenderAnalise(D, fin);
      else if (key === 'dre')       panelEl.innerHTML = dbxRenderDRE(D, fin);
      else if (key === 'forecast')  panelEl.innerHTML = dbxRenderForecast(D, fin);
      else if (key === 'retencao')  panelEl.innerHTML = dbxRenderRetencao(D, fin);
      else if (key === 'upsell')    panelEl.innerHTML = dbxRenderUpsell(D);
      else if (key === 'conteudo')  panelEl.innerHTML = dbxRenderConteudo(D);
      else if (key === 'alertas')   panelEl.innerHTML = dbxRenderAlertas(D, fin);

      // Bind CRUD/edit handlers para cada painel
      if (key === 'produto')   { dbxBindBanner(panelEl, D, item); dbxBindProduto(panelEl, D, item); }
      else if (key === 'custos')    dbxBindCustos(panelEl, D, item);
      else if (key === 'operacao')  dbxBindOperacao(panelEl, D, item);
      else if (key === 'equipe')    dbxBindEquipe(panelEl, D, item);
      else if (key === 'clientes')  dbxBindClientes(panelEl, D, item);
      else if (key === 'vendas')    dbxBindVendas(panelEl, D, item);
      else if (key === 'marketing') dbxBindMarketing(panelEl, D, item);
      else if (key === 'dre')       dbxBindDRE(panelEl, D, item);
      else if (key === 'forecast')  dbxBindForecast(panelEl, D, item);
      else if (key === 'retencao')  dbxBindRetencao(panelEl, D, item);
      else if (key === 'upsell')    dbxBindUpsell(panelEl, D, item);
      else if (key === 'conteudo')  dbxBindConteudo(panelEl, D, item);
      else if (key === 'alertas')   dbxBindAlertas(panelEl, D, item);
    }

    // Banner do hero — reaproveitado pelo painel Produto
    function dbxBindBanner(panelEl, D, item) {
      const heroBg = document.getElementById('dbx-hero-bg');
      const fileBtn = panelEl.querySelector('#dbx-banner-btn');
      const fileIn  = panelEl.querySelector('#dbx-banner-input');
      if (fileBtn && fileIn) {
        fileBtn.addEventListener('click', () => fileIn.click());
        fileIn.addEventListener('change', () => {
          const f = fileIn.files && fileIn.files[0];
          if (!f) return;
          compressImage(f, 1400).then(dataUrl => {
            D.produto.banner = dataUrl;
            if (heroBg) heroBg.style.backgroundImage = `url('${dataUrl}')`;
            saveDubaiExplorer();
          });
        });
      }
    }

            <button class="dbx-btn ghost" id="dbx-banner-btn">🖼 Trocar Banner</button>

                <div class="dbx-exp-icon">${e.icon || '★'}</div>
